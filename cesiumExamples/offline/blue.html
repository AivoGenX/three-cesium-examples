<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蓝色地球</title>
  </head>

  <body>
      <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/"
      }
    }
  </script>
    <script type="module">
      import * as Cesium from 'cesium'

      const box = document.getElementById('box')

      const viewer = new Cesium.Viewer(box, {

          animation: false,

          baseLayerPicker: false,

          baseLayer: false,

          fullscreenButton: false,

          timeline: false,

          infoBox: false,

      })

      let imagelayer = new Cesium.SingleTileImageryProvider({
          url:FILE_HOST + "images/offlineLayer/world_b.jpg",
          tileWidth: 256,
          tileHeight: 256,
      });
      viewer.imageryLayers.addImageryProvider(imagelayer);
    </script>
  </body>
</html>
