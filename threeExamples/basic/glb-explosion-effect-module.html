<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js GLB模型爆炸与组装效果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"
      rel="stylesheet"
    />

    <!-- 配置importmap -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://threelab.cn/openthree/threejs/build/three.module.js",
          "three/addons/": "https://threelab.cn/openthree/threejs/examples/jsm/"
        }
      }
    </script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#3B82F6",
              secondary: "#10B981",
              dark: "#1E293B",
              light: "#F8FAFC",
            },
            fontFamily: {
              inter: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style type="text/tailwindcss">
      @layer utilities {
        .content-auto {
          content-visibility: auto;
        }
        .btn-primary {
          @apply bg-primary hover:bg-primary/80 text-white font-medium py-2 px-4 rounded-lg transition-all duration-300 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary/50;
        }
        .btn-secondary {
          @apply bg-secondary hover:bg-secondary/80 text-white font-medium py-2 px-4 rounded-lg transition-all duration-300 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-secondary/50;
        }
        .control-panel {
          @apply bg-dark/80 backdrop-blur-md text-light p-4 rounded-xl shadow-lg;
        }
        .loading-indicator {
          @apply absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center justify-center;
        }
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-dark to-slate-800 min-h-screen font-inter text-light overflow-hidden flex flex-col"
  >
    <header
      class="p-4 flex justify-between items-center bg-dark/50 backdrop-blur-md border-b border-white/10"
    >
      <h1
        class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary"
      >
        <i class="fa fa-car mr-2"></i>模型爆炸效果演示
      </h1>
      <div class="flex items-center space-x-2">
        <span class="hidden md:inline-block text-sm text-gray-300"
          >拖动可旋转视角 | 滚轮可缩放</span
        >
      </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row relative">
      <!-- 3D渲染区域 -->
      <div id="canvas-container" class="flex-1 relative">
        <canvas id="sceneCanvas" class="w-full h-full"></canvas>

        <!-- 加载指示器 -->
        <div id="loadingIndicator" class="loading-indicator">
          <div
            class="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin"
          ></div>
          <p class="mt-4 text-lg">加载模型中...</p>
        </div>
      </div>

      <!-- 控制面板 -->
      <div
        class="control-panel absolute bottom-6 left-1/2 transform -translate-x-1/2 md:left-auto md:bottom-auto md:top-1/2 md:transform-none md:-translate-y-1/2 md:right-6 flex flex-col md:w-64 gap-4 z-10"
      >
        <h2 class="text-xl font-bold text-center border-b border-white/10 pb-2">
          控制选项
        </h2>

        <div class="space-y-3">
          <div class="flex flex-col gap-2">
            <label class="text-sm text-gray-300">动画速度</label>
            <input
              type="range"
              id="speedControl"
              min="0.1"
              max="3"
              step="0.1"
              value="1"
              class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-primary"
            />
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-sm text-gray-300">爆炸强度</label>
            <input
              type="range"
              id="intensityControl"
              min="1"
              max="10"
              step="0.5"
              value="3"
              class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-primary"
            />
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-sm text-gray-300">分解精细度</label>
            <input
              type="range"
              id="detailControl"
              min="1"
              max="5"
              step="1"
              value="2"
              class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-primary"
            />
          </div>
        </div>

        <div class="flex flex-col gap-3">
          <button
            id="explodeBtn"
            class="btn-primary flex items-center justify-center"
            disabled
          >
            <i class="fa fa-bomb mr-2"></i> 爆炸
          </button>
          <button
            id="assembleBtn"
            class="btn-secondary flex items-center justify-center"
            disabled
          >
            <i class="fa fa-cubes mr-2"></i> 组装
          </button>
          <button
            id="reloadBtn"
            class="bg-gray-600 hover:bg-gray-500 text-white font-medium py-2 px-4 rounded-lg transition-all duration-300"
          >
            <i class="fa fa-refresh mr-2"></i> 重新加载
          </button>
        </div>

        <div class="pt-2 text-xs text-gray-400 text-center">
          提示: 调整分解精细度可获得不同爆炸效果
        </div>
      </div>
    </main>

    <footer
      class="p-3 text-center text-sm text-gray-400 bg-dark/50 backdrop-blur-md border-t border-white/10"
    >
      <p>使用 Three.js 实现 | 模型: 法拉利GLB</p>
    </footer>

    <script type="module">
      // 导入Three.js模块
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

      // 全局变量
      let scene, camera, renderer, controls;
      let originalPositions = [];
      let targetPositions = [];
      let modelParts = [];
      let model;
      let isAnimating = false;
      let animationProgress = 0;
      let animationDirection = 1; // 1: 爆炸, -1: 组装
      let animationSpeed = 1;
      let explosionIntensity = 3;
      let detailLevel = 2;
      let center = new THREE.Vector3();

      // 初始化场景
      function init() {
        // 创建场景
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // 添加环境光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // 添加方向光
        const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight1.position.set(5, 10, 7.5);
        scene.add(directionalLight1);

        const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
        directionalLight2.position.set(-5, 10, -7.5);
        scene.add(directionalLight2);

        // 创建相机
        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          0.1,
          1000
        );
        camera.position.z = 15;

        // 创建渲染器
        renderer = new THREE.WebGLRenderer({
          canvas: document.getElementById("sceneCanvas"),
          antialias: true,
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 添加轨道控制器
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 加载GLB模型
        loadGLBModel("https://threejs.org/examples/models/gltf/ferrari.glb");

        // 窗口大小调整事件
        window.addEventListener("resize", onWindowResize);

        // 按钮事件监听
        document
          .getElementById("explodeBtn")
          .addEventListener("click", explodeModel);
        document
          .getElementById("assembleBtn")
          .addEventListener("click", assembleModel);
        document.getElementById("reloadBtn").addEventListener("click", () => {
          // 隐藏模型并显示加载指示器
          if (model) scene.remove(model);
          document.getElementById("loadingIndicator").style.display = "flex";
          document.getElementById("explodeBtn").disabled = true;
          document.getElementById("assembleBtn").disabled = true;

          // 重新加载模型
          loadGLBModel("https://threejs.org/examples/models/gltf/ferrari.glb");
        });

        // 控制器事件监听
        document
          .getElementById("speedControl")
          .addEventListener("input", (e) => {
            animationSpeed = parseFloat(e.target.value);
          });

        document
          .getElementById("intensityControl")
          .addEventListener("input", (e) => {
            explosionIntensity = parseFloat(e.target.value);
            // 更新目标位置以反映新的强度
            if (modelParts.length > 0) {
              calculateTargetPositions();
            }
          });

        document
          .getElementById("detailControl")
          .addEventListener("input", (e) => {
            detailLevel = parseInt(e.target.value);
            // 重新分解模型
            if (model) {
              decomposeModel(model);
            }
          });

        // 开始动画循环
        animate();
      }

      // 加载GLB模型
      function loadGLBModel(url) {
        const loader = new GLTFLoader();
        loader.setDRACOLoader(
          new DRACOLoader().setDecoderPath(
            "https://threelab.cn/openthree/js/three/draco/"
          )
        );
        loader.load(
          url,
          (gltf) => {
            model = gltf.scene;

            // 调整模型大小和位置
            model.scale.set(0.01, 0.01, 0.01); // 法拉利模型较大，缩小它
            model.rotation.y = Math.PI; // 旋转模型使其面向前方

            // 计算模型中心
            calculateModelCenter(model);

            // 将模型添加到场景
            scene.add(model);

            // 分解模型为可爆炸的部分
            decomposeModel(model);

            // 隐藏加载指示器，启用按钮
            document.getElementById("loadingIndicator").style.display = "none";
            document.getElementById("explodeBtn").disabled = false;
            document.getElementById("assembleBtn").disabled = false;

            console.log("模型加载完成");
          },
          (xhr) => {
            // 加载进度
            const percent = (xhr.loaded / xhr.total) * 100;
            console.log(`模型加载中: ${percent.toFixed(1)}%`);
          },
          (error) => {
            console.error("模型加载错误:", error);
            document.getElementById("loadingIndicator").innerHTML = `
                        <div class="text-red-500"><i class="fa fa-exclamation-triangle text-4xl"></i></div>
                        <p class="mt-4 text-lg text-red-400">加载失败</p>
                        <p class="text-sm text-gray-400">请点击重新加载按钮重试</p>
                    `;
          }
        );
      }

      // 计算模型中心
      function calculateModelCenter(object) {
        const box = new THREE.Box3().setFromObject(object);
        center = box.getCenter(new THREE.Vector3());
      }

      // 分解模型为可爆炸的部分
      function decomposeModel(object) {
        // 清除现有部分
        modelParts.forEach((part) => {
          // 只移除我们添加的空对象，保留原始模型结构
          if (part.userData.isExplosionPart) {
            scene.remove(part);
          }
        });

        modelParts = [];
        originalPositions = [];
        targetPositions = [];

        // 根据精细度分解模型
        // 我们将递归遍历模型并收集网格
        collectModelParts(object);

        // 计算爆炸目标位置
        calculateTargetPositions();

        console.log(`模型分解完成，共 ${modelParts.length} 个部分`);
      }

      // 收集模型部分
      function collectModelParts(object, parentGroup = null) {
        // 如果达到了当前精细度级别，创建一个爆炸部分
        if (parentGroup || detailLevel >= getHierarchyLevel(object)) {
          if (object.isMesh) {
            // 为每个网格创建一个控制对象
            const part = new THREE.Object3D();
            part.userData.isExplosionPart = true;

            // 保存原始位置（相对于模型中心）
            const originalPos = new THREE.Vector3().copy(
              object.getWorldPosition(new THREE.Vector3())
            );
            originalPositions.push(originalPos);

            // 将网格添加到控制对象
            part.add(object.clone());

            // 设置与原始位置相同
            part.position.copy(originalPos);

            // 添加到场景和部分列表
            scene.add(part);
            modelParts.push(part);

            // 隐藏原始模型
            object.visible = false;
            return true;
          }
        }

        // 递归处理子对象
        let hasChildren = false;
        object.children.forEach((child) => {
          if (
            collectModelParts(
              child,
              parentGroup || detailLevel >= getHierarchyLevel(object)
            )
          ) {
            hasChildren = true;
          }
        });

        return hasChildren;
      }

      // 获取对象在层级中的深度
      function getHierarchyLevel(object) {
        let level = 0;
        let current = object;
        while (current.parent && !current.parent.isScene) {
          level++;
          current = current.parent;
        }
        return level;
      }

      // 计算爆炸目标位置
      function calculateTargetPositions() {
        targetPositions = [];

        // 为每个部分计算爆炸后的目标位置
        modelParts.forEach((part, index) => {
          // 从模型中心向外爆炸
          const direction = new THREE.Vector3()
            .subVectors(originalPositions[index], center)
            .normalize();

          // 随机偏移增加自然感
          const randomOffset = new THREE.Vector3(
            (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 2
          ).multiplyScalar(explosionIntensity * 0.3);

          // 计算目标位置
          const targetPos = new THREE.Vector3()
            .copy(originalPositions[index])
            .add(direction.multiplyScalar(explosionIntensity))
            .add(randomOffset);

          targetPositions.push(targetPos);
        });
      }

      // 爆炸模型
      function explodeModel() {
        if (!isAnimating || animationDirection === -1) {
          isAnimating = true;
          animationDirection = 1;
        }
      }

      // 组装模型
      function assembleModel() {
        if (!isAnimating || animationDirection === 1) {
          isAnimating = true;
          animationDirection = -1;
        }
      }

      // 窗口大小调整
      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      // 动画循环
      function animate() {
        requestAnimationFrame(animate);

        // 更新控制器
        controls.update();

        // 处理动画
        if (isAnimating && modelParts.length > 0) {
          // 更新进度
          animationProgress += animationDirection * 0.01 * animationSpeed;

          // 限制进度范围
          if (animationProgress >= 1) {
            animationProgress = 1;
            isAnimating = false;
          } else if (animationProgress <= 0) {
            animationProgress = 0;
            isAnimating = false;
          }

          // 更新每个部分的位置和旋转
          modelParts.forEach((part, index) => {
            const startPos = originalPositions[index];
            const endPos = targetPositions[index];

            // 计算当前位置 (使用缓动函数使动画更自然)
            const t = animationProgress;
            // 使用二次缓动函数: easeInOutQuad
            const easeT = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

            part.position.copy(startPos).lerp(endPos, easeT);

            // 添加旋转效果增加视觉吸引力
            part.rotation.x += 0.005 * animationSpeed;
            part.rotation.y += 0.007 * animationSpeed;
          });
        }

        // 渲染场景
        renderer.render(scene, camera);
      }

      // 初始化应用
      window.addEventListener("load", init);
    </script>
  </body>
</html>
