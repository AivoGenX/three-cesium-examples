<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 模型爆炸与组装效果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet"> 
    <script type="importmap">
        {
          "imports": {
            "three": "https://threelab.cn/openthree/threejs/build/three.module.js",
            "three/addons/": "https://threelab.cn/openthree/threejs/examples/jsm/"
          }
        }
      </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        dark: '#1E293B',
                        light: '#F8FAFC'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .btn-primary {
                @apply bg-primary hover:bg-primary/80 text-white font-medium py-2 px-4 rounded-lg transition-all duration-300 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary/50;
            }
            .btn-secondary {
                @apply bg-secondary hover:bg-secondary/80 text-white font-medium py-2 px-4 rounded-lg transition-all duration-300 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-secondary/50;
            }
            .control-panel {
                @apply bg-dark/80 backdrop-blur-md text-light p-4 rounded-xl shadow-lg;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-dark to-slate-800 min-h-screen font-inter text-light overflow-hidden flex flex-col">
    <header class="p-4 flex justify-between items-center bg-dark/50 backdrop-blur-md border-b border-white/10">
        <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">
            <i class="fa fa-cube mr-2"></i>模型爆炸效果演示
        </h1>
        <div class="flex items-center space-x-2">
            <span class="hidden md:inline-block text-sm text-gray-300">拖动可旋转视角 | 滚轮可缩放</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row relative">
        <!-- 3D渲染区域 -->
        <div id="canvas-container" class="flex-1 relative">
            <canvas id="sceneCanvas" class="w-full h-full"></canvas>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel absolute bottom-6 left-1/2 transform -translate-x-1/2 md:left-auto md:bottom-auto md:top-1/2 md:transform-none md:-translate-y-1/2 md:right-6 flex flex-col md:w-64 gap-4 z-10">
            <h2 class="text-xl font-bold text-center border-b border-white/10 pb-2">控制选项</h2>
            
            <div class="space-y-3">
                <div class="flex flex-col gap-2">
                    <label class="text-sm text-gray-300">动画速度</label>
                    <input type="range" id="speedControl" min="0.1" max="3" step="0.1" value="1" 
                           class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-primary">
                </div>
                
                <div class="flex flex-col gap-2">
                    <label class="text-sm text-gray-300">爆炸强度</label>
                    <input type="range" id="intensityControl" min="1" max="10" step="0.5" value="5" 
                           class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-primary">
                </div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button id="explodeBtn" class="btn-primary flex items-center justify-center">
                    <i class="fa fa-bomb mr-2"></i> 爆炸
                </button>
                <button id="assembleBtn" class="btn-secondary flex items-center justify-center">
                    <i class="fa fa-cubes mr-2"></i> 组装
                </button>
            </div>
            
            <div class="pt-2 text-xs text-gray-400 text-center">
                提示: 可尝试不同的强度和速度组合
            </div>
        </div>
    </main>

    <footer class="p-3 text-center text-sm text-gray-400 bg-dark/50 backdrop-blur-md border-t border-white/10">
        <p>使用 Three.js 实现 | 拖动鼠标可旋转模型视角</p>
    </footer>

    <script type="module">
         import  * as THREE from "three";
 

      import { GUI } from "three/addons/libs/lil-gui.module.min.js";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        // 全局变量
        let scene, camera, renderer, controls;
        let originalPositions = [];
        let targetPositions = [];
        let pieces = [];
        let isAnimating = false;
        let animationProgress = 0;
        let animationDirection = 1; // 1: 爆炸, -1: 组装
        let animationSpeed = 1;
        let explosionIntensity = 5;
        
        // 初始化场景
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // 添加环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            // 添加方向光
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('sceneCanvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // 添加轨道控制器
            controls = new  OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            // 创建模型碎片
            createModelPieces();
            
            // 窗口大小调整事件
            window.addEventListener('resize', onWindowResize);
            
            // 按钮事件监听
            document.getElementById('explodeBtn').addEventListener('click', explodeModel);
            document.getElementById('assembleBtn').addEventListener('click', assembleModel);
            
            // 控制器事件监听
            document.getElementById('speedControl').addEventListener('input', (e) => {
                animationSpeed = parseFloat(e.target.value);
            });
            
            document.getElementById('intensityControl').addEventListener('input', (e) => {
                explosionIntensity = parseFloat(e.target.value);
                // 更新目标位置以反映新的强度
                calculateTargetPositions();
            });
            
            // 开始动画循环
            animate();
        }
        
        // 创建模型碎片
        function createModelPieces() {
            // 清除现有碎片
            pieces.forEach(piece => scene.remove(piece));
            pieces = [];
            originalPositions = [];
            targetPositions = [];
            
            // 创建一个由小立方体组成的大立方体
            const pieceSize = 1;
            const piecesPerSide = 3;
            const gap = 0.1;
            const totalSize = piecesPerSide * (pieceSize + gap) - gap;
            
            const geometry = new THREE.BoxGeometry(pieceSize, pieceSize, pieceSize);
            
            for (let x = 0; x < piecesPerSide; x++) {
                for (let y = 0; y < piecesPerSide; y++) {
                    for (let z = 0; z < piecesPerSide; z++) {
                        // 创建不同的材质颜色
                        const color = new THREE.Color(
                            0.5 + (x / piecesPerSide) * 0.5,
                            0.5 + (y / piecesPerSide) * 0.5,
                            0.5 + (z / piecesPerSide) * 0.5
                        );
                        
                        const material = new THREE.MeshPhongMaterial({
                            color: color,
                            shininess: 80,
                            transparent: true,
                            opacity: 0.95
                        });
                        
                        const piece = new THREE.Mesh(geometry, material);
                        
                        // 计算位置，使整体居中
                        const posX = (x * (pieceSize + gap)) - (totalSize / 2) + (pieceSize / 2);
                        const posY = (y * (pieceSize + gap)) - (totalSize / 2) + (pieceSize / 2);
                        const posZ = (z * (pieceSize + gap)) - (totalSize / 2) + (pieceSize / 2);
                        
                        piece.position.set(posX, posY, posZ);
                        
                        // 保存原始位置
                        originalPositions.push(new THREE.Vector3(posX, posY, posZ));
                        
                        scene.add(piece);
                        pieces.push(piece);
                    }
                }
            }
            
            // 计算爆炸目标位置
            calculateTargetPositions();
        }
        
        // 计算爆炸目标位置
        function calculateTargetPositions() {
            targetPositions = [];
            
            // 为每个碎片计算爆炸后的目标位置
            pieces.forEach((piece, index) => {
                // 从中心向外爆炸
                const center = new THREE.Vector3(); // 模型中心
                const direction = new THREE.Vector3().subVectors(originalPositions[index], center).normalize();
                
                // 随机偏移增加自然感
                const randomOffset = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                ).multiplyScalar(2);
                
                // 计算目标位置
                const targetPos = new THREE.Vector3()
                    .copy(originalPositions[index])
                    .add(direction.multiplyScalar(explosionIntensity))
                    .add(randomOffset);
                
                targetPositions.push(targetPos);
            });
        }
        
        // 爆炸模型
        function explodeModel() {
            if (!isAnimating || animationDirection === -1) {
                isAnimating = true;
                animationDirection = 1;
            }
        }
        
        // 组装模型
        function assembleModel() {
            if (!isAnimating || animationDirection === 1) {
                isAnimating = true;
                animationDirection = -1;
            }
        }
        
        // 窗口大小调整
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新控制器
            controls.update();
            
            // 处理动画
            if (isAnimating) {
                // 更新进度
                animationProgress += animationDirection * 0.01 * animationSpeed;
                
                // 限制进度范围
                if (animationProgress >= 1) {
                    animationProgress = 1;
                    isAnimating = false;
                } else if (animationProgress <= 0) {
                    animationProgress = 0;
                    isAnimating = false;
                }
                
                // 更新每个碎片的位置
                pieces.forEach((piece, index) => {
                    const startPos = originalPositions[index];
                    const endPos = targetPositions[index];
                    
                    // 计算当前位置 (使用缓动函数使动画更自然)
                    const t = animationProgress;
                    // 使用二次缓动函数: easeInOutQuad
                    const easeT = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    
                    piece.position.copy(startPos).lerp(endPos, easeT);
                    
                    // 添加旋转效果增加视觉吸引力
                    piece.rotation.x += 0.01 * animationSpeed;
                    piece.rotation.y += 0.015 * animationSpeed;
                });
            }
            
            // 渲染场景
            renderer.render(scene, camera);
        }
        
        // 初始化应用
        window.addEventListener('load', init);
    </script>
</body>
</html>
