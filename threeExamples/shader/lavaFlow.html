<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 熔岩流动效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 6);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float flowSpeed;
                uniform float temperature;
                uniform float viscosity;
                uniform float glowIntensity;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 噪声函数
                float noise(vec2 p) {
                    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                }
                
                // 分形噪声
                float fbm(vec2 p) {
                    float value = 0.0;
                    float amplitude = 0.5;
                    float frequency = 1.0;
                    
                    for (int i = 0; i < 4; i++) {
                        value += amplitude * noise(p * frequency);
                        amplitude *= 0.5;
                        frequency *= 2.0;
                    }
                    return value;
                }
                
                // 熔岩颜色映射
                vec3 lavaColor(float heat) {
                    vec3 coolColor = vec3(0.8, 0.2, 0.0);  // 暗红色
                    vec3 hotColor = vec3(1.0, 0.8, 0.2);   // 亮黄色
                    
                    if (heat < 0.3) {
                        return coolColor;
                    } else if (heat < 0.6) {
                        return mix(coolColor, vec3(1.0, 0.5, 0.0), (heat - 0.3) / 0.3);
                    } else {
                        return mix(vec3(1.0, 0.5, 0.0), hotColor, (heat - 0.6) / 0.4);
                    }
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 创建流动效果
                    vec2 flow = vec2(
                        fbm(uv * 2.0 + time * flowSpeed),
                        fbm(uv * 2.0 - time * flowSpeed * 0.7)
                    );
                    
                    // 计算热力分布
                    float heat = fbm(uv * 3.0 + flow * 0.5 + time * flowSpeed * 0.3);
                    heat = pow(heat, temperature);
                    
                    // 应用粘度效果
                    heat = mix(heat, fbm(uv * 5.0), viscosity);
                    
                    // 获取熔岩颜色
                    vec3 color = lavaColor(heat);
                    
                    // 添加发光效果
                    float glow = smoothstep(0.5, 1.0, heat) * glowIntensity;
                    color += glow * vec3(1.0, 0.6, 0.2);
                    
                    // 添加表面细节
                    float detail = fbm(uv * 10.0 + time * 2.0) * 0.1;
                    color += detail;
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    flowSpeed: { value: 1.0 },
                    temperature: { value: 1.5 },
                    viscosity: { value: 0.3 },
                    glowIntensity: { value: 0.8 }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.SphereGeometry(2, 64, 64);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
            
            // 添加旋转动画
            gsap.to(_primitive.rotation, {
                y: Math.PI * 2,
                duration: 20,
                repeat: -1,
                ease: "none"
            });
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                flowSpeed: 1.0,
                temperature: 1.5,
                viscosity: 0.3,
                glowIntensity: 0.8,
                reset: function() {
                    mat.uniforms.flowSpeed.value = 1.0;
                    mat.uniforms.temperature.value = 1.5;
                    mat.uniforms.viscosity.value = 0.3;
                    mat.uniforms.glowIntensity.value = 0.8;
                    gui.updateDisplay();
                }
            };

            gui.add(mat.uniforms.flowSpeed, 'value', 0.1, 3.0).name('流动速度');
            gui.add(mat.uniforms.temperature, 'value', 0.5, 3.0).name('温度');
            gui.add(mat.uniforms.viscosity, 'value', 0.0, 1.0).name('粘度');
            gui.add(mat.uniforms.glowIntensity, 'value', 0.1, 2.0).name('发光强度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
