<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js神经突触效果着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #330033 0%, #110011 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #ff66ff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #ff66ff;
      border: 1px solid #ff66ff;
      box-shadow: 0 0 20px #ff66ff;
    }
    .neural-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #66ffff;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #66ffff;
      border: 1px solid #66ffff;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ffff66;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ffff66;
      border: 1px solid #ffff66;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">🧠 神经突触效果 - 实时渲染 🧠</div>
  <div class="neural-info" id="neuralInfo">突触活性: 高 | 信号传递: 快速</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变神经效果<br>
    • 实时交互：体验大脑活动
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x330033);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,8)的位置观察场景
    camera.position.set(0, 0, 8)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 神经突触效果参数
    const neuralParams = {
      synapseActivity: 0.8,
      signalSpeed: 0.7,
      neuronDensity: 0.6,
      glowIntensity: 1.2,
      connectionStrength: 0.8,
      neuralType: 0,
      showAxons: true
    };

    // 创建复杂几何体，作为神经网络的载体
    const geometry = new THREE.IcosahedronGeometry(2.5, 3);

    // 顶点着色器代码 - 神经突触效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uSynapseActivity;
      uniform float uSignalSpeed;
      uniform float uConnectionStrength;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vNormal = normal;
        
        // 神经突触活动
        float synapse = sin(position.x * 3.0 + uTime * uSynapseActivity) * 
                       cos(position.y * 4.0 + uTime * uSynapseActivity * 0.8) *
                       sin(position.z * 3.0 + uTime * uSynapseActivity * 0.6);
        
        // 信号传递
        float signal = sin(position.x * 5.0 + uTime * uSignalSpeed * 2.0) *
                      cos(position.z * 5.0 + uTime * uSignalSpeed * 2.0);
        
        // 连接强度
        float connection = sin(position.x * uConnectionStrength * 6.0) *
                          cos(position.y * uConnectionStrength * 8.0);
        
        vec3 newPosition = position + normal * (synapse + signal * 0.5 + connection * 0.3) * 0.15;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    // 片段着色器代码 - 神经突触效果
    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uSynapseActivity;
      uniform float uSignalSpeed;
      uniform float uNeuronDensity;
      uniform float uGlowIntensity;
      uniform float uConnectionStrength;
      uniform int uNeuralType;
      uniform bool uShowAxons;
      
      // 噪声函数
      float noise(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // 神经突触效果
      float neuralSynapse(vec2 uv, float activity) {
        float synapseField = 0.0;
        
        // 多层突触活动
        synapseField += sin(uv.x * 4.0 + uTime * 0.3) * 
                       cos(uv.y * 6.0 + uTime * 0.5);
        synapseField += sin(uv.x * 6.0 + uTime * 0.7) * 
                       cos(uv.y * 8.0 + uTime * 0.9) * 0.7;
        synapseField += sin(uv.x * 8.0 + uTime * 1.1) * 
                       cos(uv.y * 10.0 + uTime * 1.3) * 0.4;
        
        return synapseField * activity;
      }
      
      // 神经元效果
      float neurons(vec2 uv, float density) {
        float neuronField = 0.0;
        for(int i = 0; i < 25; i++) {
          vec2 neuronPos = vec2(
            noise(vec2(float(i) * 0.123, 0.456)),
            noise(vec2(float(i) * 0.456, 0.789))
          );
          float dist = distance(uv, neuronPos);
          float neuronSize = noise(vec2(float(i) * 0.789, 0.123)) * 0.05 + 0.03;
          float neuronLife = mod(uTime * 1.5 + float(i) * 8.0, 6.28);
          float neuronIntensity = sin(neuronLife) * 0.7 + 0.3;
          neuronField += exp(-dist * 40.0) * neuronIntensity * density;
        }
        return neuronField;
      }
      
      // 轴突连接效果
      float axonConnections(vec2 uv, float intensity) {
        if(!uShowAxons) return 0.0;
        
        float axonField = 0.0;
        for(int i = 0; i < 12; i++) {
          float angle = float(i) * 0.523; // 30度间隔
          vec2 axonDir = vec2(cos(angle), sin(angle));
          float axonDist = dot(uv - vec2(0.5, 0.5), axonDir);
          float axonWave = sin(axonDist * 10.0 + uTime * 2.5);
          axonField += axonWave * 0.08 * intensity;
        }
        return axonField;
      }
      
      // 神经类型
      vec3 getNeuralType(int type) {
        if(type == 0) {
          // 紫色神经
          return vec3(0.8, 0.2, 1.0);
        } else if(type == 1) {
          // 蓝色神经
          return vec3(0.2, 0.6, 1.0);
        } else {
          // 绿色神经
          return vec3(0.2, 1.0, 0.4);
        }
      }
      
      void main() {
        vec2 uv = vUv;
        
        // 神经突触效果
        float synapseField = neuralSynapse(uv, uSynapseActivity);
        
        // 神经元效果
        float neuronField = neurons(uv, uNeuronDensity);
        
        // 轴突连接效果
        float axonField = axonConnections(uv, 0.4);
        
        // 颜色计算
        vec3 baseColor = getNeuralType(uNeuralType);
        vec3 finalColor = baseColor * (synapseField * 0.5 + neuronField * 0.3 + axonField * 0.2) * uGlowIntensity;
        
        // 信号传递效果
        float signalEffect = sin(uTime * uSignalSpeed) * 0.3 + 0.7;
        finalColor *= signalEffect;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uSynapseActivity: { value: neuralParams.synapseActivity },
        uSignalSpeed: { value: neuralParams.signalSpeed },
        uNeuronDensity: { value: neuralParams.neuronDensity },
        uGlowIntensity: { value: neuralParams.glowIntensity },
        uConnectionStrength: { value: neuralParams.connectionStrength },
        uNeuralType: { value: neuralParams.neuralType },
        uShowAxons: { value: neuralParams.showAxons }
      }
    });

    // 创建网格对象并添加到场景中
    const neuralIcosahedron = new THREE.Mesh(geometry, material);
    scene.add(neuralIcosahedron);

    // 更新神经信息显示
    function updateNeuralInfo() {
      const neuralElement = document.getElementById('neuralInfo');
      let activity = "低";
      if(neuralParams.synapseActivity > 0.5) activity = "中";
      if(neuralParams.synapseActivity > 0.8) activity = "高";
      
      let speed = "慢";
      if(neuralParams.signalSpeed > 0.4) speed = "正常";
      if(neuralParams.signalSpeed > 0.7) speed = "快速";
      
      neuralElement.textContent = `突触活性: ${activity} | 信号传递: ${speed}`;
    }

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 神经参数控制
    const neuralFolder = gui.addFolder('神经效果参数');
    neuralFolder.add(neuralParams, 'synapseActivity', 0.1, 1.2).name('突触活性');
    neuralFolder.add(neuralParams, 'signalSpeed', 0.1, 1.0).name('信号传递');
    neuralFolder.add(neuralParams, 'neuronDensity', 0.1, 1.0).name('神经元密度');
    neuralFolder.add(neuralParams, 'glowIntensity', 0.1, 1.8).name('发光强度');
    neuralFolder.add(neuralParams, 'connectionStrength', 0.1, 0.9).name('连接强度');
    neuralFolder.add(neuralParams, 'showAxons').name('显示轴突');
    
    // 神经类型控制
    const neuralTypes = {
      "紫色神经": 0,
      "蓝色神经": 1,
      "绿色神经": 2
    };
    neuralFolder.add(neuralParams, 'neuralType', neuralTypes).name('神经类型');
    
    neuralFolder.open();

    // 参数变化时更新材质和神经信息
    gui.onChange(() => {
      material.uniforms.uSynapseActivity.value = neuralParams.synapseActivity;
      material.uniforms.uSignalSpeed.value = neuralParams.signalSpeed;
      material.uniforms.uNeuronDensity.value = neuralParams.neuronDensity;
      material.uniforms.uGlowIntensity.value = neuralParams.glowIntensity;
      material.uniforms.uConnectionStrength.value = neuralParams.connectionStrength;
      material.uniforms.uNeuralType.value = neuralParams.neuralType;
      material.uniforms.uShowAxons.value = neuralParams.showAxons;
      
      updateNeuralInfo();
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转神经网络
      neuralIcosahedron.rotation.y += neuralParams.signalSpeed * 0.01;
      neuralIcosahedron.rotation.x += neuralParams.signalSpeed * 0.005;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 初始化神经信息显示
    updateNeuralInfo();

    // 启动动画循环
    animate();
  </script>
</body>

</html>
