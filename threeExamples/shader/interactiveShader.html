<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js交互式着色器效果</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #0f0f23 0%, #1e1e3f 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
      cursor: crosshair;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00b4d8;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #00b4d8;
      border: 1px solid #00b4d8;
      box-shadow: 0 0 20px #00b4d8;
    }
    .instructions {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #ff6b6b;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff6b6b;
      border: 1px solid #ff6b6b;
    }
  </style>
</head>

<body>
  <div class="info">🖱️ 交互式着色器效果 - 实时渲染 🖱️</div>
  <div class="instructions">💡 提示：移动鼠标、点击、拖拽来与着色器交互！</div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // ============================================================================
    // 导入Three.js核心库和辅助工具
    // ============================================================================
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // ============================================================================
    // 场景初始化
    // ============================================================================
    
    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x0f0f23);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,5)的位置观察场景
    camera.position.set(0, 0, 5)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // ============================================================================
    // 交互状态变量
    // ============================================================================
    const interactionState = {
      mouseX: 0.0,      // 鼠标X坐标（归一化）
      mouseY: 0.0,      // 鼠标Y坐标（归一化）
      mouseDown: false, // 鼠标按下状态
      clickPosition: new THREE.Vector2(0, 0), // 点击位置
      dragPosition: new THREE.Vector2(0, 0),  // 拖拽位置
      touchPoints: [],  // 多点触控点
      timeSinceClick: 0.0, // 点击后经过的时间
      velocity: new THREE.Vector2(0, 0), // 鼠标速度
    };

    // ============================================================================
    // 鼠标事件处理
    // ============================================================================
    
    // 鼠标移动事件：跟踪鼠标位置和速度
    renderer.domElement.addEventListener('mousemove', (event) => {
      // 计算归一化鼠标坐标（-1到1）
      interactionState.mouseX = (event.clientX / window.innerWidth) * 2 - 1;
      interactionState.mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
      
      // 计算鼠标速度（基于位置变化）
      const deltaX = interactionState.mouseX - interactionState.dragPosition.x;
      const deltaY = interactionState.mouseY - interactionState.dragPosition.y;
      interactionState.velocity.x = deltaX * 10;
      interactionState.velocity.y = deltaY * 10;
      
      // 更新拖拽位置
      interactionState.dragPosition.set(interactionState.mouseX, interactionState.mouseY);
    });

    // 鼠标按下事件：记录点击位置和时间
    renderer.domElement.addEventListener('mousedown', (event) => {
      interactionState.mouseDown = true;
      interactionState.clickPosition.set(interactionState.mouseX, interactionState.mouseY);
      interactionState.timeSinceClick = 0.0;
    });

    // 鼠标释放事件：重置点击状态
    renderer.domElement.addEventListener('mouseup', () => {
      interactionState.mouseDown = false;
    });

    // 触摸事件支持（移动设备）
    renderer.domElement.addEventListener('touchstart', (event) => {
      event.preventDefault();
      interactionState.touchPoints = [];
      for(let i = 0; i < event.touches.length; i++) {
        const touch = event.touches[i];
        const x = (touch.clientX / window.innerWidth) * 2 - 1;
        const y = -(touch.clientY / window.innerHeight) * 2 + 1;
        interactionState.touchPoints.push(new THREE.Vector2(x, y));
      }
    });

    renderer.domElement.addEventListener('touchmove', (event) => {
      event.preventDefault();
      interactionState.touchPoints = [];
      for(let i = 0; i < event.touches.length; i++) {
        const touch = event.touches[i];
        const x = (touch.clientX / window.innerWidth) * 2 - 1;
        const y = -(touch.clientY / window.innerHeight) * 2 + 1;
        interactionState.touchPoints.push(new THREE.Vector2(x, y));
      }
    });

    // ============================================================================
    // 窗口大小变化时的响应函数
    // ============================================================================
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // ============================================================================
    // 创建几何体和材质
    // ============================================================================
    
    // 创建平面几何体，作为交互式效果的载体
    // 参数：宽度，高度，宽度分段数，高度分段数
    const geometry = new THREE.PlaneGeometry(10, 10, 256, 256);

    // 创建自定义着色器材质，实现多种交互式效果
    const material = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,          // 双面渲染
      transparent: true,               // 启用透明度
      blending: THREE.AdditiveBlending, // 添加混合模式让效果更亮
      uniforms: {
        // 时间变量，用于动画效果
        uTime: { value: 0.0 },
        // 交互式效果类型选择：0=涟漪效果, 1=粒子跟随, 2=画笔效果, 3=引力场, 4=声音可视化
        uInteractiveType: { value: 0 },
        // 交互参数
        uMouseX: { value: 0.0 },       // 鼠标X坐标
        uMouseY: { value: 0.0 },       // 鼠标Y坐标
        uMouseDown: { value: 0.0 },    // 鼠标按下状态
        uClickX: { value: 0.0 },       // 点击X坐标
        uClickY: { value: 0.0 },       // 点击Y坐标
        uTimeSinceClick: { value: 0.0 }, // 点击后时间
        uVelocityX: { value: 0.0 },    // 鼠标速度X
        uVelocityY: { value: 0.0 },    // 鼠标速度Y
        // 颜色参数
        uColor1: { value: new THREE.Color(0x00b4d8) }, // 主色
        uColor2: { value: new THREE.Color(0x0077b6) }, // 辅色
        uColor3: { value: new THREE.Color(0x90e0ef) }, // 高光色
        // 效果参数
        uIntensity: { value: 1.0 },    // 强度
        uSensitivity: { value: 0.5 },  // 灵敏度
        uDecay: { value: 0.1 },        // 衰减速度
      },
      
      // ============================================================================
      // 顶点着色器：处理顶点位置和变形
      // ============================================================================
      vertexShader: `
        // 统一变量声明
        uniform float uTime;           // 时间变量
        uniform float uMouseX;         // 鼠标X坐标
        uniform float uMouseY;         // 鼠标Y坐标
        uniform float uMouseDown;      // 鼠标按下状态
        uniform float uClickX;         // 点击X坐标
        uniform float uClickY;         // 点击Y坐标
        uniform float uTimeSinceClick; // 点击后时间
        uniform float uVelocityX;      // 鼠标速度X
        uniform float uVelocityY;      // 鼠标速度Y
        uniform int uInteractiveType;  // 交互类型
        
        // 传递到片元着色器的变量
        varying vec2 vUv;              // UV坐标
        varying vec3 vPosition;        // 顶点位置
        varying float vInteractiveValue; // 交互计算值
        varying float vDistanceToMouse; // 到鼠标距离
        
        // ============================================================================
        // 涟漪效果：鼠标点击产生涟漪波动
        // 原理：基于距离的波动传播
        // 特点：点击位置产生圆形波动向外扩散
        // ============================================================================
        float rippleEffect(vec2 pos) {
          // 计算到点击位置的距离
          vec2 clickPos = vec2(uClickX, uClickY);
          float distanceToClick = length(pos - clickPos);
          
          // 涟漪波动：随时间扩散的圆形波
          float waveSpeed = 2.0;
          float waveFront = uTimeSinceClick * waveSpeed;
          float waveWidth = 0.3;
          
          // 计算波前位置
          float wave = smoothstep(waveFront - waveWidth, waveFront, distanceToClick) - 
                      smoothstep(waveFront, waveFront + waveWidth, distanceToClick);
          
          // 振幅衰减（距离越远振幅越小）
          wave *= exp(-distanceToClick * 2.0);
          
          return wave * uMouseDown;
        }
        
        // ============================================================================
        // 粒子跟随：粒子跟随鼠标移动
        // 原理：基于距离的吸引力
        // 特点：粒子向鼠标位置聚集
        // ============================================================================
        float particleFollow(vec2 pos) {
          // 计算到鼠标位置的距离
          vec2 mousePos = vec2(uMouseX, uMouseY);
          float distanceToMouse = length(pos - mousePos);
          
          // 吸引力：距离越近吸引力越强
          float attraction = 1.0 / (1.0 + distanceToMouse * 10.0);
          
          // 添加随机扰动
          float noise = sin(pos.x * 20.0 + uTime * 3.0) * 0.1;
          attraction += noise;
          
          return attraction;
        }
        
        // ============================================================================
        // 画笔效果：鼠标移动绘制轨迹
        // 原理：基于距离的笔触效果
        // 特点：鼠标移动留下彩色轨迹
        // ============================================================================
        float brushEffect(vec2 pos) {
          // 计算到鼠标轨迹的距离
          vec2 mousePos = vec2(uMouseX, uMouseY);
          float distanceToMouse = length(pos - mousePos);
          
          // 画笔效果：圆形笔触
          float brushSize = 0.1;
          float brush = 1.0 - smoothstep(0.0, brushSize, distanceToMouse);
          
          // 根据鼠标速度调整笔触强度
          float speed = length(vec2(uVelocityX, uVelocityY));
          brush *= (1.0 - smoothstep(0.0, 5.0, speed));
          
          return brush;
        }
        
        // ============================================================================
        // 引力场：鼠标产生引力或斥力
        // 原理：基于距离的力场计算
        // 特点：鼠标位置产生物理力场效果
        // ============================================================================
        float gravityField(vec2 pos) {
          // 计算到鼠标位置的距离
          vec2 mousePos = vec2(uMouseX, uMouseY);
          float distanceToMouse = length(pos - mousePos);
          
          // 引力场：距离平方反比定律
          float gravity = 1.0 / (1.0 + distanceToMouse * distanceToMouse * 50.0);
          
          // 根据鼠标状态调整力场方向（引力/斥力）
          if(uMouseDown > 0.5) {
            gravity = -gravity; // 斥力
          }
          
          return gravity;
        }
        
        // ============================================================================
        // 声音可视化：鼠标移动产生声波效果
        // 原理：基于速度和位置的声波模拟
        // 特点：鼠标移动产生类似声波的视觉效果
        // ============================================================================
        float soundVisualization(vec2 pos) {
          // 计算鼠标速度
          float speed = length(vec2(uVelocityX, uVelocityY));
          
          // 声波效果：基于速度的波动
          float soundWave = 0.0;
          if(speed > 0.1) {
            // 计算到鼠标位置的距离
            vec2 mousePos = vec2(uMouseX, uMouseY);
            float distanceToMouse = length(pos - mousePos);
            
            // 声波传播
            float waveSpeed = speed * 2.0;
            float waveFront = uTime * waveSpeed;
            
            soundWave = sin(distanceToMouse * 10.0 - waveFront) * 
                       exp(-distanceToMouse * 3.0) * speed;
          }
          
          return soundWave;
        }
        
        // ============================================================================
        // 主顶点着色器函数
        // ============================================================================
        void main() {
          // 传递UV坐标到片元着色器
          vUv = uv;
          vPosition = position;
          
          // 计算到鼠标位置的距离
          vec2 mousePos = vec2(uMouseX, uMouseY);
          vDistanceToMouse = length(position.xy - mousePos);
          
          // 根据交互类型选择不同的交互效果
          float interactiveValue = 0.0;
          
          if(uInteractiveType == 0) {
            // 涟漪效果：点击产生波动
            interactiveValue = rippleEffect(position.xy);
          } else if(uInteractiveType == 1) {
            // 粒子跟随：粒子聚集效果
            interactiveValue = particleFollow(position.xy);
          } else if(uInteractiveType == 2) {
            // 画笔效果：绘制轨迹
            interactiveValue = brushEffect(position.xy);
          } else if(uInteractiveType == 3) {
            // 引力场：物理力场效果
            interactiveValue = gravityField(position.xy);
          } else {
            // 声音可视化：声波效果
            interactiveValue = soundVisualization(position.xy);
          }
          
          vInteractiveValue = interactiveValue;
          
          // 根据交互值对顶点位置进行变形
          vec3 newPosition = position;
          newPosition.z += interactiveValue * 1.5;
          
          // 设置最终顶点位置
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
      `,
      
      // ============================================================================
      // 片元着色器：处理像素颜色
      // ============================================================================
      fragmentShader: `
        // 统一变量声明
        uniform float uTime;           // 时间变量
        uniform vec3 uColor1;          // 主色
        uniform vec3 uColor2;          // 辅色
        uniform vec3 uColor3;          // 高光色
        uniform float uIntensity;      // 强度
        uniform float uSensitivity;    // 灵敏度
        
        // 从顶点着色器传递的变量
        varying vec2 vUv;              // UV坐标
        varying vec3 vPosition;        // 顶点位置
        varying float vInteractiveValue; // 交互计算值
        varying float vDistanceToMouse; // 到鼠标距离
        
        void main() {
          // 基础颜色计算：根据交互值进行颜色混合
          vec3 baseColor = mix(uColor1, uColor2, (vInteractiveValue + 1.0) * 0.5);
          
          // 添加高光效果：在交互值较高的区域添加高光色
          float highlight = smoothstep(0.3, 0.8, abs(vInteractiveValue));
          baseColor = mix(baseColor, uColor3, highlight);
          
          // 根据鼠标距离添加距离衰减效果
          float distanceFade = 1.0 - smoothstep(0.0, 0.5, vDistanceToMouse);
          baseColor *= distanceFade;
          
          // 添加发光效果
          float glow = smoothstep(0.2, 0.6, abs(vInteractiveValue));
          baseColor += glow * uIntensity;
          
          // 特殊交互效果
          if(vDistanceToMouse < 0.1) {
            // 鼠标附近区域增强效果
            baseColor *= 2.0;
            baseColor += vec3(1.0, 1.0, 0.5) * 0.3; // 添加黄色高光
          }
          
          // 时间动画效果
          float timeEffect = sin(uTime * 0.3) * 0.1 + 0.9;
          baseColor *= timeEffect * uSensitivity;
          
          // 根据UV坐标添加边缘渐变效果
          float edgeFade = 1.0 - length(vUv - 0.5) * 2.0;
          edgeFade = smoothstep(0.0, 0.3, edgeFade);
          
          // 最终颜色输出
          gl_FragColor = vec4(baseColor, edgeFade);
        }
      `
    });

    // 创建网格对象并添加到场景
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // ============================================================================
    // 创建GUI控制面板
    // ============================================================================
    const gui = new GUI();
    
    // 交互类型控制
    const interactiveTypes = {
      "涟漪效果": 0,
      "粒子跟随": 1,
      "画笔效果": 2,
      "引力场": 3,
      "声音可视化": 4
    };
    
    gui.add(material.uniforms.uInteractiveType, 'value', interactiveTypes).name('交互类型');
    gui.add(material.uniforms.uIntensity, 'value', 0.1, 3.0).name('效果强度');
    gui.add(material.uniforms.uSensitivity, 'value', 0.1, 2.0).name('灵敏度');
    gui.add(material.uniforms.uDecay, 'value', 0.01, 0.5).name('衰减速度');
    
    // 颜色控制
    const colorFolder = gui.addFolder('颜色设置');
    colorFolder.addColor(material.uniforms.uColor1, 'value').name('主色');
    colorFolder.addColor(material.uniforms.uColor2, 'value').name('辅色');
    colorFolder.addColor(material.uniforms.uColor3, 'value').name('高光色');
    colorFolder.open();

    // ============================================================================
    // 动画循环
    // ============================================================================
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间变量，驱动动画效果
      material.uniforms.uTime.value += 0.01;
      
      // 更新交互状态到着色器
      material.uniforms.uMouseX.value = interactionState.mouseX;
      material.uniforms.uMouseY.value = interactionState.mouseY;
      material.uniforms.uMouseDown.value = interactionState.mouseDown ? 1.0 : 0.0;
      material.uniforms.uClickX.value = interactionState.clickPosition.x;
      material.uniforms.uClickY.value = interactionState.clickPosition.y;
      material.uniforms.uTimeSinceClick.value = interactionState.timeSinceClick;
      material.uniforms.uVelocityX.value = interactionState.velocity.x;
      material.uniforms.uVelocityY.value = interactionState.velocity.y;
      
      // 更新点击后时间（如果鼠标按下）
      if(interactionState.mouseDown) {
        interactionState.timeSinceClick += 0.01;
      }
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 启动动画循环
    animate();
  </script>
</body>

</html>
