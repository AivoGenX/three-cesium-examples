<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 流体动力学效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 7);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float viscosity;
                uniform float turbulence;
                uniform float flowSpeed;
                uniform vec3 fluidColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 流体噪声函数
                float fluidNoise(vec2 p) {
                    return sin(p.x * 10.0 + time) * cos(p.y * 8.0 + time) * 0.5 + 0.5;
                }
                
                // 涡旋场函数
                vec2 vortexField(vec2 uv, float time) {
                    vec2 center = vec2(0.5, 0.5);
                    vec2 dir = uv - center;
                    float dist = length(dir);
                    float angle = atan(dir.y, dir.x);
                    
                    // 创建涡旋效果
                    angle += sin(dist * 10.0 + time * flowSpeed) * turbulence;
                    
                    return vec2(cos(angle), sin(angle)) * dist * 0.5;
                }
                
                // 流体密度计算
                float fluidDensity(vec2 uv, float time) {
                    vec2 vortex = vortexField(uv, time);
                    
                    float density = 0.0;
                    for (int i = 0; i < 3; i++) {
                        float frequency = float(i + 1) * 2.0;
                        density += fluidNoise(uv * frequency + vortex) / float(i + 1);
                    }
                    
                    return density * viscosity;
                }
                
                // 流体颜色映射
                vec3 fluidColorMap(float density) {
                    vec3 deepColor = vec3(0.0, 0.2, 0.8);   // 深蓝色
                    vec3 midColor = vec3(0.2, 0.6, 1.0);     // 中蓝色
                    vec3 surfaceColor = vec3(0.8, 0.9, 1.0); // 表面色
                    
                    if (density < 0.3) {
                        return mix(deepColor, midColor, density / 0.3);
                    } else {
                        return mix(midColor, surfaceColor, (density - 0.3) / 0.7);
                    }
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 计算流体密度
                    float density = fluidDensity(uv, time);
                    
                    // 获取基础流体颜色
                    vec3 color = fluidColorMap(density);
                    
                    // 应用自定义颜色
                    color *= fluidColor;
                    
                    // 添加流动线
                    float flowLines = sin(uv.x * 20.0 + time * 2.0) * 0.2 + 0.8;
                    color *= flowLines;
                    
                    // 添加泡沫效果
                    float foam = sin(uv.x * 30.0 + time * 3.0) * sin(uv.y * 30.0 + time * 3.0) * 0.1;
                    color += foam * vec3(1.0, 1.0, 1.0);
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    viscosity: { value: 0.8 },
                    turbulence: { value: 0.5 },
                    flowSpeed: { value: 1.0 },
                    fluidColor: { value: new THREE.Color(0x3366ff) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.SphereGeometry(2.5, 64, 64);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
            
            // 添加旋转动画
            gsap.to(_primitive.rotation, {
                y: Math.PI * 2,
                duration: 25,
                repeat: -1,
                ease: "none"
            });
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                fluidColor: '#3366ff',
                viscosity: 0.8,
                turbulence: 0.5,
                flowSpeed: 1.0,
                reset: function() {
                    mat.uniforms.fluidColor.value.set('#3366ff');
                    mat.uniforms.viscosity.value = 0.8;
                    mat.uniforms.turbulence.value = 0.5;
                    mat.uniforms.flowSpeed.value = 1.0;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'fluidColor').onChange(value => {
                mat.uniforms.fluidColor.value.set(value);
            });
            gui.add(mat.uniforms.viscosity, 'value', 0.1, 1.5).name('粘度');
            gui.add(mat.uniforms.turbulence, 'value', 0.1, 1.0).name('湍流强度');
            gui.add(mat.uniforms.flowSpeed, 'value', 0.1, 3.0).name('流动速度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
