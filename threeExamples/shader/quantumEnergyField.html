<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js量子能量场着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00ffff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #00ffff;
      border: 1px solid #00ffff;
      box-shadow: 0 0 20px #00ffff;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ff00ff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff00ff;
      border: 1px solid #ff00ff;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">⚡ 量子能量场 - 实时渲染 ⚡</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变能量场效果<br>
    • 实时交互：体验动态量子效果
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x0a0a2a);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,5)的位置观察场景
    camera.position.set(0, 0, 5)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 量子能量场参数
    const quantumParams = {
      energyIntensity: 2.0,
      pulseSpeed: 0.5,
      glowIntensity: 1.5,
      waveFrequency: 0.8,
      particleDensity: 0.7,
      colorScheme: 0
    };

    // 创建球体几何体，作为量子能量场的载体
    const geometry = new THREE.SphereGeometry(2, 64, 64);

    // 顶点着色器代码 - 量子能量场效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uEnergyIntensity;
      uniform float uPulseSpeed;
      uniform float uWaveFrequency;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vNormal = normal;
        
        // 量子波动效果
        float wave = sin(position.x * uWaveFrequency + uTime * uPulseSpeed) * 
                    cos(position.y * uWaveFrequency + uTime * uPulseSpeed) *
                    sin(position.z * uWaveFrequency + uTime * uPulseSpeed);
        
        vec3 newPosition = position + normal * wave * uEnergyIntensity * 0.1;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    // 片段着色器代码 - 量子能量场效果
      const fragmentShader = `
        varying vec2 vUv;
        varying vec3 vPosition;
        varying vec3 vNormal;
        
        uniform float uTime;
        uniform float uEnergyIntensity;
        uniform float uGlowIntensity;
        uniform float uParticleDensity;
        uniform float uPulseSpeed;
        uniform int uColorScheme;
      
      // 噪声函数
      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // 量子粒子效果
      float quantumParticles(vec2 uv, float density) {
        float particles = 0.0;
        for(int i = 0; i < 10; i++) {
          vec2 seed = vec2(float(i) * 0.123, uTime * 0.5);
          vec2 particlePos = vec2(hash(seed), hash(seed + 0.5));
          float dist = distance(uv, particlePos);
          particles += exp(-dist * 20.0) * density;
        }
        return particles;
      }
      
      void main() {
        vec2 uv = vUv * 2.0 - 1.0;
        
        // 基础能量场
        float energyField = sin(vUv.x * 10.0 + uTime * uParticleDensity) * 
                          cos(vUv.y * 10.0 + uTime * uParticleDensity);
        
        // 量子粒子
        float particles = quantumParticles(vUv, uParticleDensity);
        
        // 脉冲效果
        float pulse = sin(uTime * uPulseSpeed) * 0.5 + 0.5;
        
        // 颜色方案
        vec3 color;
        if(uColorScheme == 0) {
          // 蓝色量子能量
          color = vec3(0.0, 0.5, 1.0);
        } else if(uColorScheme == 1) {
          // 紫色量子能量
          color = vec3(0.8, 0.2, 1.0);
        } else {
          // 绿色量子能量
          color = vec3(0.2, 1.0, 0.5);
        }
        
        // 最终颜色计算
        vec3 finalColor = color * (energyField * 0.3 + particles * 0.7 + pulse * 0.5) * uEnergyIntensity;
        
        // 发光效果
        float glow = length(vUv - 0.5) * 2.0;
        finalColor *= exp(-glow * 2.0) * uGlowIntensity;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uEnergyIntensity: { value: quantumParams.energyIntensity },
        uPulseSpeed: { value: quantumParams.pulseSpeed },
        uGlowIntensity: { value: quantumParams.glowIntensity },
        uWaveFrequency: { value: quantumParams.waveFrequency },
        uParticleDensity: { value: quantumParams.particleDensity },
        uColorScheme: { value: quantumParams.colorScheme }
      }
    });

    // 创建网格对象并添加到场景中
    const quantumSphere = new THREE.Mesh(geometry, material);
    scene.add(quantumSphere);

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 能量场参数控制
    const energyFolder = gui.addFolder('能量场参数');
    energyFolder.add(quantumParams, 'energyIntensity', 0.1, 5.0).name('能量强度');
    energyFolder.add(quantumParams, 'pulseSpeed', 0.1, 2.0).name('脉冲速度');
    energyFolder.add(quantumParams, 'glowIntensity', 0.1, 3.0).name('发光强度');
    energyFolder.add(quantumParams, 'waveFrequency', 0.1, 2.0).name('波动频率');
    energyFolder.add(quantumParams, 'particleDensity', 0.1, 1.5).name('粒子密度');
    
    // 颜色方案控制
    const colorSchemes = {
      "蓝色量子": 0,
      "紫色量子": 1,
      "绿色量子": 2
    };
    energyFolder.add(quantumParams, 'colorScheme', colorSchemes).name('颜色方案');
    
    energyFolder.open();

    // 参数变化时更新材质
    gui.onChange(() => {
      material.uniforms.uEnergyIntensity.value = quantumParams.energyIntensity;
      material.uniforms.uPulseSpeed.value = quantumParams.pulseSpeed;
      material.uniforms.uGlowIntensity.value = quantumParams.glowIntensity;
      material.uniforms.uWaveFrequency.value = quantumParams.waveFrequency;
      material.uniforms.uParticleDensity.value = quantumParams.particleDensity;
      material.uniforms.uColorScheme.value = quantumParams.colorScheme;
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转球体
      quantumSphere.rotation.x += 0.005;
      quantumSphere.rotation.y += 0.008;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 启动动画循环
    animate();
  </script>
</body>

</html>
