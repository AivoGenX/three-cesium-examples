<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 量子场效应</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 5);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 添加光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform vec3 color1;
                uniform vec3 color2;
                uniform float speed;
                uniform float intensity;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 量子噪声函数
                float quantumNoise(vec2 p) {
                    return sin(p.x * 10.0 + time) * cos(p.y * 8.0 + time) * 0.5 + 0.5;
                }
                
                // 场强度函数
                float fieldStrength(vec2 p) {
                    float f = 0.0;
                    for (int i = 0; i < 3; i++) {
                        f += quantumNoise(p * float(i + 1) * 2.0) / float(i + 1);
                    }
                    return f;
                }
                
                void main() {
                    vec2 uv = vUv * 2.0 - 1.0;
                    float dist = length(uv);
                    
                    // 计算量子场强度
                    float field = fieldStrength(uv * 5.0 + time * speed);
                    
                    // 创建量子波动效果
                    float wave = sin(dist * 20.0 - time * 3.0) * 0.5 + 0.5;
                    
                    // 混合颜色
                    vec3 color = mix(color1, color2, field * wave);
                    
                    // 添加发光效果
                    float glow = smoothstep(0.3, 0.0, dist) * intensity;
                    color += glow * vec3(0.5, 0.8, 1.0);
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    color1: { value: new THREE.Color(0x00ff88) },
                    color2: { value: new THREE.Color(0x0088ff) },
                    speed: { value: 1.0 },
                    intensity: { value: 1.0 }
                },
                transparent: true
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(4, 4, 64, 64);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                color1: '#00ff88',
                color2: '#0088ff',
                speed: 1.0,
                intensity: 1.0,
                reset: function() {
                    mat.uniforms.color1.value.set('#00ff88');
                    mat.uniforms.color2.value.set('#0088ff');
                    mat.uniforms.speed.value = 1.0;
                    mat.uniforms.intensity.value = 1.0;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'color1').onChange(value => {
                mat.uniforms.color1.value.set(value);
            });
            gui.addColor(params, 'color2').onChange(value => {
                mat.uniforms.color2.value.set(value);
            });
            gui.add(mat.uniforms.speed, 'value', 0.1, 3.0).name('速度');
            gui.add(mat.uniforms.intensity, 'value', 0.1, 2.0).name('强度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
