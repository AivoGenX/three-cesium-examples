<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js星空粒子场着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #000428 0%, #004e92 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #ffcc00;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #ffcc00;
      border: 1px solid #ffcc00;
      box-shadow: 0 0 20px #ffcc00;
    }
  </style>
</head>

<body>
  <div class="info">✨ 星空粒子场着色器 - 实时渲染 🌌</div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x000428);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(75, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(1,1,1)的位置观察场景
    camera.position.set(0, 0, 5)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 创建球体几何体，作为星空粒子的载体
    const geometry = new THREE.SphereGeometry(3, 64, 64);

    // 创建自定义着色器材质，实现星空粒子场效果
    const material = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,          // 双面渲染
      transparent: true,               // 启用透明度
      blending: THREE.AdditiveBlending, // 添加混合模式让效果更亮
      uniforms: {
        uTime: { value: 0.0 },           // 时间变量
        uStarDensity: { value: 0.3 },    // 星星密度
        uStarSize: { value: 0.02 },      // 星星大小
        uTwinkleSpeed: { value: 2.0 },   // 闪烁速度
        uMovementSpeed: { value: 0.5 },  // 移动速度
        uColor1: { value: new THREE.Color(0xffffff) },    // 主颜色1
        uColor2: { value: new THREE.Color(0x00ffff) },    // 主颜色2
        uColor3: { value: new THREE.Color(0xff00ff) },    // 主颜色3
        uIntensity: { value: 2.0 },      // 强度
        uGlow: { value: 1.5 },           // 发光强度
        uPulse: { value: 0.3 }           // 脉冲效果
      },
      // 顶点着色器：星空粒子变形
      vertexShader: `
        uniform float uTime;
        uniform float uMovementSpeed;
        uniform float uPulse;
        
        varying vec2 vUv;
        varying vec3 vPosition;
        varying float vRandom;
        varying float vPulse;
        
        // 随机数生成器
        float random(vec2 st) {
          return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
        }
        
        void main() {
          vUv = uv;
          vPosition = position;
          
          // 生成随机数用于星星分布
          vRandom = random(uv * 100.0);
          
          // 脉冲效果
          vPulse = sin(uTime * 3.0) * 0.5 + 0.5;
          
          // 星空粒子变形
          vec3 newPosition = position;
          
          // 轻微波动效果
          float wave = sin(uTime * uMovementSpeed + length(position) * 5.0) * 0.1;
          newPosition += normalize(position) * wave;
          
          // 脉冲效果影响
          newPosition *= 1.0 + vPulse * uPulse * 0.1;
          
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
    `,
      // 片段着色器：星空粒子视觉效果
      fragmentShader: `
        uniform float uTime;
        uniform float uStarDensity;
        uniform float uStarSize;
        uniform float uTwinkleSpeed;
        uniform float uIntensity;
        uniform float uGlow;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        uniform vec3 uColor3;
        
        varying vec2 vUv;
        varying vec3 vPosition;
        varying float vRandom;
        varying float vPulse;
        
        // 改进的随机数生成器
        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
        }
        
        // 噪声函数
        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          
          float a = hash(i);
          float b = hash(i + vec2(1.0, 0.0));
          float c = hash(i + vec2(0.0, 1.0));
          float d = hash(i + vec2(1.0, 1.0));
          
          vec2 u = f * f * (3.0 - 2.0 * f);
          
          return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
        }
        
        void main() {
          // 生成星星图案
          vec2 starCoord = vUv * 50.0;
          float starPattern = noise(starCoord);
          
          // 星星密度控制
          float starDensity = step(1.0 - uStarDensity, starPattern);
          
          // 星星大小控制
          float starSize = uStarSize;
          float star = smoothstep(1.0 - starSize, 1.0, starPattern) * starDensity;
          
          // 闪烁效果
          float twinkle = sin(uTime * uTwinkleSpeed + vRandom * 10.0) * 0.5 + 0.5;
          star *= twinkle;
          
          // 脉冲效果
          star *= 1.0 + vPulse * 0.5;
          
          // 颜色渐变
          float colorMix1 = sin(uTime * 1.5 + vPosition.x * 2.0) * 0.5 + 0.5;
          float colorMix2 = cos(uTime * 2.0 + vPosition.y * 2.0) * 0.5 + 0.5;
          
          vec3 colorA = mix(uColor1, uColor2, colorMix1);
          vec3 colorB = mix(colorA, uColor3, colorMix2);
          
          vec3 finalColor = colorB;
          
          // 发光效果
          float glow = pow(star, 2.0) * uGlow;
          finalColor *= 1.0 + glow;
          
          // 计算最终颜色和透明度
          finalColor *= star * uIntensity;
          float alpha = star * uIntensity;
          
          // 确保透明度在合理范围内
          alpha = clamp(alpha, 0.0, 0.95);
          
          gl_FragColor = vec4(finalColor, alpha);
        }
    `
    });

    // 创建网格对象，将几何体和材质组合，并添加到场景中
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // 添加环境光
    const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
    scene.add(ambientLight);

    // 添加点光源，增强立体感
    const pointLight = new THREE.PointLight(0xffffff, 0.8, 10);
    pointLight.position.set(2, 2, 2);
    scene.add(pointLight);

    // 创建图形界面控制器
    const gui = new GUI()
    const params = {
      主颜色1: '#ffffff',
      主颜色2: '#00ffff',
      主颜色3: '#ff00ff',
      星星密度: 0.3,
      星星大小: 0.02,
      闪烁速度: 2.0,
      移动速度: 0.5,
      效果强度: 2.0,
      发光强度: 1.5,
      脉冲效果: 0.3
    }

    // 颜色控制
    gui.addColor(params, '主颜色1').onChange((value) => {
      material.uniforms.uColor1.value.set(value);
    });
    gui.addColor(params, '主颜色2').onChange((value) => {
      material.uniforms.uColor2.value.set(value);
    });
    gui.addColor(params, '主颜色3').onChange((value) => {
      material.uniforms.uColor3.value.set(value);
    });

    // 参数控制
    gui.add(params, '星星密度', 0.1, 0.8).onChange((value) => {
      material.uniforms.uStarDensity.value = value;
    });
    gui.add(params, '星星大小', 0.005, 0.05).onChange((value) => {
      material.uniforms.uStarSize.value = value;
    });
    gui.add(params, '闪烁速度', 0.1, 5.0).onChange((value) => {
      material.uniforms.uTwinkleSpeed.value = value;
    });
    gui.add(params, '移动速度', 0.1, 2.0).onChange((value) => {
      material.uniforms.uMovementSpeed.value = value;
    });
    gui.add(params, '效果强度', 0.5, 5.0).onChange((value) => {
      material.uniforms.uIntensity.value = value;
    });
    gui.add(params, '发光强度', 0.5, 3.0).onChange((value) => {
      material.uniforms.uGlow.value = value;
    });
    gui.add(params, '脉冲效果', 0.0, 1.0).onChange((value) => {
      material.uniforms.uPulse.value = value;
    });

    // 动画循环函数
    animate()

    function animate() {
      requestAnimationFrame(animate)
      controls.update()
      renderer.render(scene, camera)
      material.uniforms.uTime.value += 0.016;
    }
  </script>
</body>
</html>
