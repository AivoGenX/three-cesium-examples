<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js量子场效果着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #003366 0%, #001133 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #66ffff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #66ffff;
      border: 1px solid #66ffff;
      box-shadow: 0 0 20px #66ffff;
    }
    .quantum-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #ff66ff;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff66ff;
      border: 1px solid #ff66ff;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ffff66;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ffff66;
      border: 1px solid #ffff66;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">⚛️ 量子场效果 - 实时渲染 ⚛️</div>
  <div class="quantum-info" id="quantumInfo">量子态: 叠加 | 场强度: 高</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变量子场效果<br>
    • 实时交互：体验量子世界
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x003366);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,8)的位置观察场景
    camera.position.set(0, 0, 8)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 量子场效果参数
    const quantumParams = {
      fieldStrength: 0.8,
      quantumState: 0.7,
      particleDensity: 0.6,
      glowIntensity: 1.2,
      waveFunction: 0.8,
      quantumType: 0,
      showParticles: true
    };

    // 创建立方体几何体，作为量子场的载体
    const geometry = new THREE.BoxGeometry(3, 3, 3);

    // 顶点着色器代码 - 量子场效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uFieldStrength;
      uniform float uQuantumState;
      uniform float uWaveFunction;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vNormal = normal;
        
        // 量子场强度效果
        float field = sin(position.x * 3.0 + uTime * uFieldStrength) * 
                     cos(position.y * 4.0 + uTime * uFieldStrength * 0.8) *
                     sin(position.z * 3.0 + uTime * uFieldStrength * 0.6);
        
        // 量子态
        float quantum = sin(position.x * 5.0 + uTime * uQuantumState * 2.0) *
                       cos(position.z * 5.0 + uTime * uQuantumState * 2.0);
        
        // 波函数
        float wave = sin(position.x * uWaveFunction * 6.0) *
                    cos(position.y * uWaveFunction * 8.0);
        
        vec3 newPosition = position + normal * (field + quantum * 0.5 + wave * 0.3) * 0.15;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    // 片段着色器代码 - 量子场效果
    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uFieldStrength;
      uniform float uQuantumState;
      uniform float uParticleDensity;
      uniform float uGlowIntensity;
      uniform float uWaveFunction;
      uniform int uQuantumType;
      uniform bool uShowParticles;
      
      // 噪声函数
      float noise(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // 量子场效果
      float quantumField(vec2 uv, float strength) {
        float field = 0.0;
        
        // 多层量子场
        field += sin(uv.x * 4.0 + uTime * 0.3) * 
                cos(uv.y * 6.0 + uTime * 0.5);
        field += sin(uv.x * 6.0 + uTime * 0.7) * 
                cos(uv.y * 8.0 + uTime * 0.9) * 0.7;
        field += sin(uv.x * 8.0 + uTime * 1.1) * 
                cos(uv.y * 10.0 + uTime * 1.3) * 0.4;
        
        return field * strength;
      }
      
      // 粒子效果
      float quantumParticles(vec2 uv, float density) {
        float particleField = 0.0;
        for(int i = 0; i < 20; i++) {
          vec2 particlePos = vec2(
            noise(vec2(float(i) * 0.123, 0.456)),
            noise(vec2(float(i) * 0.456, 0.789))
          );
          float dist = distance(uv, particlePos);
          float particleSize = noise(vec2(float(i) * 0.789, 0.123)) * 0.04 + 0.02;
          float particleLife = mod(uTime * 1.5 + float(i) * 8.0, 6.28);
          float particleIntensity = sin(particleLife) * 0.7 + 0.3;
          particleField += exp(-dist * 45.0) * particleIntensity * density;
        }
        return particleField;
      }
      
      // 量子类型
      vec3 getQuantumType(int type) {
        if(type == 0) {
          // 电子场
          return vec3(0.2, 0.6, 1.0);
        } else if(type == 1) {
          // 夸克场
          return vec3(1.0, 0.2, 0.4);
        } else {
          // 光子场
          return vec3(1.0, 0.8, 0.2);
        }
      }
      
      void main() {
        vec2 uv = vUv;
        
        // 量子场效果
        float fieldValue = quantumField(uv, uFieldStrength);
        
        // 粒子效果
        float particleValue = quantumParticles(uv, uParticleDensity);
        
        // 颜色计算
        vec3 baseColor = getQuantumType(uQuantumType);
        vec3 finalColor = baseColor * (fieldValue * 0.6 + particleValue * 0.4) * uGlowIntensity;
        
        // 波函数效果
        float waveEffect = sin(uTime * uWaveFunction) * 0.2 + 0.8;
        finalColor *= waveEffect;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uFieldStrength: { value: quantumParams.fieldStrength },
        uQuantumState: { value: quantumParams.quantumState },
        uParticleDensity: { value: quantumParams.particleDensity },
        uGlowIntensity: { value: quantumParams.glowIntensity },
        uWaveFunction: { value: quantumParams.waveFunction },
        uQuantumType: { value: quantumParams.quantumType },
        uShowParticles: { value: quantumParams.showParticles }
      }
    });

    // 创建网格对象并添加到场景中
    const quantumCube = new THREE.Mesh(geometry, material);
    scene.add(quantumCube);

    // 更新量子信息显示
    function updateQuantumInfo() {
      const quantumElement = document.getElementById('quantumInfo');
      let state = "确定";
      if(quantumParams.quantumState > 0.4) state = "叠加";
      if(quantumParams.quantumState > 0.7) state = "纠缠";
      
      let strength = "低";
      if(quantumParams.fieldStrength > 0.5) strength = "中";
      if(quantumParams.fieldStrength > 0.8) strength = "高";
      
      quantumElement.textContent = `量子态: ${state} | 场强度: ${strength}`;
    }

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 量子场参数控制
    const quantumFolder = gui.addFolder('量子场效果参数');
    quantumFolder.add(quantumParams, 'fieldStrength', 0.1, 1.2).name('场强度');
    quantumFolder.add(quantumParams, 'quantumState', 0.1, 1.0).name('量子态');
    quantumFolder.add(quantumParams, 'particleDensity', 0.1, 1.0).name('粒子密度');
    quantumFolder.add(quantumParams, 'glowIntensity', 0.1, 1.8).name('发光强度');
    quantumFolder.add(quantumParams, 'waveFunction', 0.1, 0.9).name('波函数');
    quantumFolder.add(quantumParams, 'showParticles').name('显示粒子');
    
    // 量子类型控制
    const quantumTypes = {
      "电子场": 0,
      "夸克场": 1,
      "光子场": 2
    };
    quantumFolder.add(quantumParams, 'quantumType', quantumTypes).name('量子类型');
    
    quantumFolder.open();

    // 参数变化时更新材质和量子信息
    gui.onChange(() => {
      material.uniforms.uFieldStrength.value = quantumParams.fieldStrength;
      material.uniforms.uQuantumState.value = quantumParams.quantumState;
      material.uniforms.uParticleDensity.value = quantumParams.particleDensity;
      material.uniforms.uGlowIntensity.value = quantumParams.glowIntensity;
      material.uniforms.uWaveFunction.value = quantumParams.waveFunction;
      material.uniforms.uQuantumType.value = quantumParams.quantumType;
      material.uniforms.uShowParticles.value = quantumParams.showParticles;
      
      updateQuantumInfo();
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转量子场立方体
      quantumCube.rotation.y += quantumParams.quantumState * 0.01;
      quantumCube.rotation.x += quantumParams.quantumState * 0.005;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 初始化量子信息显示
    updateQuantumInfo();

    // 启动动画循环
    animate();
  </script>
</body>

</html>
