<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js史诗级烟雾特效（修复版）</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #0c1445 0%, #000000 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00ffff;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #00ffff;
      border: 1px solid #00ffff;
      box-shadow: 0 0 20px #00ffff;
    }
  </style>
</head>

<body>
  <div class="info">🔥 史诗级烟雾特效（修复版）- 点击屏幕切换效果 🔥</div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x0c1445);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(1,1,1)的位置观察场景
    camera.position.set(0, 0, 5)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 创建平面几何体，作为烟雾效果的载体
    const geometry = new THREE.PlaneGeometry(4, 4, 64, 64);

    // 创建自定义着色器材质，实现史诗级烟雾效果
    const material = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,          // 双面渲染
      transparent: true,               // 启用透明度
      blending: THREE.AdditiveBlending, // 添加混合模式让效果更亮
      uniforms: {
        uTime: { value: 0.0 },           // 时间变量
        uNoiseScale: { value: 3.0 },     // 噪声缩放
        uSpeed: { value: 1.5 },          // 移动速度
        uDensity: { value: 1.2 },        // 烟雾密度
        uRiseSpeed: { value: 0.8 },      // 上升速度
        uColor1: { value: new THREE.Color(0xff00ff) },    // 主颜色1
        uColor2: { value: new THREE.Color(0x00ffff) },    // 主颜色2
        uColor3: { value: new THREE.Color(0xffff00) },     // 主颜色3
        uIntensity: { value: 2.0 },      // 烟雾强度
        uTurbulence: { value: 0.8 },     // 湍流强度
        uGlow: { value: 1.5 },           // 发光强度
        uPulseSpeed: { value: 2.0 },     // 脉冲速度
        uSparkle: { value: 0.5 },        // 闪烁效果
        uEffectType: { value: 0 }        // 效果类型
      },
      // 顶点着色器：简化但效果明显的烟雾变形
      vertexShader: `
        uniform float uTime;
        uniform float uNoiseScale;
        uniform float uSpeed;
        uniform float uRiseSpeed;
        uniform float uTurbulence;
        uniform float uPulseSpeed;
        uniform float uEffectType;
        
        varying vec2 vUv;
        varying vec3 vPosition;
        varying float vNoise;
        varying float vPulse;
        
        // 简单的2D噪声函数
        float noise(vec2 p) {
          return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }
        
        // 改进的噪声函数
        float improvedNoise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          
          float a = noise(i);
          float b = noise(i + vec2(1.0, 0.0));
          float c = noise(i + vec2(0.0, 1.0));
          float d = noise(i + vec2(1.0, 1.0));
          
          vec2 u = f * f * (3.0 - 2.0 * f);
          
          return mix(a, b, u.x) + 
                 (c - a) * u.y * (1.0 - u.x) + 
                 (d - b) * u.x * u.y;
        }
        
        void main() {
          vUv = uv;
          vPosition = position;
          
          // 计算噪声
          vec2 noiseCoord = uv * uNoiseScale;
          noiseCoord.y -= uTime * uRiseSpeed;
          noiseCoord.x += uTime * uSpeed;
          
          float noise1 = improvedNoise(noiseCoord);
          float noise2 = improvedNoise(noiseCoord * 2.0 + 10.0);
          float noise3 = improvedNoise(noiseCoord * 4.0 + 20.0);
          
          // 组合多层噪声
          vNoise = noise1 * 0.6 + noise2 * 0.3 + noise3 * 0.1;
          
          // 脉冲效果
          vPulse = sin(uTime * uPulseSpeed) * 0.5 + 0.5;
          
          // 根据效果类型应用不同的变形
          vec3 newPosition = position;
          
          if(uEffectType < 0.5) {
            // 效果1：爆炸式烟雾
            newPosition.z += vNoise * 1.0 + vPulse * 0.5;
            newPosition.x += sin(uTime * 3.0 + position.y * 2.0) * 0.3;
            newPosition.y += cos(uTime * 2.0 + position.x * 2.0) * 0.3;
          } else {
            // 效果2：漩涡式烟雾
            float angle = uTime * 2.0 + length(position.xy) * 3.0;
            newPosition.z += vNoise * 0.8;
            newPosition.x += cos(angle) * 0.4;
            newPosition.y += sin(angle) * 0.4;
          }
          
          // 湍流效果
          float turbulence = sin(vNoise * 15.0 + uTime * 5.0) * uTurbulence;
          newPosition.x += turbulence * 0.1;
          newPosition.y += turbulence * 0.05;
          
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
    `,
      // 片段着色器：史诗级烟雾视觉效果
      fragmentShader: `
        uniform float uTime;
        uniform float uDensity;
        uniform float uIntensity;
        uniform float uGlow;
        uniform float uSparkle;
        uniform float uEffectType;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        uniform vec3 uColor3;
        
        varying vec2 vUv;
        varying vec3 vPosition;
        varying float vNoise;
        varying float vPulse;
        
        void main() {
          // 基础烟雾密度
          float density = vNoise * uDensity;
          
          // 动态效果增强
          float timeEffect1 = sin(uTime * 3.0 + vNoise * 8.0) * 0.3 + 0.7;
          float timeEffect2 = cos(uTime * 2.0 + length(vPosition.xy) * 5.0) * 0.2 + 0.8;
          density *= timeEffect1 * timeEffect2;
          
          // 脉冲效果
          density *= 1.0 + vPulse * 0.5;
          
          // 边缘衰减
          float edgeFade = 1.0 - length(vUv - 0.5) * 2.0;
          edgeFade = smoothstep(0.0, 1.0, edgeFade);
          density *= edgeFade;
          
          // 颜色渐变和混合
          vec3 finalColor;
          if(uEffectType < 0.5) {
            // 效果1：彩虹渐变
            float colorMix = sin(uTime * 1.5 + vPosition.y * 2.0) * 0.5 + 0.5;
            vec3 colorA = mix(uColor1, uColor2, colorMix);
            vec3 colorB = mix(colorA, uColor3, vNoise);
            finalColor = colorB;
          } else {
            // 效果2：霓虹渐变
            float colorPhase = uTime * 0.5 + length(vPosition.xy) * 2.0;
            vec3 colorA = uColor1 * (sin(colorPhase) * 0.5 + 0.5);
            vec3 colorB = uColor2 * (cos(colorPhase + 2.0) * 0.5 + 0.5);
            vec3 colorC = uColor3 * (sin(colorPhase + 4.0) * 0.5 + 0.5);
            finalColor = (colorA + colorB + colorC) / 3.0;
          }
          
          // 发光效果
          float glow = pow(density, 2.0) * uGlow;
          finalColor *= 1.0 + glow;
          
          // 闪烁效果（星星点点的亮点）
          float sparkle = sin(vPosition.x * 20.0 + uTime * 10.0) * 
                         sin(vPosition.y * 15.0 + uTime * 8.0);
          sparkle = max(0.0, sparkle) * uSparkle;
          finalColor += vec3(sparkle);
          
          // 计算最终颜色和透明度
          finalColor *= density * uIntensity;
          float alpha = density * uIntensity;
          
          // 增强透明度效果
          alpha = clamp(alpha, 0.0, 0.9);
          alpha *= 1.0 + glow * 0.5;
          
          // 最终输出
          gl_FragColor = vec4(finalColor, alpha);
        }
    `
    });

    // 创建网格对象，将几何体和材质组合，并添加到场景中
    const mesh = new THREE.Mesh(geometry, material);
    // 将平面旋转90度，使其水平放置
    mesh.rotation.x = -Math.PI / 2
    scene.add(mesh);

    // 添加环境光
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    // 添加点光源，增强立体感
    const pointLight = new THREE.PointLight(0xffffff, 1.5, 10);
    pointLight.position.set(2, 2, 2);
    scene.add(pointLight);

    // 创建图形界面控制器
    const gui = new GUI()
    const params = {
      效果类型: "爆炸烟雾",
      主颜色1: '#ff00ff',
      主颜色2: '#00ffff', 
      主颜色3: '#ffff00',
      噪声缩放: 3.0,
      移动速度: 1.5,
      烟雾密度: 1.2,
      上升速度: 0.8,
      烟雾强度: 2.0,
      湍流强度: 0.8,
      发光强度: 1.5,
      脉冲速度: 2.0,
      闪烁效果: 0.5
    }

    // 效果类型切换
    const effectFolder = gui.addFolder('效果设置');
    effectFolder.add(params, '效果类型', ['爆炸烟雾', '漩涡烟雾']).onChange((value) => {
      material.uniforms.uEffectType.value = value === '爆炸烟雾' ? 0 : 1;
    });

    // 颜色控制
    const colorFolder = gui.addFolder('颜色设置');
    colorFolder.addColor(params, '主颜色1').onChange((value) => {
      material.uniforms.uColor1.value.set(value);
    });
    colorFolder.addColor(params, '主颜色2').onChange((value) => {
      material.uniforms.uColor2.value.set(value);
    });
    colorFolder.addColor(params, '主颜色3').onChange((value) => {
      material.uniforms.uColor3.value.set(value);
    });

    // 参数控制
    const paramFolder = gui.addFolder('特效参数');
    paramFolder.add(params, '噪声缩放', 0.1, 10.0).onChange((value) => {
      material.uniforms.uNoiseScale.value = value;
    });
    paramFolder.add(params, '移动速度', 0.1, 5.0).onChange((value) => {
      material.uniforms.uSpeed.value = value;
    });
    paramFolder.add(params, '烟雾密度', 0.1, 3.0).onChange((value) => {
      material.uniforms.uDensity.value = value;
    });
    paramFolder.add(params, '上升速度', 0.1, 2.0).onChange((value) => {
      material.uniforms.uRiseSpeed.value = value;
    });
    paramFolder.add(params, '烟雾强度', 0.1, 5.0).onChange((value) => {
      material.uniforms.uIntensity.value = value;
    });
    paramFolder.add(params, '湍流强度', 0.0, 2.0).onChange((value) => {
      material.uniforms.uTurbulence.value = value;
    });
    paramFolder.add(params, '发光强度', 0.1, 3.0).onChange((value) => {
      material.uniforms.uGlow.value = value;
    });
    paramFolder.add(params, '脉冲速度', 0.1, 5.0).onChange((value) => {
      material.uniforms.uPulseSpeed.value = value;
    });
    paramFolder.add(params, '闪烁效果', 0.0, 1.0).onChange((value) => {
      material.uniforms.uSparkle.value = value;
    });

    // 默认展开文件夹
    effectFolder.open();
    colorFolder.open();
    paramFolder.open();

    // 点击切换效果
    renderer.domElement.addEventListener('click', () => {
      if(params.效果类型 === '爆炸烟雾') {
        params.效果类型 = '漩涡烟雾';
        material.uniforms.uEffectType.value = 1;
      } else {
        params.效果类型 = '爆炸烟雾';
        material.uniforms.uEffectType.value = 0;
      }
    });

    // 动画循环函数
    animate()

    function animate() {
      requestAnimationFrame(animate)
      controls.update()
      renderer.render(scene, camera)
      material.uniforms.uTime.value += 0.016;
    }
  </script>
</body>
</html>
