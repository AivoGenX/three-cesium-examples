<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 极光效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 8);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float flowSpeed;
                uniform float intensity;
                uniform float waveFrequency;
                uniform vec3 auroraColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 极光流动函数
                float auroraFlow(vec2 uv, float time) {
                    float flow = 0.0;
                    
                    // 创建多层极光带
                    for (int i = 0; i < 3; i++) {
                        float layer = float(i) * 0.3;
                        float speed = flowSpeed * (1.0 + layer * 0.5);
                        
                        // 水平流动效果
                        float xFlow = sin(uv.x * waveFrequency + time * speed + layer * 3.14);
                        
                        // 垂直波动效果
                        float yWave = sin(uv.y * 10.0 + time * speed * 0.5) * 0.5 + 0.5;
                        
                        // 组合效果
                        flow += (xFlow * yWave) * (1.0 - layer * 0.3);
                    }
                    
                    return flow * 0.5 + 0.5;
                }
                
                // 极光颜色映射
                vec3 auroraColorMap(float intensity) {
                    vec3 color1 = vec3(0.0, 0.8, 0.4);  // 绿色
                    vec3 color2 = vec3(0.2, 0.4, 1.0);  // 蓝色
                    vec3 color3 = vec3(0.8, 0.2, 0.8);  // 紫色
                    
                    if (intensity < 0.3) {
                        return mix(color1, color2, intensity / 0.3);
                    } else if (intensity < 0.6) {
                        return mix(color2, color3, (intensity - 0.3) / 0.3);
                    } else {
                        return color3;
                    }
                }
                
                // 发光效果
                float glowEffect(vec2 uv, float time) {
                    float dist = length(uv - vec2(0.5, 0.3));
                    float pulse = sin(time * 2.0) * 0.5 + 0.5;
                    return smoothstep(0.4, 0.0, dist) * pulse;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 生成极光流动效果
                    float flow = auroraFlow(uv, time);
                    
                    // 应用强度
                    flow = pow(flow, intensity);
                    
                    // 获取极光颜色
                    vec3 color = auroraColorMap(flow);
                    
                    // 应用自定义颜色
                    color *= auroraColor;
                    
                    // 添加发光效果
                    float glow = glowEffect(uv, time);
                    color += glow * 0.3;
                    
                    // 添加星光效果
                    float stars = sin(uv.x * 50.0 + time) * sin(uv.y * 50.0 + time) * 0.1;
                    color += stars;
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    flowSpeed: { value: 1.0 },
                    intensity: { value: 1.2 },
                    waveFrequency: { value: 3.0 },
                    auroraColor: { value: new THREE.Color(0xffffff) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(8, 6, 64, 48);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                auroraColor: '#ffffff',
                flowSpeed: 1.0,
                intensity: 1.2,
                waveFrequency: 3.0,
                reset: function() {
                    mat.uniforms.auroraColor.value.set('#ffffff');
                    mat.uniforms.flowSpeed.value = 1.0;
                    mat.uniforms.intensity.value = 1.2;
                    mat.uniforms.waveFrequency.value = 3.0;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'auroraColor').onChange(value => {
                mat.uniforms.auroraColor.value.set(value);
            });
            gui.add(mat.uniforms.flowSpeed, 'value', 0.1, 3.0).name('流动速度');
            gui.add(mat.uniforms.intensity, 'value', 0.5, 2.0).name('强度');
            gui.add(mat.uniforms.waveFrequency, 'value', 1.0, 8.0).name('波动频率');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
