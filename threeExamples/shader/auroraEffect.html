<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js极光效果着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #000033 0%, #000066 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00ffcc;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #00ffcc;
      border: 1px solid #00ffcc;
      box-shadow: 0 0 20px #00ffcc;
    }
  </style>
</head>

<body>
  <div class="info">🌌 极光效果着色器 - 实时渲染 ✨</div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x000033);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(1,1,1)的位置观察场景
    camera.position.set(0, 0, 5)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 创建平面几何体，作为极光效果的载体
    const geometry = new THREE.PlaneGeometry(8, 4, 128, 64);

    // 创建自定义着色器材质，实现极光效果
    const material = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,          // 双面渲染
      transparent: true,               // 启用透明度
      blending: THREE.AdditiveBlending, // 添加混合模式让效果更亮
      uniforms: {
        uTime: { value: 0.0 },           // 时间变量
        uFlowSpeed: { value: 0.8 },      // 流动速度
        uWaveHeight: { value: 0.5 },     // 波浪高度
        uRippleSpeed: { value: 1.2 },    // 涟漪速度
        uAuroraWidth: { value: 0.3 },    // 极光宽度
        uColor1: { value: new THREE.Color(0x00ffcc) },    // 极光主色
        uColor2: { value: new THREE.Color(0x00aaff) },    // 极光辅色
        uColor3: { value: new THREE.Color(0xff00ff) },    // 极光高光
        uIntensity: { value: 2.0 },      // 强度
        uGlow: { value: 1.8 },           // 发光强度
        uPulse: { value: 0.4 }           // 脉冲效果
      },
      // 顶点着色器：极光变形
      vertexShader: `
        uniform float uTime;
        uniform float uFlowSpeed;
        uniform float uWaveHeight;
        uniform float uRippleSpeed;
        uniform float uAuroraWidth;
        uniform float uPulse;
        
        varying vec2 vUv;
        varying vec3 vPosition;
        varying float vWave;
        varying float vRipple;
        varying float vPulse;
        
        // 噪声函数
        float noise(vec2 p) {
          return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }
        
        // 改进的噪声函数
        float improvedNoise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          
          float a = noise(i);
          float b = noise(i + vec2(1.0, 0.0));
          float c = noise(i + vec2(0.0, 1.0));
          float d = noise(i + vec2(1.0, 1.0));
          
          vec2 u = f * f * (3.0 - 2.0 * f);
          
          return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
        }
        
        void main() {
          vUv = uv;
          vPosition = position;
          
          // 脉冲效果
          vPulse = sin(uTime * 2.0) * 0.5 + 0.5;
          
          // 计算波浪（水平流动）
          vWave = sin(position.x * 2.0 + uTime * uFlowSpeed) * 
                  (1.0 - abs(position.y) * 2.0);
          
          // 计算涟漪（垂直波动）
          vRipple = sin(position.y * 8.0 - uTime * uRippleSpeed) * 0.3 + 0.7;
          
          // 极光变形
          vec3 newPosition = position;
          
          // 波浪高度
          newPosition.z += vWave * uWaveHeight;
          
          // 涟漪效果
          newPosition.z += (vRipple - 0.5) * 0.1;
          
          // 脉冲效果影响
          newPosition.z += vPulse * uPulse * 0.2;
          
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
    `,
      // 片段着色器：极光视觉效果
      fragmentShader: `
        uniform float uTime;
        uniform float uIntensity;
        uniform float uGlow;
        uniform float uAuroraWidth;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        uniform vec3 uColor3;
        
        varying vec2 vUv;
        varying vec3 vPosition;
        varying float vWave;
        varying float vRipple;
        varying float vPulse;
        
        void main() {
          // 极光基础形状（带状）
          float auroraShape = 1.0 - smoothstep(0.0, uAuroraWidth, abs(vPosition.y));
          
          // 波浪密度
          float waveDensity = (vWave * 0.5 + 0.5) * 0.8;
          
          // 涟漪密度
          float rippleDensity = vRipple * 0.2;
          
          // 组合密度
          float density = (waveDensity + rippleDensity) * auroraShape;
          
          // 动态效果
          float timeEffect = sin(uTime * 1.5 + vPosition.x * 2.0) * 0.3 + 0.7;
          density *= timeEffect;
          
          // 脉冲效果
          density *= 1.0 + vPulse * 0.3;
          
          // 颜色渐变
          float colorMix1 = (vWave * 0.5 + 0.5);
          float colorMix2 = (1.0 - abs(vPosition.y) * 2.0);
          
          vec3 colorA = mix(uColor1, uColor2, colorMix1);
          vec3 colorB = mix(colorA, uColor3, colorMix2);
          
          vec3 finalColor = colorB;
          
          // 发光效果
          float glow = pow(density, 2.0) * uGlow;
          finalColor *= 1.0 + glow;
          
          // 边缘光晕
          float edgeGlow = 1.0 - smoothstep(uAuroraWidth * 0.8, uAuroraWidth, abs(vPosition.y));
          finalColor += vec3(0.2, 0.8, 1.0) * edgeGlow * 0.5;
          
          // 计算最终颜色和透明度
          finalColor *= density * uIntensity;
          float alpha = density * uIntensity;
          
          // 确保透明度在合理范围内
          alpha = clamp(alpha, 0.0, 0.9);
          
          gl_FragColor = vec4(finalColor, alpha);
        }
    `
    });

    // 创建网格对象，将几何体和材质组合，并添加到场景中
    const mesh = new THREE.Mesh(geometry, material);
    mesh.rotation.x = -Math.PI / 2
    scene.add(mesh);

    // 添加环境光
    const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
    scene.add(ambientLight);

    // 创建图形界面控制器
    const gui = new GUI()
    const params = {
      极光主色: '#00ffcc',
      极光辅色: '#00aaff',
      极光高光: '#ff00ff',
      流动速度: 0.8,
      波浪高度: 0.5,
      涟漪速度: 1.2,
      极光宽度: 0.3,
      效果强度: 2.0,
      发光强度: 1.8,
      脉冲效果: 0.4
    }

    // 颜色控制
    gui.addColor(params, '极光主色').onChange((value) => {
      material.uniforms.uColor1.value.set(value);
    });
    gui.addColor(params, '极光辅色').onChange((value) => {
      material.uniforms.uColor2.value.set(value);
    });
    gui.addColor(params, '极光高光').onChange((value) => {
      material.uniforms.uColor3.value.set(value);
    });

    // 参数控制
    gui.add(params, '流动速度', 0.2, 2.0).onChange((value) => {
      material.uniforms.uFlowSpeed.value = value;
    });
    gui.add(params, '波浪高度', 0.1, 1.0).onChange((value) => {
      material.uniforms.uWaveHeight.value = value;
    });
    gui.add(params, '涟漪速度', 0.5, 3.0).onChange((value) => {
      material.uniforms.uRippleSpeed.value = value;
    });
    gui.add(params, '极光宽度', 0.1, 0.8).onChange((value) => {
      material.uniforms.uAuroraWidth.value = value;
    });
    gui.add(params, '效果强度', 0.5, 4.0).onChange((value) => {
      material.uniforms.uIntensity.value = value;
    });
    gui.add(params, '发光强度', 0.5, 3.0).onChange((value) => {
      material.uniforms.uGlow.value = value;
    });
    gui.add(params, '脉冲效果', 0.0, 1.0).onChange((value) => {
      material.uniforms.uPulse.value = value;
    });

    // 动画循环函数
    animate()

    function animate() {
      requestAnimationFrame(animate)
      controls.update()
      renderer.render(scene, camera)
      material.uniforms.uTime.value += 0.016;
    }
  </script>
</body>
</html>
