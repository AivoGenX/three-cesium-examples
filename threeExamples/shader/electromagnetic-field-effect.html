<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js电磁场效果着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #000066 0%, #000033 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #66ccff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #66ccff;
      border: 1px solid #66ccff;
      box-shadow: 0 0 20px #66ccff;
    }
    .field-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #ff66cc;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff66cc;
      border: 1px solid #ff66cc;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ffff66;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ffff66;
      border: 1px solid #ffff66;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">⚡ 电磁场效果 - 实时渲染 ⚡</div>
  <div class="field-info" id="fieldInfo">电场: 活跃 | 磁场: 稳定</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变电磁场效果<br>
    • 实时交互：体验电场和磁场
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x000066);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,8)的位置观察场景
    camera.position.set(0, 0, 8)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 电磁场效果参数
    const emParams = {
      electricField: 0.8,
      magneticField: 0.7,
      fieldDensity: 0.6,
      glowIntensity: 1.2,
      waveFrequency: 0.8,
      fieldType: 0,
      showFieldLines: true
    };

    // 创建立方体几何体，作为电磁场的载体
    const geometry = new THREE.BoxGeometry(3, 3, 3);

    // 顶点着色器代码 - 电磁场效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uElectricField;
      uniform float uMagneticField;
      uniform float uWaveFrequency;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vNormal = normal;
        
        // 电场效果 - 产生波动和扭曲
        float electricWave = sin(position.x * 8.0 + uTime * uElectricField * 2.0) * 
                           cos(position.y * 6.0 + uTime * uElectricField * 1.5) *
                           sin(position.z * 4.0 + uTime * uElectricField * 0.8);
        
        // 磁场效果 - 产生环形扭曲
        float magneticRing = sin(distance(position, vec3(0.0)) * 10.0 + uTime * uMagneticField * 3.0) *
                           cos(uTime * uMagneticField * 2.0);
        
        // 场线效果
        float fieldLines = sin(position.x * 12.0 + uTime * uWaveFrequency * 4.0) *
                         cos(position.z * 12.0 + uTime * uWaveFrequency * 4.0);
        
        vec3 newPosition = position + normal * (electricWave * 0.2 + magneticRing * 0.15 + fieldLines * 0.1);
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    // 片段着色器代码 - 电磁场效果
    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uElectricField;
      uniform float uMagneticField;
      uniform float uFieldDensity;
      uniform float uGlowIntensity;
      uniform float uWaveFrequency;
      uniform int uFieldType;
      uniform bool uShowFieldLines;
      
      // 噪声函数
      float noise(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // 电场效果
      vec3 electricField(vec2 uv, float intensity) {
        vec3 electricColor = vec3(0.2, 0.6, 1.0); // 蓝色电场
        
        // 电场线效果
        float electricLines = 0.0;
        electricLines += sin(uv.x * 20.0 + uTime * 3.0) * 0.3;
        electricLines += sin(uv.y * 15.0 + uTime * 2.5) * 0.2;
        
        // 电场波动
        float electricWave = sin(uv.x * 8.0 + uTime * 2.0) * 
                           cos(uv.y * 6.0 + uTime * 1.5);
        
        return electricColor * (electricLines + electricWave) * intensity;
      }
      
      // 磁场效果
      vec3 magneticField(vec2 uv, float intensity) {
        vec3 magneticColor = vec3(1.0, 0.2, 0.6); // 粉色磁场
        
        // 磁场环效果
        vec2 center = vec2(0.5, 0.5);
        float dist = distance(uv, center);
        float magneticRing = sin(dist * 15.0 + uTime * 2.5) * 
                           cos(uTime * 3.0);
        
        // 磁场线
        float magneticLines = 0.0;
        if(uShowFieldLines) {
          magneticLines += sin(atan(uv.y - 0.5, uv.x - 0.5) * 8.0 + uTime * 2.0) * 0.2;
        }
        
        return magneticColor * (magneticRing + magneticLines) * intensity;
      }
      
      // 场线效果
      float fieldLines(vec2 uv, float density) {
        if(!uShowFieldLines) return 0.0;
        
        float lines = 0.0;
        
        // 水平场线
        lines += sin(uv.x * 25.0 + uTime * 2.0) * 0.1;
        
        // 垂直场线
        lines += sin(uv.y * 25.0 + uTime * 1.8) * 0.1;
        
        // 对角线
        lines += sin((uv.x + uv.y) * 18.0 + uTime * 1.5) * 0.05;
        
        return lines * density;
      }
      
      // 场类型
      vec3 getFieldType(int type) {
        if(type == 0) {
          // 电磁场混合
          return vec3(0.4, 0.4, 1.0);
        } else if(type == 1) {
          // 纯电场
          return vec3(0.2, 0.6, 1.0);
        } else {
          // 纯磁场
          return vec3(1.0, 0.2, 0.6);
        }
      }
      
      void main() {
        vec2 uv = vUv;
        
        // 电场效果
        vec3 electricValue = electricField(uv, uElectricField);
        
        // 磁场效果
        vec3 magneticValue = magneticField(uv, uMagneticField);
        
        // 场线效果
        float linesValue = fieldLines(uv, uFieldDensity);
        
        // 基础颜色
        vec3 baseColor = getFieldType(uFieldType);
        
        // 最终颜色计算
        vec3 finalColor = baseColor * (electricValue + magneticValue + vec3(linesValue)) * uGlowIntensity;
        
        // 波动频率效果
        float waveEffect = sin(uTime * uWaveFrequency) * 0.3 + 0.7;
        finalColor *= waveEffect;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uElectricField: { value: emParams.electricField },
        uMagneticField: { value: emParams.magneticField },
        uFieldDensity: { value: emParams.fieldDensity },
        uGlowIntensity: { value: emParams.glowIntensity },
        uWaveFrequency: { value: emParams.waveFrequency },
        uFieldType: { value: emParams.fieldType },
        uShowFieldLines: { value: emParams.showFieldLines }
      }
    });

    // 创建网格对象并添加到场景中
    const emCube = new THREE.Mesh(geometry, material);
    scene.add(emCube);

    // 更新电磁场信息显示
    function updateFieldInfo() {
      const fieldElement = document.getElementById('fieldInfo');
      let electric = "静止";
      if(emParams.electricField > 0.4) electric = "活跃";
      if(emParams.electricField > 0.7) electric = "非常活跃";
      
      let magnetic = "弱";
      if(emParams.magneticField > 0.5) magnetic = "稳定";
      if(emParams.magneticField > 0.8) magnetic = "强";
      
      fieldElement.textContent = `电场: ${electric} | 磁场: ${magnetic}`;
    }

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 电磁场参数控制
    const emFolder = gui.addFolder('电磁场效果参数');
    emFolder.add(emParams, 'electricField', 0.1, 1.2).name('电场强度');
    emFolder.add(emParams, 'magneticField', 0.1, 1.0).name('磁场强度');
    emFolder.add(emParams, 'fieldDensity', 0.1, 1.0).name('场线密度');
    emFolder.add(emParams, 'glowIntensity', 0.1, 1.8).name('发光强度');
    emFolder.add(emParams, 'waveFrequency', 0.1, 0.9).name('波动频率');
    emFolder.add(emParams, 'showFieldLines').name('显示场线');
    
    // 场类型控制
    const fieldTypes = {
      "电磁混合": 0,
      "纯电场": 1,
      "纯磁场": 2
    };
    emFolder.add(emParams, 'fieldType', fieldTypes).name('场类型');
    
    emFolder.open();

    // 参数变化时更新材质和电磁场信息
    gui.onChange(() => {
      material.uniforms.uElectricField.value = emParams.electricField;
      material.uniforms.uMagneticField.value = emParams.magneticField;
      material.uniforms.uFieldDensity.value = emParams.fieldDensity;
      material.uniforms.uGlowIntensity.value = emParams.glowIntensity;
      material.uniforms.uWaveFrequency.value = emParams.waveFrequency;
      material.uniforms.uFieldType.value = emParams.fieldType;
      material.uniforms.uShowFieldLines.value = emParams.showFieldLines;
      
      updateFieldInfo();
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转电磁场立方体
      emCube.rotation.y += emParams.electricField * 0.01;
      emCube.rotation.x += emParams.magneticField * 0.005;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 初始化电磁场信息显示
    updateFieldInfo();

    // 启动动画循环
    animate();
  </script>
</body>

</html>
