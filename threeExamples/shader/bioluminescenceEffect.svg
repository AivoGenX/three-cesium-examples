<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003311;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006633;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bioGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#66ff99;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="300" height="200" fill="url(#bioGradient)"/>
  
  <!-- 生物发光点 -->
  <circle cx="100" cy="80" r="8" fill="#66ff99" opacity="0.8">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="120" r="6" fill="#66ff99" opacity="0.7">
    <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="90" r="7" fill="#66ff99" opacity="0.9">
    <animate attributeName="r" values="7;11;7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 发光波 -->
  <circle cx="150" cy="100" r="30" stroke="#66ff99" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="150" cy="100" r="50" stroke="#66ff99" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- 中心发光 -->
  <circle cx="150" cy="100" r="15" fill="url(#bioGlow)" opacity="0.6"/>
  
  <!-- 标题 -->
  <text x="150" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">
    生物发光效果
  </text>
</svg>