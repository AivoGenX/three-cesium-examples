<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="electroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000066;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="fieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#66ccff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="300" height="200" fill="url(#electroGradient)"/>
  
  <!-- 电场线 -->
  <path d="M50,100 Q150,50 250,100" stroke="#66ccff" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M50,120 Q150,150 250,120" stroke="#66ccff" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- 磁场环 -->
  <circle cx="150" cy="100" r="40" stroke="#ff66cc" stroke-width="3" fill="none" opacity="0.7"/>
  <circle cx="150" cy="100" r="60" stroke="#ff66cc" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- 中心发光效果 -->
  <circle cx="150" cy="100" r="20" fill="url(#fieldGlow)" opacity="0.6"/>
  
  <!-- 标题 -->
  <text x="150" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">
    电磁场效果
  </text>
</svg>