<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>赛博朋克溶解特效</title>
    <style>
      html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;}
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "/libs/threejs/build/three.module.js",
          "three/addons/": "/libs/threejs/examples/jsm/"
        }
      }
    </script>
    <script type="module"> 

      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0f);

      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 2, 5);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        logarithmicDepthBuffer: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      window.onresize = () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      };

      const ambientLight = new THREE.AmbientLight(0x404040, 2);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0x00ffff, 1);
      directionalLight.position.set(5, 10, 5);
      scene.add(directionalLight);

      const pointLight1 = new THREE.PointLight(0xff00ff, 2, 20);
      pointLight1.position.set(-3, 2, 0);
      scene.add(pointLight1);

      const pointLight2 = new THREE.PointLight(0x00ffff, 2, 20);
      pointLight2.position.set(3, 2, 0);
      scene.add(pointLight2);

      scene.add(new THREE.AxesHelper(3));

      let car = null;

      const loader = new GLTFLoader();
      loader.setDRACOLoader(
        new DRACOLoader().setDecoderPath(
         FILE_HOST + "libs/threejs/examples/jsm/libs/draco/"
        )
      );

      loader.load(FILE_HOST + "/files/model/car.glb", (gltf) => {
        car = gltf.scene;
        car.position.set(0, 0, 0);
        scene.add(car);
        cyberpunkDissolve(car);
      });

      animate();

      function animate() {
        requestAnimationFrame(animate);
        controls.update();

        if (pointLight1) {
          pointLight1.position.x = Math.sin(Date.now() * 0.001) * 3;
          pointLight1.position.z = Math.cos(Date.now() * 0.001) * 3;
        }
        if (pointLight2) {
          pointLight2.position.x = Math.cos(Date.now() * 0.0015) * 3;
          pointLight2.position.z = Math.sin(Date.now() * 0.0015) * 3;
        }

        car?.render?.();
        renderer.render(scene, camera);
      }

      function cyberpunkDissolve(model) {
        let materials = [];
        model.traverse((c) => c.isMesh && materials.push(c.material));
        materials = [...new Set(materials)];

        const uniforms = {
          iTime: { value: 0, type: "f" },
          iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight), type: "v2" },
          dissolveThreshold: { value: 0.5, type: "f" },
          edgeColor: { value: new THREE.Color(0x00ffff), type: "c" },
          glowColor: { value: new THREE.Color(0xff00ff), type: "c" },
        };

        materials.forEach((material) => {
          if (material.isMeshPhysicalMaterial) return;

          material.onBeforeCompile = (shader) => {
            Object.assign(shader.uniforms, uniforms);

            shader.vertexShader = shader.vertexShader.replace(
              "void main() {",
              `
                varying vec2 vUv;
                void main() {
                  vUv = uv;
              `
            );

            const commonChunk = `
                #include <common>
                uniform float iTime;
                uniform float dissolveThreshold;
                uniform vec3 edgeColor;
                uniform vec3 glowColor;
                varying vec2 vUv;

                float random(vec2 st) {
                  return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
                }

                float noise(vec2 st) {
                  vec2 i = floor(st);
                  vec2 f = fract(st);
                  float a = random(i);
                  float b = random(i + vec2(1.0, 0.0));
                  float c = random(i + vec2(0.0, 1.0));
                  float d = random(i + vec2(1.0, 1.0));
                  vec2 u = f * f * (3.0 - 2.0 * f);
                  return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
                }

                float fbm(vec2 st) {
                  float value = 0.0;
                  float amplitude = 0.5;
                  for (int i = 0; i < 5; i++) {
                    value += amplitude * noise(st);
                    st *= 2.0;
                    amplitude *= 0.5;
                  }
                  return value;
                }
              `;

            if (shader.fragmentShader.includes("#include <common>")) {
              shader.fragmentShader = shader.fragmentShader.replace(
                /#include <common>/,
                commonChunk
              );
            }

            if (shader.fragmentShader.includes("vec4 diffuseColor = vec4( diffuse, opacity );")) {
              shader.fragmentShader = shader.fragmentShader.replace(
                "vec4 diffuseColor = vec4( diffuse, opacity );",
                `
                  vec2 uv = vUv;
                  float n = fbm(uv * 3.0 + iTime * 0.2);
                  float dissolve = smoothstep(dissolveThreshold - 0.1, dissolveThreshold + 0.1, n);

                  float edge = smoothstep(0.0, 0.1, dissolve) - smoothstep(0.85, 1.0, dissolve);
                  vec3 edgeGlow = edgeColor * edge * 3.0;

                  vec3 cyberColor = mix(glowColor, edgeColor, sin(iTime * 2.0 + uv.y * 10.0) * 0.5 + 0.5);
                  vec3 finalColor = mix(diffuse * cyberColor * 2.0, diffuse.rgb, dissolve);

                  if(dissolve < 0.01) discard;

                  vec4 diffuseColor = vec4(finalColor + edgeGlow, opacity);
                `
              );
            }

            material.needsUpdate = true;
          };
        });

        model.render = () => {
          uniforms.iTime.value += 0.016;
          uniforms.dissolveThreshold.value = 0.3 + Math.sin(Date.now() * 0.001) * 0.2;
        };
      }
    </script>
  </body>
</html>
