<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>虫洞时空漩涡 - Three.js着色器</title>
    <script type="importmap">
      {
        "imports": {
          "three": "/libs/threejs/build/three.module.js",
          "three/addons/": "/libs/threejs/examples/jsm/",
          "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
        }
      }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<div id="box"></div>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import GUI from "lil-gui";

const canvas = document.createElement("canvas");
canvas.style.width = "100vw !important";
canvas.style.height = "100vh !important";
document.body.appendChild(canvas);

const renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    antialias: true,
    alpha: true,
    preserveDrawingBuffer: true
});

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(90, 1, 0.1, 1000);
camera.position.set(0, 0, 5);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.maxDistance = 20;
controls.minDistance = 1;
controls.enablePan = false;

const material = new THREE.RawShaderMaterial({
  glslVersion: THREE.GLSL3,
  uniforms: {
    center: {
      value: new THREE.Vector2(0.5, 0.5),
    },
    radius: { value: 0.3 },
    tunnelLength: { value: 8.0 },
    rotationSpeed: { value: 1.5 },
    colorIntensity: { value: 0.7 },
    glowIntensity: { value: 1.0 },
    pulseIntensity: { value: 0.15 },
    color1: { value: new THREE.Color(0x00ffff) },
    color2: { value: new THREE.Color(0xff00ff) },
    color3: { value: new THREE.Color(0xffff00) },
    time: { value: 0.0 },
    resolution: { value: new THREE.Vector2() },
    camPos: { value: new THREE.Vector3() },
    camWorld: { value: new THREE.Matrix4() },
    camProjInv: { value: new THREE.Matrix4() },
  },

  vertexShader: /* glsl */ `
    precision highp float;
    precision highp int;
    precision highp sampler2D;

    uniform vec3 camPos;
    uniform mat4 camWorld;
    uniform mat4 camProjInv;

    in vec3 position;
    in vec2 uv;

    out vec3 V_pos;
    out vec2 V_uv;

    void main() {
      vec4 pos_vert = vec4((uv - 0.5) * 2.0, -1.0, 1.0);
      pos_vert = camProjInv * pos_vert;
      pos_vert /= pos_vert.w;
      pos_vert.w = 1.0;
      pos_vert = camWorld * pos_vert;

      V_pos = pos_vert.xyz;
      V_uv = uv;

      gl_Position = vec4(position, 1.0);
    }
  `,

  fragmentShader: /* glsl */ `
    precision highp float;
    precision highp int;
    precision highp sampler2D;

    #define PI 3.141592653589793
    #define TAU 6.283185307179586

    uniform vec2 center;
    uniform float radius;
    uniform float tunnelLength;
    uniform float rotationSpeed;
    uniform float colorIntensity;
    uniform float glowIntensity;
    uniform float pulseIntensity;
    uniform vec3 color1;
    uniform vec3 color2;
    uniform vec3 color3;
    uniform float time;
    uniform vec2 resolution;

    in vec3 V_pos;
    in vec2 V_uv;

    layout(location = 0) out vec4 c_out;

    // 伪随机函数
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    // 二维噪声
    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);

      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));

      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }

    // 分形布朗运动 - 生成有机纹理
    float fbm(vec2 p) {
      float value = 0.0;
      float amplitude = 0.5;
      float frequency = 1.0;

      for (int i = 0; i < 5; i++) {
        value += amplitude * noise(p * frequency);
        amplitude *= 0.5;
        frequency *= 2.0;
      }
      return value;
    }

    // HSV转RGB颜色转换
    vec3 hsv2rgb(vec3 c) {
      vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
      vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
      return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
    }

    // 极坐标转换
    vec2 polar(vec2 uv, vec2 center) {
      vec2 delta = uv - center;
      float r = length(delta);
      float a = atan(delta.y, delta.x);
      return vec2(r, a);
    }

    // 螺旋噪声 - 用于生成漩涡纹理
    float spiralNoise(vec2 p, float twists, float time) {
      float r = length(p);
      float a = atan(p.y, p.x);

      float angle = a + r * twists + time;
      float spiral = sin(angle * 6.0) * 0.5 + 0.5;

      return spiral;
    }

    void main() {
      vec2 uv = V_uv;
      vec2 c = center;

      // 转换为以中心为原点的坐标
      vec2 p = uv - c;
      float r = length(p);
      float a = atan(p.y, p.x);

      // 归一化半径
      float nr = r / radius;

      // 虫洞隧道效果 - 向内延伸的漩涡
      float tunnel = 1.0 / (nr + 0.1);

      // 时间旋转
      float rot = time * rotationSpeed;

      // 多层螺旋
      float spiral1 = spiralNoise(p * 3.0, 8.0, rot);
      float spiral2 = spiralNoise(p * 5.0 + vec2(100.0), -6.0, rot * 0.7);
      float spiral3 = spiralNoise(p * 2.0 + vec2(50.0), 4.0, rot * 1.3);

      // 深度感 - 中心越近越亮/越深
      float depth = tunnelLength / (nr * tunnelLength + 1.0);
      depth = clamp(depth, 0.0, tunnelLength);

      // 直接使用用户颜色
      vec3 col1 = color1;
      vec3 col2 = color2;
      vec3 col3 = color3;

      // 混合三种螺旋
      float spiralMix = spiral1 * 0.5 + spiral2 * 0.3 + spiral3 * 0.2;

      // 能量条纹
      float energyBands = sin(depth * 20.0 - time * 5.0 + a * 5.0) * 0.5 + 0.5;
      energyBands = pow(energyBands, 3.0);

      // 动态能量条纹
      float energyBands2 = sin(depth * 15.0 + time * 8.0 + a * 3.0) * 0.5 + 0.5;
      energyBands2 = pow(energyBands2, 2.0);

      // 分形纹理
      float fractal = fbm(p * 10.0 + vec2(time * 0.2));
      float fractal2 = fbm(p * 20.0 + vec2(time * 0.3));

      // 组合颜色 - 用户颜色为主
      vec3 color = col1 * spiralMix + col2 * energyBands * 0.5 + col3 * fractal * 0.4;

      // 添加动态闪烁
      float sparkle = sin(time * 15.0 + fractal2 * 10.0) * 0.5 + 0.5;
      sparkle = pow(sparkle, 4.0);
      color += col1 * sparkle * 0.3 * colorIntensity;

      // 中心发光 - 使用用户颜色
      float glow = exp(-nr * 6.0) * 3.0 * glowIntensity;
      color += col1 * glow * 0.7 + col2 * glow * 0.3;

      // 多层发光
      float glow2 = exp(-nr * 12.0) * 5.0 * glowIntensity;
      color += col1 * glow2 * 0.5 + vec3(1.0) * glow2 * 0.2;

      // 边缘暗化
      float edgeDark = smoothstep(1.8, 0.4, nr);
      color *= edgeDark;

      // 外边缘渐变到黑色
      float vignette = 1.0 - smoothstep(0.3, 1.8, nr);
      color *= vignette;

      // 能量脉冲
      float pulse = sin(time * 3.0) * pulseIntensity + (1.0 - pulseIntensity * 0.5);
      color *= pulse;

      // 动态波纹
      float ripple = sin(nr * 20.0 - time * 4.0) * 0.05 + 1.0;
      color *= ripple;

      // 中心白点
      float core = exp(-nr * 40.0) * 4.0 * glowIntensity;
      float coreGlow = exp(-nr * 20.0) * 2.0 * glowIntensity;
      color += col1 * (core + coreGlow) * 0.7 + vec3(1.0) * (core + coreGlow) * 0.3;

      // 添加镜头光晕效果
      float lensFlare = exp(-nr * 3.0) * 0.3 * glowIntensity;
      color += col1 * lensFlare;

      // 颜色饱和度增强
      color = mix(color, normalize(color) * length(color) * (1.0 + colorIntensity * 0.5), colorIntensity);

      c_out = vec4(color, 1.0);
    }
  `,
});

const geometry = new THREE.PlaneGeometry(2, 2);
const quad = new THREE.Mesh(geometry, material);
scene.add(quad);

const clock = new THREE.Clock();

// GUI控制参数
const data = {
  radius: 0.3,
  tunnelLength: 8.0,
  rotationSpeed: 1.5,
  colorIntensity: 0.7,
  color1: '#00ffff',
  color2: '#ff00ff',
  color3: '#ffff00',
  glowIntensity: 1.0,
  pulseIntensity: 0.15,
};

const gui = new GUI();
gui.add(data, "radius", 0.1, 0.5, 0.01).name("半径");
gui.add(data, "tunnelLength", 1.0, 20.0, 0.1).name("隧道长度");
gui.add(data, "rotationSpeed", 0.0, 5.0, 0.1).name("旋转速度");
gui.add(data, "colorIntensity", 0.0, 1.0, 0.01).name("颜色强度");
gui.add(data, "glowIntensity", 0.0, 2.0, 0.01).name("发光强度");
gui.add(data, "pulseIntensity", 0.0, 0.5, 0.01).name("脉冲强度");
gui.addColor(data, "color1").name("颜色1");
gui.addColor(data, "color2").name("颜色2");
gui.addColor(data, "color3").name("颜色3");

const tick = (delta, elapsed) => {
  controls.update(delta);

  material.uniforms.time.value = elapsed;
  material.uniforms.camPos.value.copy(camera.position);
  material.uniforms.camWorld.value.copy(camera.matrixWorld);
  material.uniforms.camProjInv.value.copy(camera.projectionMatrixInverse);

  material.uniforms.radius.value = data.radius;
  material.uniforms.tunnelLength.value = data.tunnelLength;
  material.uniforms.rotationSpeed.value = data.rotationSpeed;
  material.uniforms.colorIntensity.value = data.colorIntensity;
  material.uniforms.glowIntensity.value = data.glowIntensity;
  material.uniforms.pulseIntensity.value = data.pulseIntensity;
  material.uniforms.color1.value.set(data.color1);
  material.uniforms.color2.value.set(data.color2);
  material.uniforms.color3.value.set(data.color3);
};

const render = () => {
  renderer.render(scene, camera);
};

const ani = () => {
  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta();

  tick(delta, elapsed);
  render();

  requestAnimationFrame(ani);
};

// 响应窗口大小变化
new ResizeObserver(() => {
  const rect = document.body.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  const dpr = window.devicePixelRatio;

  renderer.setSize(w, h, false);
  renderer.setPixelRatio(dpr);

  camera.aspect = w / h;
  camera.updateProjectionMatrix();

  material.uniforms.resolution.value.set(w, h);
  material.uniforms.camProjInv.value.copy(camera.projectionMatrixInverse);
}).observe(document.body);

ani();
</script>
</body>
</html>
