<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js流体动力学效果着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #000066 0%, #000033 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #66ccff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #66ccff;
      border: 1px solid #66ccff;
      box-shadow: 0 0 20px #66ccff;
    }
    .fluid-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #ff9966;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff9966;
      border: 1px solid #ff9966;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ffff66;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ffff66;
      border: 1px solid #ffff66;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">🌊 流体动力学效果 - 实时渲染 🌊</div>
  <div class="fluid-info" id="fluidInfo">流速: 快速 | 粘度: 低</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变流体效果<br>
    • 实时交互：体验流体运动
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x000066);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,8)的位置观察场景
    camera.position.set(0, 0, 8)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 流体动力学效果参数
    const fluidParams = {
      flowSpeed: 0.8,
      viscosity: 0.6,
      turbulence: 0.7,
      glowIntensity: 1.2,
      waveFrequency: 0.8,
      fluidType: 0,
      showVortices: true
    };

    // 创建球体几何体，作为流体的载体
    const geometry = new THREE.SphereGeometry(2.5, 32, 32);

    // 顶点着色器代码 - 流体动力学效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uFlowSpeed;
      uniform float uViscosity;
      uniform float uWaveFrequency;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vNormal = normal;
        
        // 流体流动效果
        float flow = sin(position.x * 3.0 + uTime * uFlowSpeed) * 
                    cos(position.y * 4.0 + uTime * uFlowSpeed * 0.8) *
                    sin(position.z * 3.0 + uTime * uFlowSpeed * 0.6);
        
        // 粘度效果
        float viscosity = sin(position.x * 5.0 + uTime * uViscosity * 2.0) *
                         cos(position.z * 5.0 + uTime * uViscosity * 2.0);
        
        // 波动频率
        float wave = sin(position.x * uWaveFrequency * 6.0) *
                    cos(position.y * uWaveFrequency * 8.0);
        
        vec3 newPosition = position + normal * (flow + viscosity * 0.5 + wave * 0.3) * 0.15;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    // 片段着色器代码 - 流体动力学效果
    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uFlowSpeed;
      uniform float uViscosity;
      uniform float uTurbulence;
      uniform float uGlowIntensity;
      uniform float uWaveFrequency;
      uniform int uFluidType;
      uniform bool uShowVortices;
      
      // 噪声函数
      float noise(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // 流体流动效果
      float fluidFlow(vec2 uv, float speed) {
        float flowField = 0.0;
        
        // 多层流体流动
        flowField += sin(uv.x * 4.0 + uTime * 0.3) * 
                    cos(uv.y * 6.0 + uTime * 0.5);
        flowField += sin(uv.x * 6.0 + uTime * 0.7) * 
                    cos(uv.y * 8.0 + uTime * 0.9) * 0.7;
        flowField += sin(uv.x * 8.0 + uTime * 1.1) * 
                    cos(uv.y * 10.0 + uTime * 1.3) * 0.4;
        
        return flowField * speed;
      }
      
      // 湍流效果
      float turbulence(vec2 uv, float intensity) {
        float turbField = 0.0;
        for(int i = 0; i < 20; i++) {
          vec2 turbPos = vec2(
            noise(vec2(float(i) * 0.123, 0.456)),
            noise(vec2(float(i) * 0.456, 0.789))
          );
          float dist = distance(uv, turbPos);
          float turbSize = noise(vec2(float(i) * 0.789, 0.123)) * 0.04 + 0.02;
          float turbLife = mod(uTime * 1.5 + float(i) * 8.0, 6.28);
          float turbIntensity = sin(turbLife) * 0.7 + 0.3;
          turbField += exp(-dist * 45.0) * turbIntensity * intensity;
        }
        return turbField;
      }
      
      // 涡旋效果
      float vortices(vec2 uv, float intensity) {
        if(!uShowVortices) return 0.0;
        
        float vortexField = 0.0;
        
        // 涡旋流动
        float angle = atan(uv.y - 0.5, uv.x - 0.5);
        float radius = distance(uv, vec2(0.5, 0.5));
        vortexField += sin(angle * 8.0 + uTime * 2.0) * 
                      cos(radius * 12.0 - uTime * 1.5) * intensity;
        
        return vortexField;
      }
      
      // 流体类型
      vec3 getFluidType(int type) {
        if(type == 0) {
          // 水流体
          return vec3(0.2, 0.6, 1.0);
        } else if(type == 1) {
          // 油流体
          return vec3(1.0, 0.8, 0.2);
        } else {
          // 熔岩流体
          return vec3(1.0, 0.4, 0.2);
        }
      }
      
      void main() {
        vec2 uv = vUv;
        
        // 流体流动效果
        float flowField = fluidFlow(uv, uFlowSpeed);
        
        // 湍流效果
        float turbField = turbulence(uv, uTurbulence);
        
        // 涡旋效果
        float vortexField = vortices(uv, 0.3);
        
        // 颜色计算
        vec3 baseColor = getFluidType(uFluidType);
        vec3 finalColor = baseColor * (flowField * 0.5 + turbField * 0.3 + vortexField * 0.2) * uGlowIntensity;
        
        // 波动效果
        float waveEffect = sin(uTime * uWaveFrequency) * 0.2 + 0.8;
        finalColor *= waveEffect;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uFlowSpeed: { value: fluidParams.flowSpeed },
        uViscosity: { value: fluidParams.viscosity },
        uTurbulence: { value: fluidParams.turbulence },
        uGlowIntensity: { value: fluidParams.glowIntensity },
        uWaveFrequency: { value: fluidParams.waveFrequency },
        uFluidType: { value: fluidParams.fluidType },
        uShowVortices: { value: fluidParams.showVortices }
      }
    });

    // 创建网格对象并添加到场景中
    const fluidSphere = new THREE.Mesh(geometry, material);
    scene.add(fluidSphere);

    // 更新流体信息显示
    function updateFluidInfo() {
      const fluidElement = document.getElementById('fluidInfo');
      let speed = "慢";
      if(fluidParams.flowSpeed > 0.5) speed = "中";
      if(fluidParams.flowSpeed > 0.8) speed = "快速";
      
      let viscosity = "高";
      if(fluidParams.viscosity > 0.4) viscosity = "中";
      if(fluidParams.viscosity > 0.7) viscosity = "低";
      
      fluidElement.textContent = `流速: ${speed} | 粘度: ${viscosity}`;
    }

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 流体动力学参数控制
    const fluidFolder = gui.addFolder('流体动力学效果参数');
    fluidFolder.add(fluidParams, 'flowSpeed', 0.1, 1.2).name('流速');
    fluidFolder.add(fluidParams, 'viscosity', 0.1, 1.0).name('粘度');
    fluidFolder.add(fluidParams, 'turbulence', 0.1, 1.0).name('湍流强度');
    fluidFolder.add(fluidParams, 'glowIntensity', 0.1, 1.8).name('发光强度');
    fluidFolder.add(fluidParams, 'waveFrequency', 0.1, 0.9).name('波动频率');
    fluidFolder.add(fluidParams, 'showVortices').name('显示涡旋');
    
    // 流体类型控制
    const fluidTypes = {
      "水流体": 0,
      "油流体": 1,
      "熔岩流体": 2
    };
    fluidFolder.add(fluidParams, 'fluidType', fluidTypes).name('流体类型');
    
    fluidFolder.open();

    // 参数变化时更新材质和流体信息
    gui.onChange(() => {
      material.uniforms.uFlowSpeed.value = fluidParams.flowSpeed;
      material.uniforms.uViscosity.value = fluidParams.viscosity;
      material.uniforms.uTurbulence.value = fluidParams.turbulence;
      material.uniforms.uGlowIntensity.value = fluidParams.glowIntensity;
      material.uniforms.uWaveFrequency.value = fluidParams.waveFrequency;
      material.uniforms.uFluidType.value = fluidParams.fluidType;
      material.uniforms.uShowVortices.value = fluidParams.showVortices;
      
      updateFluidInfo();
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转流体球体
      fluidSphere.rotation.y += fluidParams.flowSpeed * 0.01;
      fluidSphere.rotation.x += fluidParams.flowSpeed * 0.005;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 初始化流体信息显示
    updateFluidInfo();

    // 启动动画循环
    animate();
  </script>
</body>

</html>
