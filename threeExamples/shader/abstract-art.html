<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js抽象艺术着色器效果</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #ff6b6b;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #ff6b6b;
      border: 1px solid #ff6b6b;
      box-shadow: 0 0 20px #ff6b6b;
    }
  </style>
</head>

<body>
  <div class="info">🎨 抽象艺术着色器效果 - 实时渲染 🎨</div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // ============================================================================
    // 导入Three.js核心库和辅助工具
    // ============================================================================
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // ============================================================================
    // 场景初始化
    // ============================================================================
    
    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x1a1a2e);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,5)的位置观察场景
    camera.position.set(0, 0, 5)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // ============================================================================
    // 窗口大小变化时的响应函数
    // ============================================================================
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // ============================================================================
    // 创建几何体和材质
    // ============================================================================
    
    // 创建平面几何体，作为抽象艺术效果的载体
    // 参数：宽度，高度，宽度分段数，高度分段数
    const geometry = new THREE.PlaneGeometry(12, 12, 512, 512);

    // 创建自定义着色器材质，实现多种抽象艺术效果
    const material = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,          // 双面渲染
      transparent: true,               // 启用透明度
      blending: THREE.AdditiveBlending, // 添加混合模式让效果更亮
      uniforms: {
        // 时间变量，用于动画效果
        uTime: { value: 0.0 },
        // 抽象艺术类型选择：0=几何抽象, 1=色彩抽象, 2=动态抽象, 3=分形抽象, 4=光影抽象
        uArtType: { value: 0 },
        // 艺术参数
        uComplexity: { value: 5.0 },   // 复杂度
        uSymmetry: { value: 0.5 },     // 对称性
        uChaos: { value: 0.3 },        // 混沌度
        uRhythm: { value: 0.5 },       // 节奏感
        uBalance: { value: 0.7 },      // 平衡度
        // 颜色参数
        uPrimaryColor: { value: new THREE.Color(0xff6b6b) }, // 主色
        uSecondaryColor: { value: new THREE.Color(0x4ecdc4) }, // 辅色
        uAccentColor: { value: new THREE.Color(0x45b7d1) },   // 强调色
        uBackgroundColor: { value: new THREE.Color(0x1a1a2e) }, // 背景色
        // 效果参数
        uIntensity: { value: 1.0 },    // 强度
        uScale: { value: 1.0 },        // 缩放
        uRotation: { value: 0.0 },     // 旋转
      },
      
      // ============================================================================
      // 顶点着色器：处理顶点位置和变形
      // ============================================================================
      vertexShader: `
        // 统一变量声明
        uniform float uTime;           // 时间变量
        uniform float uComplexity;     // 复杂度
        uniform float uSymmetry;       // 对称性
        uniform float uChaos;          // 混沌度
        uniform float uRhythm;         // 节奏感
        uniform float uBalance;        // 平衡度
        uniform int uArtType;          // 艺术类型
        
        // 传递到片元着色器的变量
        varying vec2 vUv;              // UV坐标
        varying vec3 vPosition;        // 顶点位置
        varying float vArtValue;       // 艺术计算值
        varying float vDistance;       // 到中心距离
        
        // ============================================================================
        // 几何抽象：基于几何形状的抽象艺术
        // 特点：直线、曲线、几何图形的组合
        // 算法：距离函数、几何变换
        // ============================================================================
        float geometricAbstract(vec2 pos) {
          float art = 0.0;
          
          // 圆形图案
          float circles = 0.0;
          for(int i = 0; i < 5; i++) {
            float radius = 0.1 + float(i) * 0.15;
            float circle = 1.0 - smoothstep(radius - 0.02, radius + 0.02, length(pos));
            circles += circle * sin(uTime * 0.5 + float(i));
          }
          
          // 直线图案
          float lines = 0.0;
          lines += sin(pos.x * uComplexity * 3.0 + uTime) * 0.5;
          lines += sin(pos.y * uComplexity * 2.0 + uTime * 1.3) * 0.3;
          
          // 几何变换
          art = mix(circles, lines, uBalance);
          
          return art;
        }
        
        // ============================================================================
        // 色彩抽象：基于色彩变化的抽象艺术
        // 特点：色彩渐变、对比、混合
        // 算法：色彩空间变换、渐变函数
        // ============================================================================
        float colorAbstract(vec2 pos) {
          // 径向色彩渐变
          float radial = length(pos) * 2.0;
          
          // 角度色彩变化
          float angle = atan(pos.y, pos.x);
          
          // 复杂色彩模式
          float pattern = sin(radial * uComplexity * 2.0 + angle * 5.0 + uTime);
          pattern += sin(radial * uComplexity * 3.0 - angle * 3.0 + uTime * 1.5) * 0.7;
          pattern += sin(radial * uComplexity * 5.0 + angle * 7.0 + uTime * 2.0) * 0.3;
          
          return pattern;
        }
        
        // ============================================================================
        // 动态抽象：基于运动变化的抽象艺术
        // 特点：流动、变形、动态平衡
        // 算法：流体模拟、粒子运动
        // ============================================================================
        float dynamicAbstract(vec2 pos) {
          // 流动效果
          vec2 flowPos = pos;
          flowPos.x += sin(pos.y * 3.0 + uTime) * 0.1;
          flowPos.y += cos(pos.x * 2.0 + uTime * 1.2) * 0.1;
          
          // 动态图案
          float dynamic = 0.0;
          dynamic += sin(flowPos.x * uComplexity * 4.0 + uTime * 2.0);
          dynamic += cos(flowPos.y * uComplexity * 3.0 + uTime * 1.5);
          dynamic += sin((flowPos.x + flowPos.y) * uComplexity * 5.0 + uTime * 3.0) * 0.5;
          
          // 节奏控制
          dynamic *= sin(uTime * uRhythm * 2.0) * 0.5 + 0.5;
          
          return dynamic;
        }
        
        // ============================================================================
        // 分形抽象：基于分形几何的抽象艺术
        // 特点：自相似、无限细节、复杂结构
        // 算法：分形迭代、逃逸时间算法
        // ============================================================================
        float fractalAbstract(vec2 pos) {
          // 简化版分形算法
          vec2 z = pos * 3.0;
          vec2 c = vec2(0.3, 0.5);
          
          float fractal = 0.0;
          for(int i = 0; i < 8; i++) {
            // 复数乘法：z = z² + c
            float x = z.x * z.x - z.y * z.y + c.x;
            float y = 2.0 * z.x * z.y + c.y;
            z = vec2(x, y);
            
            // 逃逸条件
            if(length(z) > 2.0) {
              fractal = float(i) / 8.0;
              break;
            }
          }
          
          // 添加时间动画
          fractal *= sin(uTime * 0.5) * 0.5 + 0.5;
          
          return fractal;
        }
        
        // ============================================================================
        // 光影抽象：基于光影效果的抽象艺术
        // 特点：明暗对比、光影交错、立体感
        // 算法：光照模型、阴影计算
        // ============================================================================
        float lightShadowAbstract(vec2 pos) {
          // 虚拟光源位置
          vec2 lightPos = vec2(sin(uTime) * 0.5, cos(uTime) * 0.5);
          
          // 计算到光源的距离
          float lightDist = length(pos - lightPos);
          
          // 光照强度（逆平方衰减）
          float lightIntensity = 1.0 / (1.0 + lightDist * 10.0);
          
          // 表面法线（基于位置梯度）
          float surface = sin(pos.x * uComplexity * 3.0) * cos(pos.y * uComplexity * 2.0);
          
          // 简单光照模型：漫反射
          vec2 normal = vec2(cos(surface), sin(surface));
          vec2 lightDir = normalize(lightPos - pos);
          float diffuse = max(0.0, dot(normal, lightDir));
          
          return diffuse * lightIntensity;
        }
        
        // ============================================================================
        // 主顶点着色器函数
        // ============================================================================
        void main() {
          // 传递UV坐标到片元着色器
          vUv = uv;
          vPosition = position;
          
          // 计算到中心的距离
          vDistance = length(position.xy);
          
          // 根据艺术类型选择不同的抽象艺术算法
          float artValue = 0.0;
          
          if(uArtType == 0) {
            // 几何抽象：几何图形组合
            artValue = geometricAbstract(position.xy);
          } else if(uArtType == 1) {
            // 色彩抽象：色彩渐变变化
            artValue = colorAbstract(position.xy);
          } else if(uArtType == 2) {
            // 动态抽象：流动变形效果
            artValue = dynamicAbstract(position.xy);
          } else if(uArtType == 3) {
            // 分形抽象：自相似结构
            artValue = fractalAbstract(position.xy);
          } else {
            // 光影抽象：明暗对比效果
            artValue = lightShadowAbstract(position.xy);
          }
          
          vArtValue = artValue;
          
          // 根据艺术值对顶点位置进行变形
          vec3 newPosition = position;
          newPosition.z += artValue * 1.2;
          
          // 设置最终顶点位置
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
      `,
      
      // ============================================================================
      // 片元着色器：处理像素颜色
      // ============================================================================
      fragmentShader: `
        // 统一变量声明
        uniform float uTime;           // 时间变量
        uniform vec3 uPrimaryColor;    // 主色
        uniform vec3 uSecondaryColor;  // 辅色
        uniform vec3 uAccentColor;     // 强调色
        uniform vec3 uBackgroundColor; // 背景色
        uniform int uArtType;          // 艺术类型
        uniform float uIntensity;      // 强度
        
        // 从顶点着色器传递的变量
        varying vec2 vUv;              // UV坐标
        varying vec3 vPosition;        // 顶点位置
        varying float vArtValue;       // 艺术计算值
        varying float vDistance;       // 到中心距离
        
        void main() {
          // 基础颜色计算：根据艺术值进行颜色混合
          vec3 baseColor;
          
          if(uArtType == 0) {
            // 几何抽象：使用主色和辅色的对比
            baseColor = mix(uPrimaryColor, uSecondaryColor, (vArtValue + 1.0) * 0.5);
          } else if(uArtType == 1) {
            // 色彩抽象：多彩渐变效果
            float hue = fract(vArtValue * 0.3 + uTime * 0.1);
            baseColor = mix(uPrimaryColor, uSecondaryColor, hue);
            baseColor = mix(baseColor, uAccentColor, sin(hue * 6.28) * 0.5 + 0.5);
          } else if(uArtType == 2) {
            // 动态抽象：流动色彩效果
            baseColor = uPrimaryColor * (sin(vArtValue * 3.0 + uTime) * 0.5 + 0.5);
            baseColor += uSecondaryColor * (cos(vArtValue * 2.0 + uTime * 1.5) * 0.3 + 0.3);
          } else if(uArtType == 3) {
            // 分形抽象：神秘色彩效果
            baseColor = mix(uBackgroundColor, uAccentColor, vArtValue);
          } else {
            // 光影抽象：明暗对比色彩
            baseColor = mix(uBackgroundColor, uPrimaryColor, vArtValue);
          }
          
          // 添加发光效果
          float glow = smoothstep(0.3, 0.8, abs(vArtValue));
          baseColor += glow * uIntensity;
          
          // 添加边缘效果
          float edge = 1.0 - smoothstep(0.0, 0.8, vDistance);
          baseColor *= edge;
          
          // 特殊艺术效果
          if(uArtType == 1) {
            // 色彩抽象：添加色彩分离效果
            float separation = sin(vPosition.x * 10.0 + uTime) * 0.1;
            baseColor.r += separation;
            baseColor.g -= separation * 0.5;
          } else if(uArtType == 2) {
            // 动态抽象：添加运动模糊效果
            float motionBlur = sin(vPosition.x * 8.0 + uTime * 2.0) * 0.05;
            baseColor = mix(baseColor, vec3(0.0), motionBlur);
          }
          
          // 时间动画效果
          float timeEffect = sin(uTime * 0.2) * 0.1 + 0.9;
          baseColor *= timeEffect;
          
          // 最终颜色输出
          gl_FragColor = vec4(baseColor, 1.0);
        }
      `
    });

    // 创建网格对象并添加到场景
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // ============================================================================
    // 创建GUI控制面板
    // ============================================================================
    const gui = new GUI();
    
    // 艺术类型控制
    const artTypes = {
      "几何抽象": 0,
      "色彩抽象": 1,
      "动态抽象": 2,
      "分形抽象": 3,
      "光影抽象": 4
    };
    
    gui.add(material.uniforms.uArtType, 'value', artTypes).name('艺术类型');
    gui.add(material.uniforms.uComplexity, 'value', 1.0, 10.0).name('复杂度');
    gui.add(material.uniforms.uSymmetry, 'value', 0.0, 1.0).name('对称性');
    gui.add(material.uniforms.uChaos, 'value', 0.0, 1.0).name('混沌度');
    gui.add(material.uniforms.uRhythm, 'value', 0.0, 2.0).name('节奏感');
    gui.add(material.uniforms.uBalance, 'value', 0.0, 1.0).name('平衡度');
    gui.add(material.uniforms.uIntensity, 'value', 0.1, 3.0).name('强度');
    
    // 颜色控制
    const colorFolder = gui.addFolder('颜色设置');
    colorFolder.addColor(material.uniforms.uPrimaryColor, 'value').name('主色');
    colorFolder.addColor(material.uniforms.uSecondaryColor, 'value').name('辅色');
    colorFolder.addColor(material.uniforms.uAccentColor, 'value').name('强调色');
    colorFolder.addColor(material.uniforms.uBackgroundColor, 'value').name('背景色');
    colorFolder.open();

    // ============================================================================
    // 动画循环
    // ============================================================================
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间变量，驱动动画效果
      material.uniforms.uTime.value += 0.01;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 启动动画循环
    animate();
  </script>
</body>

</html>
