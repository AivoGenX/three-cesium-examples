<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="crystalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#330066;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#663399;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="crystalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#cc66ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9966cc;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="300" height="200" fill="url(#crystalGradient)"/>
  
  <!-- 晶体结构 -->
  <polygon points="150,60 170,80 150,100 130,80" fill="#cc66ff" opacity="0.8"/>
  <polygon points="150,100 170,120 150,140 130,120" fill="#cc66ff" opacity="0.6"/>
  
  <!-- 晶格线 -->
  <line x1="140" y1="70" x2="160" y2="90" stroke="#cc66ff" stroke-width="1" opacity="0.5"/>
  <line x1="140" y1="110" x2="160" y2="130" stroke="#cc66ff" stroke-width="1" opacity="0.5"/>
  
  <!-- 折射效果 -->
  <circle cx="150" cy="100" r="25" stroke="#cc66ff" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- 标题 -->
  <text x="150" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">
    晶体生长效果
  </text>
</svg>