<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js数学函数着色器效果</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00b4d8;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #00b4d8;
      border: 1px solid #00b4d8;
      box-shadow: 0 0 20px #00b4d8;
    }
  </style>
</head>

<body>
  <div class="info">📊 数学函数着色器效果 - 实时渲染 📊</div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // ============================================================================
    // 导入Three.js核心库和辅助工具
    // ============================================================================
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // ============================================================================
    // 场景初始化
    // ============================================================================
    
    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x1a1a2e);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,5)的位置观察场景
    camera.position.set(0, 0, 5)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // ============================================================================
    // 窗口大小变化时的响应函数
    // ============================================================================
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // ============================================================================
    // 创建几何体和材质
    // ============================================================================
    
    // 创建平面几何体，作为数学函数效果的载体
    // 参数：宽度，高度，宽度分段数，高度分段数
    const geometry = new THREE.PlaneGeometry(10, 10, 512, 512);

    // 创建自定义着色器材质，实现多种数学函数可视化效果
    const material = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,          // 双面渲染
      transparent: true,               // 启用透明度
      blending: THREE.AdditiveBlending, // 添加混合模式让效果更亮
      uniforms: {
        // 时间变量，用于动画效果
        uTime: { value: 0.0 },
        // 函数类型选择：0=正弦波, 1=余弦波, 2=正切波, 3=指数函数, 4=对数函数, 5=高斯函数
        uFunctionType: { value: 0 },
        // 函数频率，控制波的密度
        uFrequency: { value: 4.0 },
        // 函数振幅，控制波的高度
        uAmplitude: { value: 1.0 },
        // 相位偏移，控制波的起始位置
        uPhase: { value: 0.0 },
        // 函数参数，用于调整函数特性
        uParam: { value: 1.0 },
        // 颜色渐变参数
        uColor1: { value: new THREE.Color(0x00b4d8) }, // 主色
        uColor2: { value: new THREE.Color(0x0077b6) }, // 辅色
        uColor3: { value: new THREE.Color(0x90e0ef) }, // 高光色
        // 网格显示参数
        uShowGrid: { value: true },    // 是否显示网格
        uGridSize: { value: 0.1 },     // 网格大小
      },
      
      // ============================================================================
      // 顶点着色器：处理顶点位置和变形
      // ============================================================================
      vertexShader: `
        // 统一变量声明
        uniform float uTime;           // 时间变量
        uniform float uFrequency;      // 频率参数
        uniform float uAmplitude;      // 振幅参数
        uniform float uPhase;          // 相位参数
        uniform float uParam;          // 函数参数
        uniform int uFunctionType;     // 函数类型
        
        // 传递到片元着色器的变量
        varying vec2 vUv;              // UV坐标
        varying vec3 vPosition;        // 顶点位置
        varying float vFunctionValue;  // 函数计算值
        varying float vDistance;       // 到中心距离
        
        // ============================================================================
        // 正弦波函数：周期性波动
        // 公式：y = A * sin(2π * f * x + φ)
        // 特点：平滑的周期性波动，广泛用于波动现象
        // ============================================================================
        float sineWave(float x) {
          return uAmplitude * sin(2.0 * 3.14159 * uFrequency * x + uPhase);
        }
        
        // ============================================================================
        // 余弦波函数：相位偏移的正弦波
        // 公式：y = A * cos(2π * f * x + φ)
        // 特点：与正弦波相似，但相位偏移90度
        // ============================================================================
        float cosineWave(float x) {
          return uAmplitude * cos(2.0 * 3.14159 * uFrequency * x + uPhase);
        }
        
        // ============================================================================
        // 正切波函数：周期性变化但有无穷大间断点
        // 公式：y = A * tan(2π * f * x + φ)
        // 特点：在特定点有无穷大，产生尖锐变化
        // ============================================================================
        float tangentWave(float x) {
          return uAmplitude * tan(2.0 * 3.14159 * uFrequency * x + uPhase);
        }
        
        // ============================================================================
        // 指数函数：快速增长或衰减
        // 公式：y = A * exp(k * x)
        // 特点：快速增长（k>0）或快速衰减（k<0）
        // ============================================================================
        float exponentialFunction(float x) {
          return uAmplitude * exp(uParam * x);
        }
        
        // ============================================================================
        // 对数函数：增长缓慢
        // 公式：y = A * log(k * x + 1)
        // 特点：初始增长快，后期增长缓慢
        // ============================================================================
        float logarithmicFunction(float x) {
          return uAmplitude * log(uParam * x + 1.0);
        }
        
        // ============================================================================
        // 高斯函数：钟形曲线
        // 公式：y = A * exp(-(x - μ)² / (2σ²))
        // 特点：对称的钟形曲线，用于概率分布
        // ============================================================================
        float gaussianFunction(float x) {
          float mu = 0.0; // 均值
          float sigma = 0.2; // 标准差
          return uAmplitude * exp(-pow(x - mu, 2.0) / (2.0 * sigma * sigma));
        }
        
        // ============================================================================
        // 主顶点着色器函数
        // ============================================================================
        void main() {
          // 传递UV坐标到片元着色器
          vUv = uv;
          vPosition = position;
          
          // 计算到中心的距离，用于径向效果
          vDistance = length(position.xy);
          
          // 根据函数类型选择不同的数学函数
          float functionValue = 0.0;
          float x = position.x * 2.0;
          
          if(uFunctionType == 0) {
            // 正弦波：周期性波动
            functionValue = sineWave(x + uTime * 0.5);
          } else if(uFunctionType == 1) {
            // 余弦波：相位偏移的正弦波
            functionValue = cosineWave(x + uTime * 0.5);
          } else if(uFunctionType == 2) {
            // 正切波：有间断点的波动
            functionValue = tangentWave(x + uTime * 0.5);
          } else if(uFunctionType == 3) {
            // 指数函数：快速增长
            functionValue = exponentialFunction(x + uTime * 0.2);
          } else if(uFunctionType == 4) {
            // 对数函数：缓慢增长
            functionValue = logarithmicFunction(x + 2.0 + uTime * 0.1);
          } else {
            // 高斯函数：钟形曲线
            functionValue = gaussianFunction(x + uTime * 0.3);
          }
          
          vFunctionValue = functionValue;
          
          // 根据函数值对顶点位置进行变形
          vec3 newPosition = position;
          newPosition.z += functionValue * 0.5;
          
          // 设置最终顶点位置
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
      `,
      
      // ============================================================================
      // 片元着色器：处理像素颜色
      // ============================================================================
      fragmentShader: `
        // 统一变量声明
        uniform float uTime;           // 时间变量
        uniform vec3 uColor1;          // 主色
        uniform vec3 uColor2;          // 辅色
        uniform vec3 uColor3;          // 高光色
        uniform bool uShowGrid;        // 是否显示网格
        uniform float uGridSize;       // 网格大小
        
        // 从顶点着色器传递的变量
        varying vec2 vUv;              // UV坐标
        varying vec3 vPosition;        // 顶点位置
        varying float vFunctionValue;  // 函数计算值
        varying float vDistance;       // 到中心距离
        
        void main() {
          // 基础颜色计算：根据函数值进行颜色插值
          vec3 baseColor = mix(uColor1, uColor2, (vFunctionValue + 1.0) * 0.5);
          
          // 添加高光效果：在函数值较高的区域添加高光色
          float highlight = smoothstep(0.5, 0.8, abs(vFunctionValue));
          baseColor = mix(baseColor, uColor3, highlight);
          
          // 添加径向渐变效果：从中心向外渐变
          float radialFade = 1.0 - smoothstep(0.0, 1.0, vDistance * 0.3);
          baseColor *= radialFade;
          
          // 网格显示：如果启用网格，添加网格线
          if(uShowGrid) {
            vec2 gridPos = fract(vUv / uGridSize);
            float gridLine = step(0.98, gridPos.x) + step(0.98, gridPos.y);
            gridLine = min(gridLine, 1.0);
            
            // 网格线颜色（白色半透明）
            vec3 gridColor = vec3(1.0, 1.0, 1.0);
            baseColor = mix(baseColor, gridColor, gridLine * 0.3);
          }
          
          // 添加时间动画效果：颜色随时间变化
          float timeEffect = sin(uTime * 0.3) * 0.1 + 0.9;
          baseColor *= timeEffect;
          
          // 根据UV坐标添加边缘渐变效果
          float edgeFade = 1.0 - length(vUv - 0.5) * 2.0;
          edgeFade = smoothstep(0.0, 0.3, edgeFade);
          
          // 最终颜色输出
          gl_FragColor = vec4(baseColor, edgeFade);
        }
      `
    });

    // 创建网格对象并添加到场景
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // ============================================================================
    // 创建GUI控制面板
    // ============================================================================
    const gui = new GUI();
    
    // 函数类型控制
    const functionTypes = {
      "正弦波": 0,
      "余弦波": 1,
      "正切波": 2,
      "指数函数": 3,
      "对数函数": 4,
      "高斯函数": 5
    };
    
    gui.add(material.uniforms.uFunctionType, 'value', functionTypes).name('函数类型');
    gui.add(material.uniforms.uFrequency, 'value', 0.5, 10.0).name('频率');
    gui.add(material.uniforms.uAmplitude, 'value', 0.1, 3.0).name('振幅');
    gui.add(material.uniforms.uPhase, 'value', 0.0, 6.28).name('相位');
    gui.add(material.uniforms.uParam, 'value', 0.1, 5.0).name('函数参数');
    
    // 颜色控制
    const colorFolder = gui.addFolder('颜色设置');
    colorFolder.addColor(material.uniforms.uColor1, 'value').name('主色');
    colorFolder.addColor(material.uniforms.uColor2, 'value').name('辅色');
    colorFolder.addColor(material.uniforms.uColor3, 'value').name('高光色');
    colorFolder.open();
    
    // 网格设置
    const gridFolder = gui.addFolder('网格设置');
    gridFolder.add(material.uniforms.uShowGrid, 'value').name('显示网格');
    gridFolder.add(material.uniforms.uGridSize, 'value', 0.01, 0.5).name('网格大小');
    gridFolder.open();

    // ============================================================================
    // 动画循环
    // ============================================================================
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间变量，驱动动画效果
      material.uniforms.uTime.value += 0.01;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 启动动画循环
    animate();
  </script>
</body>

</html>
