<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js魔法漩涡着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00ffcc;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #00ffcc;
      border: 1px solid #00ffcc;
      box-shadow: 0 0 20px #00ffcc;
    }
  </style>
</head>

<body>
  <div class="info">🌀 魔法漩涡着色器 - 实时渲染 🔥</div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x1a1a2e);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(1,1,1)的位置观察场景
    camera.position.set(0, 0, 4)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 创建平面几何体，作为漩涡效果的载体
    const geometry = new THREE.PlaneGeometry(6, 6, 128, 128);

    // 创建自定义着色器材质，实现魔法漩涡效果
    const material = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,          // 双面渲染
      transparent: true,               // 启用透明度
      blending: THREE.AdditiveBlending, // 添加混合模式让效果更亮
      uniforms: {
        uTime: { value: 0.0 },           // 时间变量
        uSpeed: { value: 1.0 },          // 漩涡速度
        uTwist: { value: 3.0 },          // 扭曲强度
        uRadius: { value: 2.0 },         // 漩涡半径
        uColor1: { value: new THREE.Color(0xff00ff) },    // 主颜色1
        uColor2: { value: new THREE.Color(0x00ffff) },    // 主颜色2
        uIntensity: { value: 1.5 },      // 强度
        uGlow: { value: 0.8 },           // 发光强度
        uPulse: { value: 0.5 }           // 脉冲效果
      },
      // 顶点着色器：漩涡变形
      vertexShader: `
        uniform float uTime;
        uniform float uSpeed;
        uniform float uTwist;
        uniform float uRadius;
        uniform float uPulse;
        
        varying vec2 vUv;
        varying vec3 vPosition;
        varying float vDistance;
        varying float vPulse;
        
        void main() {
          vUv = uv;
          vPosition = position;
          
          // 计算到中心的距离
          vDistance = length(position.xy);
          
          // 脉冲效果
          vPulse = sin(uTime * 2.0) * 0.5 + 0.5;
          
          // 漩涡变形
          vec3 newPosition = position;
          
          // 计算角度和半径
          float angle = atan(position.y, position.x);
          float radius = length(position.xy);
          
          // 漩涡扭曲效果
          angle += uTime * uSpeed + radius * uTwist;
          
          // 重新计算位置
          newPosition.x = cos(angle) * radius;
          newPosition.y = sin(angle) * radius;
          
          // Z轴高度变化
          newPosition.z = sin(radius * 3.0 - uTime * 2.0) * 0.3;
          
          // 脉冲效果影响高度
          newPosition.z += vPulse * uPulse * 0.2;
          
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
    `,
      // 片段着色器：魔法漩涡视觉效果
      fragmentShader: `
        uniform float uTime;
        uniform float uIntensity;
        uniform float uGlow;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        
        varying vec2 vUv;
        varying vec3 vPosition;
        varying float vDistance;
        varying float vPulse;
        
        void main() {
          // 基础漩涡密度
          float density = 1.0 - smoothstep(0.0, 3.0, vDistance);
          
          // 动态效果
          float timeEffect = sin(uTime * 3.0 + vDistance * 5.0) * 0.3 + 0.7;
          density *= timeEffect;
          
          // 脉冲效果
          density *= 1.0 + vPulse * 0.3;
          
          // 颜色渐变
          float colorMix = sin(vDistance * 4.0 - uTime * 2.0) * 0.5 + 0.5;
          vec3 finalColor = mix(uColor1, uColor2, colorMix);
          
          // 发光效果
          float glow = pow(density, 2.0) * uGlow;
          finalColor *= 1.0 + glow;
          
          // 边缘光晕
          float edgeGlow = 1.0 - smoothstep(2.5, 3.0, vDistance);
          finalColor += vec3(0.2, 0.5, 1.0) * edgeGlow * 0.5;
          
          // 计算最终颜色和透明度
          finalColor *= density * uIntensity;
          float alpha = density * uIntensity;
          
          // 确保透明度在合理范围内
          alpha = clamp(alpha, 0.0, 0.9);
          
          gl_FragColor = vec4(finalColor, alpha);
        }
    `
    });

    // 创建网格对象，将几何体和材质组合，并添加到场景中
    const mesh = new THREE.Mesh(geometry, material);
    // 将平面旋转90度，使其水平放置
    mesh.rotation.x = -Math.PI / 2
    scene.add(mesh);

    // 添加环境光
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    // 添加点光源，增强立体感
    const pointLight = new THREE.PointLight(0xffffff, 1.0, 10);
    pointLight.position.set(2, 2, 2);
    scene.add(pointLight);

    // 创建图形界面控制器
    const gui = new GUI()
    const params = {
      主颜色1: '#ff00ff',
      主颜色2: '#00ffff',
      漩涡速度: 1.0,
      扭曲强度: 3.0,
      漩涡半径: 2.0,
      效果强度: 1.5,
      发光强度: 0.8,
      脉冲效果: 0.5
    }

    // 颜色控制
    gui.addColor(params, '主颜色1').onChange((value) => {
      material.uniforms.uColor1.value.set(value);
    });
    gui.addColor(params, '主颜色2').onChange((value) => {
      material.uniforms.uColor2.value.set(value);
    });

    // 参数控制
    gui.add(params, '漩涡速度', 0.1, 3.0).onChange((value) => {
      material.uniforms.uSpeed.value = value;
    });
    gui.add(params, '扭曲强度', 0.1, 8.0).onChange((value) => {
      material.uniforms.uTwist.value = value;
    });
    gui.add(params, '漩涡半径', 1.0, 5.0).onChange((value) => {
      material.uniforms.uRadius.value = value;
    });
    gui.add(params, '效果强度', 0.1, 3.0).onChange((value) => {
      material.uniforms.uIntensity.value = value;
    });
    gui.add(params, '发光强度', 0.1, 2.0).onChange((value) => {
      material.uniforms.uGlow.value = value;
    });
    gui.add(params, '脉冲效果', 0.0, 1.0).onChange((value) => {
      material.uniforms.uPulse.value = value;
    });

    // 动画循环函数
    animate()

    function animate() {
      requestAnimationFrame(animate)
      controls.update()
      renderer.render(scene, camera)
      material.uniforms.uTime.value += 0.016;
    }
  </script>
</body>
</html>
