<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js纳米技术效果着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #006633 0%, #003311 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #66ff99;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #66ff99;
      border: 1px solid #66ff99;
      box-shadow: 0 0 20px #66ff99;
    }
    .nano-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #ffcc66;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ffcc66;
      border: 1px solid #ffcc66;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ff66ff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff66ff;
      border: 1px solid #ff66ff;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">🔬 纳米技术效果 - 实时渲染 🔬</div>
  <div class="nano-info" id="nanoInfo">分子组装: 活跃 | 精度: 纳米级</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变纳米技术效果<br>
    • 实时交互：体验微观世界
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x006633);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,8)的位置观察场景
    camera.position.set(0, 0, 8)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 纳米技术效果参数
    const nanoParams = {
      molecularAssembly: 0.8,
      precisionLevel: 0.7,
      nanoDensity: 0.6,
      glowIntensity: 1.2,
      quantumEffect: 0.8,
      nanoType: 0,
      showMolecules: true
    };

    // 创建立方体几何体，作为纳米技术的载体
    const geometry = new THREE.BoxGeometry(3, 3, 3);

    // 顶点着色器代码 - 纳米技术效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uMolecularAssembly;
      uniform float uPrecisionLevel;
      uniform float uQuantumEffect;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vNormal = normal;
        
        // 分子组装效果
        float assembly = sin(position.x * 3.0 + uTime * uMolecularAssembly) * 
                        cos(position.y * 4.0 + uTime * uMolecularAssembly * 0.8) *
                        sin(position.z * 3.0 + uTime * uMolecularAssembly * 0.6);
        
        // 精度级别
        float precision = sin(position.x * 5.0 + uTime * uPrecisionLevel * 2.0) *
                         cos(position.z * 5.0 + uTime * uPrecisionLevel * 2.0);
        
        // 量子效应
        float quantum = sin(position.x * uQuantumEffect * 6.0) *
                       cos(position.y * uQuantumEffect * 8.0);
        
        vec3 newPosition = position + normal * (assembly + precision * 0.5 + quantum * 0.3) * 0.15;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    // 片段着色器代码 - 纳米技术效果
    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uMolecularAssembly;
      uniform float uPrecisionLevel;
      uniform float uNanoDensity;
      uniform float uGlowIntensity;
      uniform float uQuantumEffect;
      uniform int uNanoType;
      uniform bool uShowMolecules;
      
      // 噪声函数
      float noise(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // 纳米技术效果
      float nanotechnology(vec2 uv, float assembly) {
        float nanoField = 0.0;
        
        // 多层纳米技术
        nanoField += sin(uv.x * 4.0 + uTime * 0.3) * 
                    cos(uv.y * 6.0 + uTime * 0.5);
        nanoField += sin(uv.x * 6.0 + uTime * 0.7) * 
                    cos(uv.y * 8.0 + uTime * 0.9) * 0.7;
        nanoField += sin(uv.x * 8.0 + uTime * 1.1) * 
                    cos(uv.y * 10.0 + uTime * 1.3) * 0.4;
        
        return nanoField * assembly;
      }
      
      // 分子效果
      float molecules(vec2 uv, float density) {
        float moleculeField = 0.0;
        for(int i = 0; i < 20; i++) {
          vec2 moleculePos = vec2(
            noise(vec2(float(i) * 0.123, 0.456)),
            noise(vec2(float(i) * 0.456, 0.789))
          );
          float dist = distance(uv, moleculePos);
          float moleculeSize = noise(vec2(float(i) * 0.789, 0.123)) * 0.04 + 0.02;
          float moleculeLife = mod(uTime * 1.5 + float(i) * 8.0, 6.28);
          float moleculeIntensity = sin(moleculeLife) * 0.7 + 0.3;
          moleculeField += exp(-dist * 45.0) * moleculeIntensity * density;
        }
        return moleculeField;
      }
      
      // 纳米类型
      vec3 getNanoType(int type) {
        if(type == 0) {
          // 碳纳米管
          return vec3(0.2, 0.8, 0.4);
        } else if(type == 1) {
          // 量子点
          return vec3(0.2, 0.6, 1.0);
        } else {
          // 石墨烯
          return vec3(0.8, 0.8, 0.8);
        }
      }
      
      void main() {
        vec2 uv = vUv;
        
        // 纳米技术效果
        float nanoValue = nanotechnology(uv, uMolecularAssembly);
        
        // 分子效果
        float moleculeValue = molecules(uv, uNanoDensity);
        
        // 颜色计算
        vec3 baseColor = getNanoType(uNanoType);
        vec3 finalColor = baseColor * (nanoValue * 0.6 + moleculeValue * 0.4) * uGlowIntensity;
        
        // 量子效应
        float quantumEffect = sin(uTime * uQuantumEffect) * 0.2 + 0.8;
        finalColor *= quantumEffect;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uMolecularAssembly: { value: nanoParams.molecularAssembly },
        uPrecisionLevel: { value: nanoParams.precisionLevel },
        uNanoDensity: { value: nanoParams.nanoDensity },
        uGlowIntensity: { value: nanoParams.glowIntensity },
        uQuantumEffect: { value: nanoParams.quantumEffect },
        uNanoType: { value: nanoParams.nanoType },
        uShowMolecules: { value: nanoParams.showMolecules }
      }
    });

    // 创建网格对象并添加到场景中
    const nanoCube = new THREE.Mesh(geometry, material);
    scene.add(nanoCube);

    // 更新纳米技术信息显示
    function updateNanoInfo() {
      const nanoElement = document.getElementById('nanoInfo');
      let assembly = "静止";
      if(nanoParams.molecularAssembly > 0.4) assembly = "活跃";
      if(nanoParams.molecularAssembly > 0.7) assembly = "非常活跃";
      
      let precision = "微米级";
      if(nanoParams.precisionLevel > 0.5) precision = "纳米级";
      if(nanoParams.precisionLevel > 0.8) precision = "原子级";
      
      nanoElement.textContent = `分子组装: ${assembly} | 精度: ${precision}`;
    }

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 纳米技术参数控制
    const nanoFolder = gui.addFolder('纳米技术效果参数');
    nanoFolder.add(nanoParams, 'molecularAssembly', 0.1, 1.2).name('分子组装');
    nanoFolder.add(nanoParams, 'precisionLevel', 0.1, 1.0).name('精度级别');
    nanoFolder.add(nanoParams, 'nanoDensity', 0.1, 1.0).name('纳米密度');
    nanoFolder.add(nanoParams, 'glowIntensity', 0.1, 1.8).name('发光强度');
    nanoFolder.add(nanoParams, 'quantumEffect', 0.1, 0.9).name('量子效应');
    nanoFolder.add(nanoParams, 'showMolecules').name('显示分子');
    
    // 纳米类型控制
    const nanoTypes = {
      "碳纳米管": 0,
      "量子点": 1,
      "石墨烯": 2
    };
    nanoFolder.add(nanoParams, 'nanoType', nanoTypes).name('纳米类型');
    
    nanoFolder.open();

    // 参数变化时更新材质和纳米技术信息
    gui.onChange(() => {
      material.uniforms.uMolecularAssembly.value = nanoParams.molecularAssembly;
      material.uniforms.uPrecisionLevel.value = nanoParams.precisionLevel;
      material.uniforms.uNanoDensity.value = nanoParams.nanoDensity;
      material.uniforms.uGlowIntensity.value = nanoParams.glowIntensity;
      material.uniforms.uQuantumEffect.value = nanoParams.quantumEffect;
      material.uniforms.uNanoType.value = nanoParams.nanoType;
      material.uniforms.uShowMolecules.value = nanoParams.showMolecules;
      
      updateNanoInfo();
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转纳米技术立方体
      nanoCube.rotation.y += nanoParams.molecularAssembly * 0.01;
      nanoCube.rotation.x += nanoParams.molecularAssembly * 0.005;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 初始化纳米技术信息显示
    updateNanoInfo();

    // 启动动画循环
    animate();
  </script>
</body>

</html>
