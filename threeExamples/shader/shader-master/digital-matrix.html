<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 数字矩阵效果</title>
    <!-- 配置模块导入映射 -->
      <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"
      }
    }
  </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';;
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 8);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float rainSpeed;
                uniform float charDensity;
                uniform float glowIntensity;
                uniform vec3 matrixColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 伪随机数生成器
                float random(vec2 p) {
                    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                }
                
                // 字符生成函数
                float char(vec2 uv, float seed) {
                    vec2 grid = floor(uv * charDensity);
                    float charValue = random(grid + seed);
                    return step(0.9, charValue);
                }
                
                // 数字雨效果
                float matrixRain(vec2 uv, float time) {
                    float rain = 0.0;
                    
                    // 创建多个雨滴层
                    for (int i = 0; i < 3; i++) {
                        float layer = float(i) * 0.3;
                        float speed = rainSpeed * (1.0 + layer * 0.5);
                        
                        // 垂直移动
                        float yOffset = fract(uv.y + time * speed + layer);
                        
                        // 创建雨滴头部
                        float head = smoothstep(0.0, 0.1, yOffset) * smoothstep(0.2, 0.1, yOffset);
                        
                        // 创建雨滴尾部
                        float tail = smoothstep(0.0, 0.3, yOffset) * (1.0 - smoothstep(0.5, 0.8, yOffset));
                        
                        rain += (head + tail * 0.3) * (1.0 - layer * 0.5);
                    }
                    
                    return rain;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 生成数字字符
                    float characters = char(uv, time);
                    
                    // 生成数字雨
                    float rain = matrixRain(uv, time);
                    
                    // 组合效果
                    float effect = max(characters, rain);
                    
                    // 基础颜色
                    vec3 color = matrixColor * effect;
                    
                    // 添加发光效果
                    float glow = smoothstep(0.3, 1.0, effect) * glowIntensity;
                    color += glow * matrixColor * 2.0;
                    
                    // 添加深度效果
                    float depth = 1.0 - length(uv - 0.5);
                    color *= depth * 0.5 + 0.5;
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    rainSpeed: { value: 2.0 },
                    charDensity: { value: 30.0 },
                    glowIntensity: { value: 0.8 },
                    matrixColor: { value: new THREE.Color(0x00ff00) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.BoxGeometry(4, 4, 4);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
            
            // 添加旋转动画
            gsap.to(_primitive.rotation, {
                x: Math.PI * 2,
                y: Math.PI * 2,
                duration: 15,
                repeat: -1,
                ease: "none"
            });
        }

        // 创建GUI
        function createGUI() {
            gui = new GUI();
            const params = {
                matrixColor: '#00ff00',
                rainSpeed: 2.0,
                charDensity: 30.0,
                glowIntensity: 0.8,
                reset: function() {
                    mat.uniforms.matrixColor.value.set('#00ff00');
                    mat.uniforms.rainSpeed.value = 2.0;
                    mat.uniforms.charDensity.value = 30.0;
                    mat.uniforms.glowIntensity.value = 0.8;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'matrixColor').onChange(value => {
                mat.uniforms.matrixColor.value.set(value);
            });
            gui.add(mat.uniforms.rainSpeed, 'value', 0.5, 5.0).name('雨滴速度');
            gui.add(mat.uniforms.charDensity, 'value', 10.0, 50.0).name('字符密度');
            gui.add(mat.uniforms.glowIntensity, 'value', 0.1, 2.0).name('发光强度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
