<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 水晶生长效果</title>
    <!-- 配置模块导入映射 -->
      <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"
      }
    }
  </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';;
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 6);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float growthSpeed;
                uniform float crystalDensity;
                uniform float refractionIndex;
                uniform vec3 crystalColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 晶格噪声函数
                float latticeNoise(vec2 p) {
                    vec2 i = floor(p);
                    vec2 f = fract(p);
                    
                    float a = sin(dot(i, vec2(12.9898, 78.233)));
                    float b = sin(dot(i + vec2(1.0, 0.0), vec2(12.9898, 78.233)));
                    float c = sin(dot(i + vec2(0.0, 1.0), vec2(12.9898, 78.233)));
                    float d = sin(dot(i + vec2(1.0, 1.0), vec2(12.9898, 78.233)));
                    
                    vec2 u = f * f * (3.0 - 2.0 * f);
                    return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
                }
                
                // 分形晶格噪声
                float fractalLattice(vec2 p, float density) {
                    float value = 0.0;
                    float amplitude = 0.5;
                    float frequency = density;
                    
                    for (int i = 0; i < 4; i++) {
                        value += amplitude * latticeNoise(p * frequency + time * growthSpeed);
                        amplitude *= 0.5;
                        frequency *= 2.0;
                    }
                    return value;
                }
                
                // 折射效果
                vec3 refractColor(vec2 uv, float index) {
                    vec2 distortedUV = uv + sin(uv * 20.0 + time) * 0.01 * index;
                    float r = sin(distortedUV.x * 10.0 + time) * 0.5 + 0.5;
                    float g = sin(distortedUV.y * 10.0 + time * 1.2) * 0.5 + 0.5;
                    float b = sin((distortedUV.x + distortedUV.y) * 5.0 + time * 0.8) * 0.5 + 0.5;
                    return vec3(r, g, b) * 0.3;
                }
                
                void main() {
                    vec2 uv = vUv * 2.0 - 1.0;
                    
                    // 生成水晶生长图案
                    float growth = fractalLattice(uv * crystalDensity, crystalDensity);
                    growth = pow(growth, 2.0);
                    
                    // 基础水晶颜色
                    vec3 color = crystalColor * growth;
                    
                    // 添加折射效果
                    vec3 refraction = refractColor(uv, refractionIndex);
                    color += refraction;
                    
                    // 添加边缘发光
                    float edge = smoothstep(0.7, 1.0, growth) * 0.5;
                    color += edge * vec3(0.8, 1.0, 1.0);
                    
                    // 添加内部结构
                    float internal = sin(uv.x * 30.0 + time * 2.0) * sin(uv.y * 30.0 + time * 2.0) * 0.1;
                    color += internal;
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    growthSpeed: { value: 0.5 },
                    crystalDensity: { value: 3.0 },
                    refractionIndex: { value: 1.5 },
                    crystalColor: { value: new THREE.Color(0x88ccff) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.OctahedronGeometry(2, 3);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
            
            // 添加旋转动画
            gsap.to(_primitive.rotation, {
                x: Math.PI * 2,
                y: Math.PI * 2,
                duration: 20,
                repeat: -1,
                ease: "none"
            });
        }

        // 创建GUI
        function createGUI() {
            gui = new GUI();
            const params = {
                crystalColor: '#88ccff',
                growthSpeed: 0.5,
                crystalDensity: 3.0,
                refractionIndex: 1.5,
                reset: function() {
                    mat.uniforms.crystalColor.value.set('#88ccff');
                    mat.uniforms.growthSpeed.value = 0.5;
                    mat.uniforms.crystalDensity.value = 3.0;
                    mat.uniforms.refractionIndex.value = 1.5;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'crystalColor').onChange(value => {
                mat.uniforms.crystalColor.value.set(value);
            });
            gui.add(mat.uniforms.growthSpeed, 'value', 0.1, 2.0).name('生长速度');
            gui.add(mat.uniforms.crystalDensity, 'value', 1.0, 8.0).name('晶体密度');
            gui.add(mat.uniforms.refractionIndex, 'value', 1.0, 3.0).name('折射率');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
