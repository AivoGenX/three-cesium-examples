<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 时空扭曲效果</title>
    <!-- 配置模块导入映射 -->
      <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"
      }
    }
  </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';;
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 7);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float warpIntensity;
                uniform float frequency;
                uniform float speed;
                uniform vec3 warpColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 旋转扭曲函数
                vec2 rotate(vec2 p, float angle) {
                    float s = sin(angle);
                    float c = cos(angle);
                    return vec2(p.x * c - p.y * s, p.x * s + p.y * c);
                }
                
                // 径向扭曲
                vec2 radialWarp(vec2 uv, float intensity) {
                    vec2 center = vec2(0.5, 0.5);
                    vec2 dir = uv - center;
                    float dist = length(dir);
                    float angle = atan(dir.y, dir.x);
                    
                    // 添加时间相关的扭曲
                    angle += sin(dist * frequency + time * speed) * intensity;
                    dist *= 1.0 + sin(angle * 3.0 + time * 2.0) * intensity * 0.3;
                    
                    return center + vec2(cos(angle), sin(angle)) * dist;
                }
                
                // 创建时空网格
                float spaceTimeGrid(vec2 uv, float time) {
                    vec2 warpedUV = radialWarp(uv, warpIntensity);
                    
                    float gridX = sin(warpedUV.x * 30.0 + time * 3.0) * 0.5 + 0.5;
                    float gridY = sin(warpedUV.y * 30.0 + time * 3.0) * 0.5 + 0.5;
                    
                    return (gridX + gridY) * 0.5;
                }
                
                // 创建引力波效果
                float gravitationalWave(vec2 uv, float time) {
                    vec2 center = vec2(0.5, 0.5);
                    float dist = length(uv - center);
                    
                    float wave = sin(dist * 20.0 - time * 5.0) * 0.5 + 0.5;
                    return smoothstep(0.3, 0.0, dist) * wave;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 应用时空扭曲
                    vec2 warpedUV = radialWarp(uv, warpIntensity);
                    
                    // 创建时空网格
                    float grid = spaceTimeGrid(warpedUV, time);
                    
                    // 创建引力波
                    float wave = gravitationalWave(uv, time);
                    
                    // 组合颜色
                    vec3 color = warpColor;
                    color *= grid * 0.8 + 0.2;
                    color += wave * vec3(0.5, 0.8, 1.0);
                    
                    // 添加中心发光效果
                    vec2 center = vec2(0.5, 0.5);
                    float dist = length(uv - center);
                    float glow = smoothstep(0.4, 0.0, dist) * 0.5;
                    color += glow * vec3(1.0, 0.8, 0.6);
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    warpIntensity: { value: 0.5 },
                    frequency: { value: 10.0 },
                    speed: { value: 2.0 },
                    warpColor: { value: new THREE.Color(0x4a00ff) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(6, 6, 128, 128);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new GUI();
            const params = {
                warpColor: '#4a00ff',
                warpIntensity: 0.5,
                frequency: 10.0,
                speed: 2.0,
                reset: function() {
                    mat.uniforms.warpColor.value.set('#4a00ff');
                    mat.uniforms.warpIntensity.value = 0.5;
                    mat.uniforms.frequency.value = 10.0;
                    mat.uniforms.speed.value = 2.0;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'warpColor').onChange(value => {
                mat.uniforms.warpColor.value.set(value);
            });
            gui.add(mat.uniforms.warpIntensity, 'value', 0.0, 1.0).name('扭曲强度');
            gui.add(mat.uniforms.frequency, 'value', 1.0, 30.0).name('频率');
            gui.add(mat.uniforms.speed, 'value', 0.5, 5.0).name('速度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
