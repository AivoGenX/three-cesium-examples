<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 酷炫脉冲能量场</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #003366 0%, #000033 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00ffff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #00ffff;
      border: 1px solid #00ffff;
      box-shadow: 0 0 20px #00ffff;
    }
    .shield-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #ff9900;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff9900;
      border: 1px solid #ff9900;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ff00ff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff00ff;
      border: 1px solid #ff00ff;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">🛡️ 能量脉冲 - 实时渲染 🛡️</div>
  <div class="shield-info" id="shieldInfo">脉冲强度: 中等 | 能量等级: 高</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变脉冲效果<br>
    • 实时交互：体验能量脉冲
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x003366);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(75, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,8)的位置观察场景
    camera.position.set(0, 0, 8)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 能量脉冲参数
    const shieldParams = {
      shieldStrength: 2.0,
      pulseSpeed: 1.2,
      glowIntensity: 2.5
    };

    // 创建二十面体几何体，作为能量脉冲的载体
    const geometry = new THREE.IcosahedronGeometry(2.5, 3);

    // 顶点着色器代码 - 酷炫脉冲效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying float vPulse;
      varying float vDistance;
      varying float vWave;
      
      uniform float uTime;
      uniform float uShieldStrength;
      uniform float uPulseSpeed;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vDistance = length(position);
        
        // 主脉冲 - 强烈的周期性膨胀收缩
        float mainPulse = sin(uTime * uPulseSpeed) * 0.5 + 0.5;
        
        // 次级脉冲 - 高频脉动叠加
        float subPulse = sin(uTime * uPulseSpeed * 4.5) * 0.2 + 0.8;
        
        // 三级脉冲 - 快速抖动
        float fastPulse = sin(uTime * uPulseSpeed * 8.0) * 0.1 + 0.95;
        
        vPulse = mainPulse * subPulse * fastPulse;
        
        // 波纹效果 - 从中心向外传播
        vWave = sin(uTime * uPulseSpeed * 3.0 - vDistance * 5.0) * 0.5 + 0.5;
        
        // 边缘增强的脉冲膨胀
        float edgeBoost = smoothstep(1.5, 2.5, vDistance);
        float scale = 1.0 + vPulse * edgeBoost * uShieldStrength * 0.35;
        
        // 添加波纹起伏
        float waveDistort = vWave * 0.1 * edgeBoost;
        vec3 distortedPos = position * scale + normalize(position) * waveDistort;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(distortedPos, 1.0);
      }
    `;

    // 片段着色器代码 - 酷炫脉冲效果
    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying float vPulse;
      varying float vDistance;
      varying float vWave;
      
      uniform float uTime;
      uniform float uShieldStrength;
      uniform float uPulseSpeed;
      uniform float uGlowIntensity;
      
      // 简单的伪随机函数
      float random(vec2 st) {
        return fract(sin(dot(st, vec2(12.9898, 78.233))) * 43758.5453);
      }
      
      void main() {
        vec2 uv = vUv * 2.0 - 1.0;
        float radial = length(uv);
        
        // ========== 多层脉冲波纹 ==========
        // 主波纹 - 向外扩散的冲击波
        float shockWave = smoothstep(0.95, 0.0, abs(sin(uTime * uPulseSpeed * 2.5 - radial * 8.0)));
        
        // 次级波纹 - 快速扩散
        float fastWave = smoothstep(0.9, 0.0, abs(sin(uTime * uPulseSpeed * 4.0 - radial * 12.0)));
        
        // 涟漪效果
        float ripple = sin(uTime * uPulseSpeed - radial * 4.0) * 0.5 + 0.5;
        
        // ========== 能量密度 ==========
        float baseDensity = 1.0 - smoothstep(0.0, 1.0, radial);
        float pulseDensity = vPulse * (shockWave * 0.5 + fastWave * 0.3 + ripple * 0.2);
        float density = baseDensity * pulseDensity;
        
        // ========== 颜色系统 ==========
        // 主色调 - 从青色到紫色动态变化
        float colorPhase = uTime * uPulseSpeed * 0.8;
        vec3 cyan = vec3(0.0, 1.0, 1.0);
        vec3 magenta = vec3(1.0, 0.0, 1.0);
        vec3 orange = vec3(1.0, 0.5, 0.0);
        
        vec3 colorA = mix(cyan, magenta, sin(colorPhase) * 0.5 + 0.5);
        vec3 colorB = mix(colorA, orange, sin(colorPhase * 1.5) * 0.3 + 0.7);
        vec3 finalColor = colorB;
        
        // ========== 发光效果 ==========
        // 核心发光
        float coreGlow = exp(-radial * 3.0) * uGlowIntensity * 3.0;
        
        // 边缘发光环 - 多层光环
        float outerGlow = 0.0;
        for(int i = 0; i < 3; i++) {
          float ring = smoothstep(0.92 + float(i)*0.03, 0.85 + float(i)*0.03, radial);
          ring *= sin(uTime * uPulseSpeed * (3.0 + float(i)) + float(i)*1.57) * 0.5 + 0.5;
          outerGlow += ring;
        }
        outerGlow *= uGlowIntensity * 2.0;
        
        // ========== 火花效果 ==========
        float sparks = 0.0;
        for(int i = 0; i < 5; i++) {
          float sparkAngle = uTime * uPulseSpeed * 2.0 + float(i) * 2.5;
          vec2 sparkPos = vec2(cos(sparkAngle), sin(sparkAngle)) * 0.8;
          float spark = smoothstep(0.15, 0.0, length(uv - sparkPos));
          spark *= sin(uTime * uPulseSpeed * 10.0 + float(i)) * 0.5 + 0.5;
          sparks += spark;
        }
        sparks *= 0.3;
        
        // ========== 能量条纹 ==========
        float stripes = sin(uv.y * 20.0 + uTime * uPulseSpeed * 5.0) * 0.5 + 0.5;
        stripes *= smoothstep(0.95, 0.8, radial);
        
        // ========== 组合所有效果 ==========
        finalColor *= (density * uShieldStrength * 2.0);
        finalColor += coreGlow * vec3(0.3, 0.8, 1.0);
        finalColor += outerGlow * vec3(0.8, 0.6, 1.0);
        finalColor += sparks * vec3(1.0, 1.0, 0.5);
        finalColor *= (stripes * 0.3 + 0.7);
        
        // ========== 透明度 ==========
        float alpha = density * uShieldStrength * 0.9;
        alpha += outerGlow * 0.3;
        alpha *= (1.0 - smoothstep(0.95, 1.0, radial));
        
        gl_FragColor = vec4(finalColor, alpha);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uShieldStrength: { value: shieldParams.shieldStrength },
        uPulseSpeed: { value: shieldParams.pulseSpeed },
        uGlowIntensity: { value: shieldParams.glowIntensity }
      }
    });

    // 创建网格对象并添加到场景中
    const shield = new THREE.Mesh(geometry, material);
    scene.add(shield);

    // 更新脉冲信息显示
    function updateShieldInfo() {
      const shieldElement = document.getElementById('shieldInfo');
      let strength = "低";
      if(shieldParams.shieldStrength > 1.0) strength = "中等";
      if(shieldParams.shieldStrength > 1.5) strength = "高";
      
      let speed = "慢";
      if(shieldParams.pulseSpeed > 0.5) speed = "中等";
      if(shieldParams.pulseSpeed > 1.0) speed = "快";
      
      shieldElement.textContent = `脉冲强度: ${strength} | 脉冲速度: ${speed}`;
    }

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 脉冲参数控制
    const pulseFolder = gui.addFolder('脉冲参数');
    pulseFolder.add(shieldParams, 'shieldStrength', 0.1, 2.5).name('脉冲强度');
    pulseFolder.add(shieldParams, 'pulseSpeed', 0.1, 2.0).name('脉冲速度');
    pulseFolder.add(shieldParams, 'glowIntensity', 0.1, 3.0).name('发光强度');
    
    pulseFolder.open();

    // 参数变化时更新材质和脉冲信息
    gui.onChange(() => {
      material.uniforms.uShieldStrength.value = shieldParams.shieldStrength;
      material.uniforms.uPulseSpeed.value = shieldParams.pulseSpeed;
      material.uniforms.uGlowIntensity.value = shieldParams.glowIntensity;
      
      updateShieldInfo();
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转脉冲
      shield.rotation.x += 0.004;
      shield.rotation.y += 0.006;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 初始化脉冲信息显示
    updateShieldInfo();

    // 启动动画循环
    animate();
  </script>
</body>

</html>
