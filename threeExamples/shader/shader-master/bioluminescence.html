<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 生物发光效果</title>
    <!-- 配置模块导入映射 -->
      <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"
      }
    }
  </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';;
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 7);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float glowIntensity;
                uniform float pulseSpeed;
                uniform float organismDensity;
                uniform vec3 bioColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 生物发光细胞函数
                float bioCell(vec2 p, float seed) {
                    vec2 cellPos = floor(p * organismDensity);
                    float cellValue = sin(dot(cellPos, vec2(12.9898, 78.233)) + seed) * 0.5 + 0.5;
                    
                    vec2 localPos = fract(p * organismDensity) - 0.5;
                    float dist = length(localPos);
                    
                    return smoothstep(0.3, 0.0, dist) * cellValue;
                }
                
                // 生物发光网络
                float bioNetwork(vec2 uv, float time) {
                    float network = 0.0;
                    
                    // 创建多个生物发光细胞
                    for (int i = 0; i < 5; i++) {
                        float seed = float(i) * 10.0;
                        float cell = bioCell(uv + sin(time * 0.5 + seed) * 0.1, seed);
                        network += cell * (1.0 - float(i) * 0.15);
                    }
                    
                    return network;
                }
                
                // 脉动效果
                float pulseEffect(vec2 uv, float time) {
                    vec2 center = vec2(0.5, 0.5);
                    float dist = length(uv - center);
                    
                    float pulse = sin(time * pulseSpeed) * 0.5 + 0.5;
                    float radialPulse = smoothstep(0.4, 0.0, dist) * pulse;
                    
                    return radialPulse;
                }
                
                // 深海波动效果
                float deepSeaWave(vec2 uv, float time) {
                    float wave = sin(uv.x * 5.0 + time * 0.3) * 
                               sin(uv.y * 5.0 + time * 0.4) * 0.2 + 0.8;
                    return wave;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 生成生物发光网络
                    float bioGlow = bioNetwork(uv, time);
                    
                    // 添加脉动效果
                    float pulse = pulseEffect(uv, time);
                    
                    // 添加深海波动
                    float wave = deepSeaWave(uv, time);
                    
                    // 组合效果
                    float glow = (bioGlow + pulse) * glowIntensity * wave;
                    
                    // 基础生物发光颜色
                    vec3 color = bioColor * glow;
                    
                    // 添加颜色变化
                    float colorShift = sin(time * 0.5) * 0.3 + 0.7;
                    color *= colorShift;
                    
                    // 添加水波折射效果
                    vec2 refractedUV = uv + sin(uv * 10.0 + time) * 0.01;
                    float refraction = sin(refractedUV.x * 20.0) * sin(refractedUV.y * 20.0) * 0.05;
                    color += refraction;
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    glowIntensity: { value: 1.0 },
                    pulseSpeed: { value: 1.5 },
                    organismDensity: { value: 6.0 },
                    bioColor: { value: new THREE.Color(0x00ff88) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.TorusKnotGeometry(2, 0.5, 100, 16);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
            
            // 添加旋转动画
            gsap.to(_primitive.rotation, {
                x: Math.PI * 2,
                y: Math.PI * 2,
                duration: 30,
                repeat: -1,
                ease: "none"
            });
        }

        // 创建GUI
        function createGUI() {
            gui = new GUI();
            const params = {
                bioColor: '#00ff88',
                glowIntensity: 1.0,
                pulseSpeed: 1.5,
                organismDensity: 6.0,
                reset: function() {
                    mat.uniforms.bioColor.value.set('#00ff88');
                    mat.uniforms.glowIntensity.value = 1.0;
                    mat.uniforms.pulseSpeed.value = 1.5;
                    mat.uniforms.organismDensity.value = 6.0;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'bioColor').onChange(value => {
                mat.uniforms.bioColor.value.set(value);
            });
            gui.add(mat.uniforms.glowIntensity, 'value', 0.1, 2.0).name('发光强度');
            gui.add(mat.uniforms.pulseSpeed, 'value', 0.5, 3.0).name('脉动速度');
            gui.add(mat.uniforms.organismDensity, 'value', 3.0, 12.0).name('生物密度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
