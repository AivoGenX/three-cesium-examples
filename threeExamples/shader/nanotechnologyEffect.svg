<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nanoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006633;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003311;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="moleculeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#66ff99;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#006633;stop-opacity:0.3" />
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#nanoGradient)"/>
  
  <!-- 分子结构效果 -->
  <circle cx="150" cy="100" r="40" fill="url(#moleculeGlow)" opacity="0.6"/>
  
  <!-- 分子点阵 -->
  <circle cx="120" cy="80" r="6" fill="#66ff99" opacity="0.9">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="80" r="5" fill="#66ff99" opacity="0.8">
    <animate attributeName="r" values="5;7;5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="120" r="4" fill="#66ff99" opacity="0.7">
    <animate attributeName="r" values="4;6;4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="120" r="5" fill="#66ff99" opacity="0.8">
    <animate attributeName="r" values="5;7;5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 分子连接线 -->
  <line x1="120" y1="80" x2="180" y2="80" stroke="#66ff99" stroke-width="1" opacity="0.6"/>
  <line x1="140" y1="120" x2="160" y2="120" stroke="#66ff99" stroke-width="1" opacity="0.6"/>
  <line x1="120" y1="80" x2="140" y2="120" stroke="#66ff99" stroke-width="1" opacity="0.4"/>
  <line x1="180" y1="80" x2="160" y2="120" stroke="#66ff99" stroke-width="1" opacity="0.4"/>
  
  <!-- 纳米技术文字 -->
  <text x="150" y="160" text-anchor="middle" fill="#66ff99" font-size="14" font-weight="bold" font-family="Arial, sans-serif">
    纳米技术效果
  </text>
  <text x="150" y="180" text-anchor="middle" fill="#ffcc66" font-size="10" font-family="Arial, sans-serif">
    分子组装 | 精密工程
  </text>
  
  <!-- 科技感边框 -->
  <rect x="5" y="5" width="290" height="190" fill="none" stroke="#66ff99" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
</svg>