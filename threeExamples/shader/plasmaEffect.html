<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js等离子体效果着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #660000 0%, #330000 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #ff5500;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #ff5500;
      border: 1px solid #ff5500;
      box-shadow: 0 0 20px #ff5500;
    }
    .plasma-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #ffff00;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ffff00;
      border: 1px solid #ffff00;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ff66ff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff66ff;
      border: 1px solid #ff66ff;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">🔥 等离子体效果 - 实时渲染 🔥</div>
  <div class="plasma-info" id="plasmaInfo">温度: 极高 | 能量: 强大</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变等离子体效果<br>
    • 实时交互：体验高温等离子
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x660000);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,8)的位置观察场景
    camera.position.set(0, 0, 8)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 等离子体效果参数
    const plasmaParams = {
      temperature: 0.9,
      energyLevel: 0.8,
      plasmaDensity: 0.7,
      glowIntensity: 1.3,
      magneticField: 0.6,
      plasmaType: 0,
      showArcs: true
    };

    // 创建立方体几何体，作为等离子体的载体
    const geometry = new THREE.BoxGeometry(3, 3, 3);

    // 顶点着色器代码 - 等离子体效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uTemperature;
      uniform float uEnergyLevel;
      uniform float uMagneticField;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vNormal = normal;
        
        // 等离子体温度效果
        float temperature = sin(position.x * 3.0 + uTime * uTemperature) * 
                          cos(position.y * 4.0 + uTime * uTemperature * 0.8) *
                          sin(position.z * 3.0 + uTime * uTemperature * 0.6);
        
        // 能量级别
        float energy = sin(position.x * 5.0 + uTime * uEnergyLevel * 2.0) *
                      cos(position.z * 5.0 + uTime * uEnergyLevel * 2.0);
        
        // 磁场效果
        float magnetic = sin(position.x * uMagneticField * 6.0) *
                        cos(position.y * uMagneticField * 8.0);
        
        vec3 newPosition = position + normal * (temperature + energy * 0.5 + magnetic * 0.3) * 0.15;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    // 片段着色器代码 - 等离子体效果
    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uTemperature;
      uniform float uEnergyLevel;
      uniform float uPlasmaDensity;
      uniform float uGlowIntensity;
      uniform float uMagneticField;
      uniform int uPlasmaType;
      uniform bool uShowArcs;
      
      // 噪声函数
      float noise(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // 等离子体效果
      float plasmaEffect(vec2 uv, float temperature) {
        float plasmaField = 0.0;
        
        // 多层等离子体
        plasmaField += sin(uv.x * 4.0 + uTime * 0.3) * 
                      cos(uv.y * 6.0 + uTime * 0.5);
        plasmaField += sin(uv.x * 6.0 + uTime * 0.7) * 
                      cos(uv.y * 8.0 + uTime * 0.9) * 0.7;
        plasmaField += sin(uv.x * 8.0 + uTime * 1.1) * 
                      cos(uv.y * 10.0 + uTime * 1.3) * 0.4;
        
        return plasmaField * temperature;
      }
      
      // 等离子体密度效果
      float plasmaDensity(vec2 uv, float density) {
        float densityField = 0.0;
        for(int i = 0; i < 20; i++) {
          vec2 densityPos = vec2(
            noise(vec2(float(i) * 0.123, 0.456)),
            noise(vec2(float(i) * 0.456, 0.789))
          );
          float dist = distance(uv, densityPos);
          float densitySize = noise(vec2(float(i) * 0.789, 0.123)) * 0.04 + 0.02;
          float densityLife = mod(uTime * 1.5 + float(i) * 8.0, 6.28);
          float densityIntensity = sin(densityLife) * 0.7 + 0.3;
          densityField += exp(-dist * 45.0) * densityIntensity * density;
        }
        return densityField;
      }
      
      // 电弧效果
      float plasmaArcs(vec2 uv, float intensity) {
        if(!uShowArcs) return 0.0;
        
        float arcField = 0.0;
        
        // 电弧放电
        arcField += sin(uv.x * 20.0 + uTime * 3.0) * 0.1;
        arcField += sin(uv.y * 20.0 + uTime * 2.5) * 0.1;
        
        return arcField * intensity;
      }
      
      // 等离子体类型
      vec3 getPlasmaType(int type) {
        if(type == 0) {
          // 高温等离子体
          return vec3(1.0, 0.4, 0.2);
        } else if(type == 1) {
          // 低温等离子体
          return vec3(0.2, 0.6, 1.0);
        } else {
          // 核聚变等离子体
          return vec3(1.0, 0.8, 0.2);
        }
      }
      
      void main() {
        vec2 uv = vUv;
        
        // 等离子体效果
        float plasmaField = plasmaEffect(uv, uTemperature);
        
        // 等离子体密度效果
        float densityField = plasmaDensity(uv, uPlasmaDensity);
        
        // 电弧效果
        float arcField = plasmaArcs(uv, 0.3);
        
        // 颜色计算
        vec3 baseColor = getPlasmaType(uPlasmaType);
        vec3 finalColor = baseColor * (plasmaField * 0.5 + densityField * 0.3 + arcField * 0.2) * uGlowIntensity;
        
        // 能量波动效果
        float energyEffect = sin(uTime * uEnergyLevel) * 0.3 + 0.7;
        finalColor *= energyEffect;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uTemperature: { value: plasmaParams.temperature },
        uEnergyLevel: { value: plasmaParams.energyLevel },
        uPlasmaDensity: { value: plasmaParams.plasmaDensity },
        uGlowIntensity: { value: plasmaParams.glowIntensity },
        uMagneticField: { value: plasmaParams.magneticField },
        uPlasmaType: { value: plasmaParams.plasmaType },
        uShowArcs: { value: plasmaParams.showArcs }
      }
    });

    // 创建网格对象并添加到场景中
    const plasmaCube = new THREE.Mesh(geometry, material);
    scene.add(plasmaCube);

    // 更新等离子体信息显示
    function updatePlasmaInfo() {
      const plasmaElement = document.getElementById('plasmaInfo');
      let temperature = "低";
      if(plasmaParams.temperature > 0.5) temperature = "中";
      if(plasmaParams.temperature > 0.8) temperature = "极高";
      
      let energy = "弱";
      if(plasmaParams.energyLevel > 0.4) energy = "中";
      if(plasmaParams.energyLevel > 0.7) energy = "强大";
      
      plasmaElement.textContent = `温度: ${temperature} | 能量: ${energy}`;
    }

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 等离子体参数控制
    const plasmaFolder = gui.addFolder('等离子体效果参数');
    plasmaFolder.add(plasmaParams, 'temperature', 0.1, 1.2).name('温度');
    plasmaFolder.add(plasmaParams, 'energyLevel', 0.1, 1.0).name('能量级别');
    plasmaFolder.add(plasmaParams, 'plasmaDensity', 0.1, 1.0).name('等离子体密度');
    plasmaFolder.add(plasmaParams, 'glowIntensity', 0.1, 1.8).name('发光强度');
    plasmaFolder.add(plasmaParams, 'magneticField', 0.1, 0.9).name('磁场强度');
    plasmaFolder.add(plasmaParams, 'showArcs').name('显示电弧');
    
    // 等离子体类型控制
    const plasmaTypes = {
      "高温等离子体": 0,
      "低温等离子体": 1,
      "核聚变等离子体": 2
    };
    plasmaFolder.add(plasmaParams, 'plasmaType', plasmaTypes).name('等离子体类型');
    
    plasmaFolder.open();

    // 参数变化时更新材质和等离子体信息
    gui.onChange(() => {
      material.uniforms.uTemperature.value = plasmaParams.temperature;
      material.uniforms.uEnergyLevel.value = plasmaParams.energyLevel;
      material.uniforms.uPlasmaDensity.value = plasmaParams.plasmaDensity;
      material.uniforms.uGlowIntensity.value = plasmaParams.glowIntensity;
      material.uniforms.uMagneticField.value = plasmaParams.magneticField;
      material.uniforms.uPlasmaType.value = plasmaParams.plasmaType;
      material.uniforms.uShowArcs.value = plasmaParams.showArcs;
      
      updatePlasmaInfo();
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转等离子体立方体
      plasmaCube.rotation.y += plasmaParams.energyLevel * 0.01;
      plasmaCube.rotation.x += plasmaParams.energyLevel * 0.005;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 初始化等离子体信息显示
    updatePlasmaInfo();

    // 启动动画循环
    animate();
  </script>
</body>

</html>
