<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 电磁场效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 8);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float fieldStrength;
                uniform float lineDensity;
                uniform float pulseSpeed;
                uniform vec3 fieldColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 电场线函数
                float electricFieldLines(vec2 uv, float time) {
                    float lines = 0.0;
                    
                    // 创建径向电场线
                    vec2 center = vec2(0.5, 0.5);
                    vec2 dir = uv - center;
                    float angle = atan(dir.y, dir.x);
                    float dist = length(dir);
                    
                    // 电场线密度
                    float radialLines = sin(angle * lineDensity + time * pulseSpeed) * 0.5 + 0.5;
                    
                    // 距离衰减
                    radialLines *= smoothstep(0.0, 0.4, dist) * (1.0 - smoothstep(0.4, 0.8, dist));
                    
                    return radialLines;
                }
                
                // 磁场环函数
                float magneticFieldRings(vec2 uv, float time) {
                    vec2 center = vec2(0.5, 0.5);
                    float dist = length(uv - center);
                    
                    float rings = 0.0;
                    
                    // 创建多个磁场环
                    for (int i = 0; i < 3; i++) {
                        float radius = 0.1 + float(i) * 0.15;
                        float ring = smoothstep(radius - 0.02, radius, dist) * 
                                   (1.0 - smoothstep(radius, radius + 0.02, dist));
                        
                        // 添加脉冲效果
                        float pulse = sin(time * pulseSpeed + float(i) * 2.0) * 0.5 + 0.5;
                        rings += ring * pulse;
                    }
                    
                    return rings;
                }
                
                // 电荷效果
                float chargeEffect(vec2 uv, float time) {
                    vec2 positiveCharge = vec2(0.3, 0.5);
                    vec2 negativeCharge = vec2(0.7, 0.5);
                    
                    float positiveDist = length(uv - positiveCharge);
                    float negativeDist = length(uv - negativeCharge);
                    
                    float positiveField = smoothstep(0.1, 0.0, positiveDist);
                    float negativeField = smoothstep(0.1, 0.0, negativeDist);
                    
                    return (positiveField - negativeField) * 0.5 + 0.5;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 计算电场线
                    float electric = electricFieldLines(uv, time);
                    
                    // 计算磁场环
                    float magnetic = magneticFieldRings(uv, time);
                    
                    // 计算电荷效果
                    float charge = chargeEffect(uv, time);
                    
                    // 组合效果
                    float field = (electric + magnetic + charge) * fieldStrength;
                    
                    // 基础颜色
                    vec3 color = fieldColor * field;
                    
                    // 添加发光效果
                    float glow = smoothstep(0.3, 1.0, field) * 0.5;
                    color += glow * fieldColor * 2.0;
                    
                    // 添加闪烁效果
                    float flicker = sin(time * 10.0) * 0.1 + 0.9;
                    color *= flicker;
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    fieldStrength: { value: 0.8 },
                    lineDensity: { value: 8.0 },
                    pulseSpeed: { value: 2.0 },
                    fieldColor: { value: new THREE.Color(0xff3366) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(6, 6, 64, 64);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                fieldColor: '#ff3366',
                fieldStrength: 0.8,
                lineDensity: 8.0,
                pulseSpeed: 2.0,
                reset: function() {
                    mat.uniforms.fieldColor.value.set('#ff3366');
                    mat.uniforms.fieldStrength.value = 0.8;
                    mat.uniforms.lineDensity.value = 8.0;
                    mat.uniforms.pulseSpeed.value = 2.0;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'fieldColor').onChange(value => {
                mat.uniforms.fieldColor.value.set(value);
            });
            gui.add(mat.uniforms.fieldStrength, 'value', 0.1, 1.5).name('场强度');
            gui.add(mat.uniforms.lineDensity, 'value', 4.0, 16.0).name('线密度');
            gui.add(mat.uniforms.pulseSpeed, 'value', 0.5, 5.0).name('脉冲速度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
