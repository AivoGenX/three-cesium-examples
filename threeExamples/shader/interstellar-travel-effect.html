<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js星际旅行效果着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #000066 0%, #000033 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #66ccff;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #66ccff;
      border: 1px solid #66ccff;
      box-shadow: 0 0 20px #66ccff;
    }
    .travel-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #ff9966;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff9966;
      border: 1px solid #ff9966;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ffff66;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ffff66;
      border: 1px solid #ffff66;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">🚀 星际旅行效果 - 实时渲染 🚀</div>
  <div class="travel-info" id="travelInfo">速度: 超光速 | 距离: 光年</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变星际旅行效果<br>
    • 实时交互：体验宇宙航行
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x000066);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,8)的位置观察场景
    camera.position.set(0, 0, 8)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 星际旅行效果参数
    const travelParams = {
      warpSpeed: 0.8,
      starDensity: 0.7,
      nebulaEffect: 0.6,
      glowIntensity: 1.2,
      timeDilation: 0.8,
      travelType: 0,
      showStars: true
    };

    // 创建立方体几何体，作为星际旅行的载体
    const geometry = new THREE.BoxGeometry(3, 3, 3);

    // 顶点着色器代码 - 星际旅行效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uWarpSpeed;
      uniform float uStarDensity;
      uniform float uTimeDilation;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vNormal = normal;
        
        // 曲速航行效果
        float warp = sin(position.x * 3.0 + uTime * uWarpSpeed) * 
                    cos(position.y * 4.0 + uTime * uWarpSpeed * 0.8) *
                    sin(position.z * 3.0 + uTime * uWarpSpeed * 0.6);
        
        // 恒星密度
        float stars = sin(position.x * 5.0 + uTime * uStarDensity * 2.0) *
                     cos(position.z * 5.0 + uTime * uStarDensity * 2.0);
        
        // 时间膨胀
        float dilation = sin(position.x * uTimeDilation * 6.0) *
                        cos(position.y * uTimeDilation * 8.0);
        
        vec3 newPosition = position + normal * (warp + stars * 0.5 + dilation * 0.3) * 0.15;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    // 片段着色器代码 - 星际旅行效果
    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uWarpSpeed;
      uniform float uStarDensity;
      uniform float uNebulaEffect;
      uniform float uGlowIntensity;
      uniform float uTimeDilation;
      uniform int uTravelType;
      uniform bool uShowStars;
      
      // 噪声函数
      float noise(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // 星际旅行效果
      float interstellarTravel(vec2 uv, float speed) {
        float travelField = 0.0;
        
        // 多层星际旅行
        travelField += sin(uv.x * 4.0 + uTime * 0.3) * 
                      cos(uv.y * 6.0 + uTime * 0.5);
        travelField += sin(uv.x * 6.0 + uTime * 0.7) * 
                      cos(uv.y * 8.0 + uTime * 0.9) * 0.7;
        travelField += sin(uv.x * 8.0 + uTime * 1.1) * 
                      cos(uv.y * 10.0 + uTime * 1.3) * 0.4;
        
        return travelField * speed;
      }
      
      // 星云效果
      float nebula(vec2 uv, float effect) {
        float nebulaField = 0.0;
        for(int i = 0; i < 20; i++) {
          vec2 nebulaPos = vec2(
            noise(vec2(float(i) * 0.123, 0.456)),
            noise(vec2(float(i) * 0.456, 0.789))
          );
          float dist = distance(uv, nebulaPos);
          float nebulaSize = noise(vec2(float(i) * 0.789, 0.123)) * 0.04 + 0.02;
          float nebulaLife = mod(uTime * 1.5 + float(i) * 8.0, 6.28);
          float nebulaIntensity = sin(nebulaLife) * 0.7 + 0.3;
          nebulaField += exp(-dist * 45.0) * nebulaIntensity * effect;
        }
        return nebulaField;
      }
      
      // 旅行类型
      vec3 getTravelType(int type) {
        if(type == 0) {
          // 曲速航行
          return vec3(0.2, 0.6, 1.0);
        } else if(type == 1) {
          // 虫洞旅行
          return vec3(0.8, 0.2, 1.0);
        } else {
          // 超光速飞行
          return vec3(1.0, 0.8, 0.2);
        }
      }
      
      void main() {
        vec2 uv = vUv;
        
        // 星际旅行效果
        float travelValue = interstellarTravel(uv, uWarpSpeed);
        
        // 星云效果
        float nebulaValue = nebula(uv, uNebulaEffect);
        
        // 颜色计算
        vec3 baseColor = getTravelType(uTravelType);
        vec3 finalColor = baseColor * (travelValue * 0.6 + nebulaValue * 0.4) * uGlowIntensity;
        
        // 时间膨胀效果
        float dilationEffect = sin(uTime * uTimeDilation) * 0.2 + 0.8;
        finalColor *= dilationEffect;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uWarpSpeed: { value: travelParams.warpSpeed },
        uStarDensity: { value: travelParams.starDensity },
        uNebulaEffect: { value: travelParams.nebulaEffect },
        uGlowIntensity: { value: travelParams.glowIntensity },
        uTimeDilation: { value: travelParams.timeDilation },
        uTravelType: { value: travelParams.travelType },
        uShowStars: { value: travelParams.showStars }
      }
    });

    // 创建网格对象并添加到场景中
    const travelCube = new THREE.Mesh(geometry, material);
    scene.add(travelCube);

    // 更新星际旅行信息显示
    function updateTravelInfo() {
      const travelElement = document.getElementById('travelInfo');
      let speed = "亚光速";
      if(travelParams.warpSpeed > 0.5) speed = "光速";
      if(travelParams.warpSpeed > 0.8) speed = "超光速";
      
      let distance = "天文单位";
      if(travelParams.starDensity > 0.4) distance = "光年";
      if(travelParams.starDensity > 0.7) distance = "百万光年";
      
      travelElement.textContent = `速度: ${speed} | 距离: ${distance}`;
    }

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 星际旅行参数控制
    const travelFolder = gui.addFolder('星际旅行效果参数');
    travelFolder.add(travelParams, 'warpSpeed', 0.1, 1.2).name('曲速');
    travelFolder.add(travelParams, 'starDensity', 0.1, 1.0).name('恒星密度');
    travelFolder.add(travelParams, 'nebulaEffect', 0.1, 1.0).name('星云效果');
    travelFolder.add(travelParams, 'glowIntensity', 0.1, 1.8).name('发光强度');
    travelFolder.add(travelParams, 'timeDilation', 0.1, 0.9).name('时间膨胀');
    travelFolder.add(travelParams, 'showStars').name('显示恒星');
    
    // 旅行类型控制
    const travelTypes = {
      "曲速航行": 0,
      "虫洞旅行": 1,
      "超光速飞行": 2
    };
    travelFolder.add(travelParams, 'travelType', travelTypes).name('旅行类型');
    
    travelFolder.open();

    // 参数变化时更新材质和星际旅行信息
    gui.onChange(() => {
      material.uniforms.uWarpSpeed.value = travelParams.warpSpeed;
      material.uniforms.uStarDensity.value = travelParams.starDensity;
      material.uniforms.uNebulaEffect.value = travelParams.nebulaEffect;
      material.uniforms.uGlowIntensity.value = travelParams.glowIntensity;
      material.uniforms.uTimeDilation.value = travelParams.timeDilation;
      material.uniforms.uTravelType.value = travelParams.travelType;
      material.uniforms.uShowStars.value = travelParams.showStars;
      
      updateTravelInfo();
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转星际旅行立方体
      travelCube.rotation.y += travelParams.warpSpeed * 0.01;
      travelCube.rotation.x += travelParams.warpSpeed * 0.005;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 初始化星际旅行信息显示
    updateTravelInfo();

    // 启动动画循环
    animate();
  </script>
</body>

</html>
