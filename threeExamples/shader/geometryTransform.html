<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js几何图形变换着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #0a0a2a 0%, #1a1a3a 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00b4d8;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #00b4d8;
      border: 1px solid #00b4d8;
      box-shadow: 0 0 20px #00b4d8;
    }
    .geometry-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #ff6b6b;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ff6b6b;
      border: 1px solid #ff6b6b;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">🔺 几何图形变换着色器 - 初中数学教育 🔺</div>
  <div class="geometry-info" id="geometryInfo">图形：圆形 | 变换：平移</div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // ============================================================================
    // 导入Three.js核心库和辅助工具
    // ============================================================================
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // ============================================================================
    // 场景初始化
    // ============================================================================
    
    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x0a0a2a);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,5)的位置观察场景
    camera.position.set(0, 0, 5)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // ============================================================================
    // 窗口大小变化时的响应函数
    // ============================================================================
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // ============================================================================
    // 创建几何体和材质
    // ============================================================================
    
    // 创建平面几何体，作为几何图形变换的载体
    // 参数：宽度，高度，宽度分段数，高度分段数
    const geometry = new THREE.PlaneGeometry(10, 10, 256, 256);

    // 创建自定义着色器材质，实现几何图形变换效果
    const material = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,          // 双面渲染
      transparent: true,               // 启用透明度
      uniforms: {
        // 时间变量，用于动画效果
        uTime: { value: 0.0 },
        // 几何图形类型选择：0=圆形, 1=正方形, 2=三角形, 3=矩形, 4=椭圆
        uShapeType: { value: 0 },
        // 几何变换类型：0=平移, 1=旋转, 2=缩放, 3=对称, 4=组合变换
        uTransformType: { value: 0 },
        // 变换参数
        uTranslateX: { value: 0.0 },   // 平移X
        uTranslateY: { value: 0.0 },   // 平移Y
        uRotateAngle: { value: 0.0 },  // 旋转角度
        uScaleX: { value: 1.0 },       // 缩放X
        uScaleY: { value: 1.0 },       // 缩放Y
        uSymmetryAxis: { value: 0.0 }, // 对称轴
        // 图形参数
        uRadius: { value: 0.5 },       // 半径/边长
        uWidth: { value: 0.8 },        // 宽度
        uHeight: { value: 0.6 },       // 高度
        // 颜色参数
        uShapeColor: { value: new THREE.Color(0x00b4d8) }, // 图形颜色
        uGridColor: { value: new THREE.Color(0x4ecdc4) },  // 网格颜色
        uTransformColor: { value: new THREE.Color(0xff6b6b) }, // 变换标记颜色
        // 显示参数
        uShowGrid: { value: true },    // 显示网格
        uShowOriginal: { value: true }, // 显示原图形
        uShowTransform: { value: true }, // 显示变换标记
      },
      
      // ============================================================================
      // 顶点着色器：处理顶点位置和变形
      // ============================================================================
      vertexShader: `
        // 统一变量声明
        uniform float uTime;           // 时间变量
        uniform int uShapeType;        // 图形类型
        uniform int uTransformType;    // 变换类型
        uniform float uTranslateX;     // 平移X
        uniform float uTranslateY;     // 平移Y
        uniform float uRotateAngle;    // 旋转角度
        uniform float uScaleX;         // 缩放X
        uniform float uScaleY;         // 缩放Y
        uniform float uSymmetryAxis;   // 对称轴
        uniform float uRadius;         // 半径/边长
        uniform float uWidth;          // 宽度
        uniform float uHeight;         // 高度
        
        // 传递到片元着色器的变量
        varying vec2 vUv;              // UV坐标
        varying vec3 vPosition;        // 顶点位置
        varying float vShapeValue;     // 图形计算值
        varying float vTransformValue; // 变换计算值
        varying vec2 vOriginalPos;     // 原始位置
        
        // ============================================================================
        // 圆形：距离中心点的距离小于半径
        // 初中数学知识点：圆的定义、半径、直径
        // 教育价值：理解圆的基本性质
        // ============================================================================
        float circleShape(vec2 pos, float radius) {
          return 1.0 - smoothstep(radius - 0.02, radius + 0.02, length(pos));
        }
        
        // ============================================================================
        // 正方形：x和y坐标的绝对值都小于边长的一半
        // 初中数学知识点：正方形的性质、边长、对角线
        // 教育价值：理解正方形的基本性质
        // ============================================================================
        float squareShape(vec2 pos, float size) {
          float halfSize = size * 0.5;
          float square = 1.0 - smoothstep(halfSize - 0.02, halfSize + 0.02, max(abs(pos.x), abs(pos.y)));
          return square;
        }
        
        // ============================================================================
        // 三角形：基于距离函数的等边三角形
        // 初中数学知识点：三角形的性质、边长、角度
        // 教育价值：理解三角形的基本性质
        // ============================================================================
        float triangleShape(vec2 pos, float size) {
          // 等边三角形的距离函数
          float k = sqrt(3.0);
          pos.x = abs(pos.x) - size;
          pos.y = pos.y + size / k;
          
          if(pos.x + k * pos.y > 0.0) {
            pos = vec2(pos.x - k * pos.y, -k * pos.x - pos.y) / 2.0;
          }
          
          pos.x -= clamp(pos.x, -2.0 * size, 0.0);
          return -length(pos) * sign(pos.y);
        }
        
        // ============================================================================
        // 矩形：基于宽度和高度的长方形
        // 初中数学知识点：矩形的性质、长宽比
        // 教育价值：理解矩形的基本性质
        // ============================================================================
        float rectangleShape(vec2 pos, float width, float height) {
          float halfWidth = width * 0.5;
          float halfHeight = height * 0.5;
          
          float rectX = 1.0 - smoothstep(halfWidth - 0.02, halfWidth + 0.02, abs(pos.x));
          float rectY = 1.0 - smoothstep(halfHeight - 0.02, halfHeight + 0.02, abs(pos.y));
          
          return rectX * rectY;
        }
        
        // ============================================================================
        // 椭圆：基于长轴和短轴的椭圆
        // 初中数学知识点：椭圆的定义、长轴、短轴
        // 教育价值：理解椭圆的基本性质
        // ============================================================================
        float ellipseShape(vec2 pos, float a, float b) {
          // 椭圆方程：x²/a² + y²/b² = 1
          float ellipse = (pos.x * pos.x) / (a * a) + (pos.y * pos.y) / (b * b);
          return 1.0 - smoothstep(0.95, 1.05, ellipse);
        }
        
        // ============================================================================
        // 几何变换函数
        // ============================================================================
        
        // 平移变换
        vec2 translate(vec2 pos, float tx, float ty) {
          return pos - vec2(tx, ty);
        }
        
        // 旋转变换
        vec2 rotate(vec2 pos, float angle) {
          float s = sin(angle);
          float c = cos(angle);
          return vec2(pos.x * c - pos.y * s, pos.x * s + pos.y * c);
        }
        
        // 缩放变换
        vec2 scale(vec2 pos, float sx, float sy) {
          return pos / vec2(sx, sy);
        }
        
        // 对称变换（关于x轴、y轴或原点）
        vec2 symmetry(vec2 pos, float axis) {
          if(axis < 0.33) {
            // 关于x轴对称
            return vec2(pos.x, -pos.y);
          } else if(axis < 0.66) {
            // 关于y轴对称
            return vec2(-pos.x, pos.y);
          } else {
            // 关于原点对称
            return -pos;
          }
        }
        
        // ============================================================================
        // 主顶点着色器函数
        // ============================================================================
        void main() {
          // 传递UV坐标到片元着色器
          vUv = uv;
          vPosition = position;
          
          // 保存原始位置
          vOriginalPos = position.xy;
          
          // 应用几何变换
          vec2 transformedPos = position.xy;
          
          if(uTransformType == 0) {
            // 平移变换
            transformedPos = translate(position.xy, uTranslateX, uTranslateY);
          } else if(uTransformType == 1) {
            // 旋转变换
            transformedPos = rotate(position.xy, uRotateAngle);
          } else if(uTransformType == 2) {
            // 缩放变换
            transformedPos = scale(position.xy, uScaleX, uScaleY);
          } else if(uTransformType == 3) {
            // 对称变换
            transformedPos = symmetry(position.xy, uSymmetryAxis);
          } else {
            // 组合变换：平移 + 旋转 + 缩放
            transformedPos = translate(position.xy, uTranslateX, uTranslateY);
            transformedPos = rotate(transformedPos, uRotateAngle);
            transformedPos = scale(transformedPos, uScaleX, uScaleY);
          }
          
          // 根据图形类型计算形状值
          float shapeValue = 0.0;
          
          if(uShapeType == 0) {
            // 圆形
            shapeValue = circleShape(transformedPos, uRadius);
          } else if(uShapeType == 1) {
            // 正方形
            shapeValue = squareShape(transformedPos, uRadius * 2.0);
          } else if(uShapeType == 2) {
            // 三角形
            shapeValue = triangleShape(transformedPos, uRadius);
          } else if(uShapeType == 3) {
            // 矩形
            shapeValue = rectangleShape(transformedPos, uWidth, uHeight);
          } else {
            // 椭圆
            shapeValue = ellipseShape(transformedPos, uWidth * 0.5, uHeight * 0.5);
          }
          
          vShapeValue = shapeValue;
          vTransformValue = length(transformedPos - position.xy);
          
          // 根据形状值对顶点位置进行变形
          vec3 newPosition = position;
          newPosition.z += shapeValue * 0.5;
          
          // 设置最终顶点位置
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
      `,
      
      // ============================================================================
      // 片元着色器：处理像素颜色
      // ============================================================================
      fragmentShader: `
        // 统一变量声明
        uniform float uTime;           // 时间变量
        uniform vec3 uShapeColor;      // 图形颜色
        uniform vec3 uGridColor;       // 网格颜色
        uniform vec3 uTransformColor;  // 变换标记颜色
        uniform bool uShowGrid;        // 显示网格
        uniform bool uShowOriginal;    // 显示原图形
        uniform bool uShowTransform;   // 显示变换标记
        uniform int uShapeType;        // 图形类型
        uniform int uTransformType;    // 变换类型
        
        // 从顶点着色器传递的变量
        varying vec2 vUv;              // UV坐标
        varying vec3 vPosition;        // 顶点位置
        varying float vShapeValue;     // 图形计算值
        varying float vTransformValue; // 变换计算值
        varying vec2 vOriginalPos;     // 原始位置
        
        void main() {
          // 基础颜色：图形颜色
          vec3 baseColor = mix(vec3(0.1), uShapeColor, vShapeValue);
          
          // 显示原图形（半透明）
          if(uShowOriginal) {
            float originalShape = 0.0;
            
            // 计算原图形（使用原始位置）
            if(uShapeType == 0) {
              originalShape = 1.0 - smoothstep(0.48, 0.52, length(vOriginalPos));
            } else if(uShapeType == 1) {
              originalShape = 1.0 - smoothstep(0.48, 0.52, max(abs(vOriginalPos.x), abs(vOriginalPos.y)));
            }
            
            vec3 originalColor = mix(vec3(0.1), uGridColor, originalShape * 0.3);
            baseColor = mix(baseColor, originalColor, originalShape);
          }
          
          // 显示变换标记（箭头、旋转标记等）
          if(uShowTransform && uTransformType == 0) {
            // 平移变换：显示箭头
            vec2 direction = normalize(vPosition.xy - vOriginalPos);
            float arrow = smoothstep(0.95, 1.0, dot(normalize(vPosition.xy), direction));
            baseColor = mix(baseColor, uTransformColor, arrow * 0.5);
          }
          
          // 网格显示
          if(uShowGrid) {
            vec2 gridPos = fract(vPosition.xy / 0.5);
            float gridLine = step(0.98, gridPos.x) + step(0.98, gridPos.y);
            gridLine = min(gridLine, 1.0);
            
            baseColor = mix(baseColor, uGridColor, gridLine * 0.3);
          }
          
          // 坐标轴显示
          float axisWidth = 0.01;
          float xAxis = 1.0 - smoothstep(0.0, axisWidth, abs(vPosition.y));
          float yAxis = 1.0 - smoothstep(0.0, axisWidth, abs(vPosition.x));
          baseColor = mix(baseColor, vec3(1.0, 1.0, 1.0), max(xAxis, yAxis) * 0.5);
          
          // 特殊效果：根据变换类型添加说明标记
          if(uTransformType == 1 && vShapeValue > 0.5) {
            // 旋转变换：在图形中心显示旋转角度
            float centerDist = length(vPosition.xy);
            if(centerDist < 0.1) {
              baseColor = mix(baseColor, uTransformColor, 0.7);
            }
          }
          
          // 最终颜色输出
          gl_FragColor = vec4(baseColor, 1.0);
        }
      `
    });

    // 创建网格对象并添加到场景
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // ============================================================================
    // 几何信息显示更新函数
    // ============================================================================
    function updateGeometryInfo() {
      const infoElement = document.getElementById('geometryInfo');
      const shapeType = material.uniforms.uShapeType.value;
      const transformType = material.uniforms.uTransformType.value;
      
      const shapes = ["圆形", "正方形", "三角形", "矩形", "椭圆"];
      const transforms = ["平移", "旋转", "缩放", "对称", "组合变换"];
      
      const shapeName = shapes[shapeType];
      const transformName = transforms[transformType];
      
      let details = '';
      if(transformType == 0) {
        const tx = material.uniforms.uTranslateX.value.toFixed(1);
        const ty = material.uniforms.uTranslateY.value.toFixed(1);
        details = ` | 平移量：(${tx}, ${ty})`;
      } else if(transformType == 1) {
        const angle = (material.uniforms.uRotateAngle.value * 180.0 / 3.14159).toFixed(0);
        details = ` | 角度：${angle}°`;
      } else if(transformType == 2) {
        const sx = material.uniforms.uScaleX.value.toFixed(1);
        const sy = material.uniforms.uScaleY.value.toFixed(1);
        details = ` | 缩放：(${sx}, ${sy})`;
      }
      
      infoElement.textContent = `图形：${shapeName} | 变换：${transformName}${details}`;
    }

    // ============================================================================
    // 创建GUI控制面板
    // ============================================================================
    const gui = new GUI();
    
    // 几何图形类型控制
    const shapeTypes = {
      "圆形": 0,
      "正方形": 1,
      "三角形": 2,
      "矩形": 3,
      "椭圆": 4
    };
    
    const shapeController = gui.add(material.uniforms.uShapeType, 'value', shapeTypes).name('图形类型');
    shapeController.onChange(updateGeometryInfo);
    
    // 变换类型控制
    const transformTypes = {
      "平移": 0,
      "旋转": 1,
      "缩放": 2,
      "对称": 3,
      "组合变换": 4
    };
    
    const transformController = gui.add(material.uniforms.uTransformType, 'value', transformTypes).name('变换类型');
    transformController.onChange(updateGeometryInfo);
    
    // 变换参数控制
    const transformFolder = gui.addFolder('变换参数');
    const txController = transformFolder.add(material.uniforms.uTranslateX, 'value', -2.0, 2.0).name('平移X');
    const tyController = transformFolder.add(material.uniforms.uTranslateY, 'value', -2.0, 2.0).name('平移Y');
    const rotateController = transformFolder.add(material.uniforms.uRotateAngle, 'value', 0.0, 6.283).name('旋转角度');
    const sxController = transformFolder.add(material.uniforms.uScaleX, 'value', 0.1, 3.0).name('缩放X');
    const syController = transformFolder.add(material.uniforms.uScaleY, 'value', 0.1, 3.0).name('缩放Y');
    const axisController = transformFolder.add(material.uniforms.uSymmetryAxis, 'value', 0.0, 1.0).name('对称轴');
    
    // 参数变化时更新信息显示
    [txController, tyController, rotateController, sxController, syController, axisController].forEach(controller => {
      controller.onChange(updateGeometryInfo);
    });
    
    transformFolder.open();
    
    // 图形参数控制
    const shapeFolder = gui.addFolder('图形参数');
    shapeFolder.add(material.uniforms.uRadius, 'value', 0.1, 1.0).name('半径/边长');
    shapeFolder.add(material.uniforms.uWidth, 'value', 0.1, 1.5).name('宽度');
    shapeFolder.add(material.uniforms.uHeight, 'value', 0.1, 1.5).name('高度');
    shapeFolder.open();
    
    // 显示设置
    const displayFolder = gui.addFolder('显示设置');
    displayFolder.add(material.uniforms.uShowGrid, 'value').name('显示网格');
    displayFolder.add(material.uniforms.uShowOriginal, 'value').name('显示原图形');
    displayFolder.add(material.uniforms.uShowTransform, 'value').name('显示变换标记');
    displayFolder.open();
    
    // 颜色控制
    const colorFolder = gui.addFolder('颜色设置');
    colorFolder.addColor(material.uniforms.uShapeColor, 'value').name('图形颜色');
    colorFolder.addColor(material.uniforms.uGridColor, 'value').name('网格颜色');
    colorFolder.addColor(material.uniforms.uTransformColor, 'value').name('变换标记颜色');
    colorFolder.open();

    // 初始更新信息显示
    updateGeometryInfo();

    // ============================================================================
    // 动画循环
    // ============================================================================
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间变量，用于平滑动画
      material.uniforms.uTime.value += 0.01;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 启动动画循环
    animate();
  </script>
</body>

</html>
