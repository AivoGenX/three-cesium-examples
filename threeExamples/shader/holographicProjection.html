<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 全息投影效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 8);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform vec3 baseColor;
                uniform float scanSpeed;
                uniform float scanIntensity;
                uniform float noiseIntensity;
                uniform float glowIntensity;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 噪声函数
                float noise(vec2 p) {
                    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                }
                
                // 扫描线效果
                float scanLines(vec2 uv, float time) {
                    float scan = sin(uv.y * 200.0 + time * scanSpeed) * 0.5 + 0.5;
                    return scan;
                }
                
                // 全息网格效果
                float hologramGrid(vec2 uv, float time) {
                    float gridX = sin(uv.x * 50.0 + time * 2.0) * 0.5 + 0.5;
                    float gridY = sin(uv.y * 50.0 + time * 2.0) * 0.5 + 0.5;
                    return (gridX + gridY) * 0.5;
                }
                
                // 发光效果
                float glow(vec2 uv, float time) {
                    float dist = length(uv - 0.5);
                    float pulse = sin(time * 3.0) * 0.5 + 0.5;
                    return smoothstep(0.3, 0.0, dist) * pulse;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 基础颜色
                    vec3 color = baseColor;
                    
                    // 添加扫描线
                    float scan = scanLines(uv, time);
                    color *= mix(0.8, 1.2, scan) * scanIntensity;
                    
                    // 添加全息网格
                    float grid = hologramGrid(uv, time);
                    color += grid * 0.3;
                    
                    // 添加噪声
                    float n = noise(uv * 10.0 + time);
                    color += n * noiseIntensity;
                    
                    // 添加发光效果
                    float g = glow(uv, time);
                    color += g * glowIntensity * vec3(0.2, 0.5, 0.8);
                    
                    // 透明度效果
                    float alpha = 0.8 + sin(time * 2.0) * 0.2;
                    
                    gl_FragColor = vec4(color, alpha);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    baseColor: { value: new THREE.Color(0x00ff88) },
                    scanSpeed: { value: 5.0 },
                    scanIntensity: { value: 0.5 },
                    noiseIntensity: { value: 0.1 },
                    glowIntensity: { value: 0.8 }
                },
                transparent: true,
                side: THREE.DoubleSide
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.TorusGeometry(2, 0.5, 16, 100);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
            
            // 添加旋转动画
            gsap.to(_primitive.rotation, {
                x: Math.PI * 2,
                y: Math.PI * 2,
                duration: 10,
                repeat: -1,
                ease: "none"
            });
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                baseColor: '#00ff88',
                scanSpeed: 5.0,
                scanIntensity: 0.5,
                noiseIntensity: 0.1,
                glowIntensity: 0.8,
                reset: function() {
                    mat.uniforms.baseColor.value.set('#00ff88');
                    mat.uniforms.scanSpeed.value = 5.0;
                    mat.uniforms.scanIntensity.value = 0.5;
                    mat.uniforms.noiseIntensity.value = 0.1;
                    mat.uniforms.glowIntensity.value = 0.8;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'baseColor').onChange(value => {
                mat.uniforms.baseColor.value.set(value);
            });
            gui.add(mat.uniforms.scanSpeed, 'value', 1.0, 10.0).name('扫描速度');
            gui.add(mat.uniforms.scanIntensity, 'value', 0.1, 1.0).name('扫描强度');
            gui.add(mat.uniforms.noiseIntensity, 'value', 0.0, 0.5).name('噪声强度');
            gui.add(mat.uniforms.glowIntensity, 'value', 0.1, 2.0).name('发光强度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
