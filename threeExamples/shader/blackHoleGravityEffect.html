<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js黑洞引力效果着色器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #000000 0%, #111111 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #ff5500;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #ff5500;
      border: 1px solid #ff5500;
      box-shadow: 0 0 20px #ff5500;
    }
    .blackhole-info {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #ffff00;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ffff00;
      border: 1px solid #ffff00;
      font-family: 'Courier New', monospace;
      max-width: 300px;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ffff66;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #ffff66;
      border: 1px solid #ffff66;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">🕳️ 黑洞引力效果 - 实时渲染 🕳️</div>
  <div class="blackhole-info" id="blackholeInfo">引力强度: 强 | 吸积盘: 活跃</div>
  <div class="help">
    🎮 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：改变黑洞效果<br>
    • 实时交互：体验宇宙奇点
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // 导入Three.js核心库和辅助工具
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x000000);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,0,8)的位置观察场景
    camera.position.set(0, 0, 8)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 窗口大小变化时的响应函数，保持渲染内容适配窗口
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // 黑洞引力效果参数
    const blackholeParams = {
      gravityStrength: 0.9,
      accretionDisk: 0.8,
      eventHorizon: 0.7,
      glowIntensity: 1.5,
      timeDilation: 0.6,
      blackholeType: 0,
      showParticles: true
    };

    // 创建球体几何体，作为黑洞的载体
    const geometry = new THREE.SphereGeometry(2, 64, 32);

    // 顶点着色器代码 - 黑洞引力效果
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uGravityStrength;
      uniform float uAccretionDisk;
      uniform float uEventHorizon;
      
      void main() {
        vUv = uv;
        vPosition = position;
        vNormal = normal;
        
        // 黑洞引力效果
        float gravity = sin(position.x * 3.0 + uTime * uGravityStrength) * 
                       cos(position.y * 4.0 + uTime * uGravityStrength * 0.8) *
                       sin(position.z * 3.0 + uTime * uGravityStrength * 0.6);
        
        // 吸积盘效果
        float accretion = sin(position.x * 5.0 + uTime * uAccretionDisk * 2.0) *
                        cos(position.z * 5.0 + uTime * uAccretionDisk * 2.0);
        
        // 事件视界效果
        float horizon = sin(position.x * uEventHorizon * 6.0) *
                       cos(position.y * uEventHorizon * 8.0);
        
        vec3 newPosition = position + normal * (gravity + accretion * 0.5 + horizon * 0.3) * 0.2;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    // 片段着色器代码 - 黑洞引力效果
    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vPosition;
      varying vec3 vNormal;
      
      uniform float uTime;
      uniform float uGravityStrength;
      uniform float uAccretionDisk;
      uniform float uEventHorizon;
      uniform float uGlowIntensity;
      uniform float uTimeDilation;
      uniform int uBlackholeType;
      uniform bool uShowParticles;
      
      // 噪声函数
      float noise(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // 黑洞引力效果
      float blackholeGravity(vec2 uv, float strength) {
        float gravityField = 0.0;
        
        // 多层引力场
        gravityField += sin(uv.x * 4.0 + uTime * 0.3) * 
                       cos(uv.y * 6.0 + uTime * 0.5);
        gravityField += sin(uv.x * 6.0 + uTime * 0.7) * 
                       cos(uv.y * 8.0 + uTime * 0.9) * 0.7;
        gravityField += sin(uv.x * 8.0 + uTime * 1.1) * 
                       cos(uv.y * 10.0 + uTime * 1.3) * 0.4;
        
        return gravityField * strength;
      }
      
      // 吸积盘效果
      float accretionDisk(vec2 uv, float intensity) {
        float diskField = 0.0;
        
        // 旋转吸积盘
        float angle = atan(uv.y - 0.5, uv.x - 0.5);
        float radius = distance(uv, vec2(0.5, 0.5));
        diskField += sin(angle * 8.0 + uTime * 2.0) * 
                    cos(radius * 12.0 - uTime * 1.5) * intensity;
        
        return diskField;
      }
      
      // 粒子效果
      float particles(vec2 uv, float density) {
        if(!uShowParticles) return 0.0;
        
        float particleField = 0.0;
        for(int i = 0; i < 30; i++) {
          vec2 particlePos = vec2(
            noise(vec2(float(i) * 0.123, 0.456)),
            noise(vec2(float(i) * 0.456, 0.789))
          );
          float dist = distance(uv, particlePos);
          float particleSize = noise(vec2(float(i) * 0.789, 0.123)) * 0.03 + 0.02;
          float particleLife = mod(uTime * 1.2 + float(i) * 12.0, 6.28);
          float particleIntensity = sin(particleLife) * 0.6 + 0.4;
          particleField += exp(-dist * 60.0) * particleIntensity * density;
        }
        return particleField;
      }
      
      // 黑洞类型
      vec3 getBlackholeType(int type) {
        if(type == 0) {
          // 橙色黑洞
          return vec3(1.0, 0.5, 0.1);
        } else if(type == 1) {
          // 红色黑洞
          return vec3(1.0, 0.2, 0.1);
        } else {
          // 紫色黑洞
          return vec3(0.8, 0.2, 1.0);
        }
      }
      
      void main() {
        vec2 uv = vUv;
        
        // 黑洞引力效果
        float gravityField = blackholeGravity(uv, uGravityStrength);
        
        // 吸积盘效果
        float diskField = accretionDisk(uv, uAccretionDisk);
        
        // 粒子效果
        float particleField = particles(uv, 0.4);
        
        // 颜色计算
        vec3 baseColor = getBlackholeType(uBlackholeType);
        vec3 finalColor = baseColor * (gravityField * 0.4 + diskField * 0.4 + particleField * 0.2) * uGlowIntensity;
        
        // 时间膨胀效果
        float dilationEffect = sin(uTime * uTimeDilation) * 0.2 + 0.8;
        finalColor *= dilationEffect;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // 创建自定义着色器材质
    const material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0.0 },
        uGravityStrength: { value: blackholeParams.gravityStrength },
        uAccretionDisk: { value: blackholeParams.accretionDisk },
        uEventHorizon: { value: blackholeParams.eventHorizon },
        uGlowIntensity: { value: blackholeParams.glowIntensity },
        uTimeDilation: { value: blackholeParams.timeDilation },
        uBlackholeType: { value: blackholeParams.blackholeType },
        uShowParticles: { value: blackholeParams.showParticles }
      }
    });

    // 创建网格对象并添加到场景中
    const blackholeSphere = new THREE.Mesh(geometry, material);
    scene.add(blackholeSphere);

    // 更新黑洞信息显示
    function updateBlackholeInfo() {
      const blackholeElement = document.getElementById('blackholeInfo');
      let strength = "弱";
      if(blackholeParams.gravityStrength > 0.5) strength = "中";
      if(blackholeParams.gravityStrength > 0.8) strength = "强";
      
      let disk = "休眠";
      if(blackholeParams.accretionDisk > 0.4) disk = "活跃";
      if(blackholeParams.accretionDisk > 0.7) disk = "超活跃";
      
      blackholeElement.textContent = `引力强度: ${strength} | 吸积盘: ${disk}`;
    }

    // 创建GUI控制面板
    const gui = new GUI();
    
    // 黑洞参数控制
    const blackholeFolder = gui.addFolder('黑洞效果参数');
    blackholeFolder.add(blackholeParams, 'gravityStrength', 0.1, 1.2).name('引力强度');
    blackholeFolder.add(blackholeParams, 'accretionDisk', 0.1, 1.0).name('吸积盘');
    blackholeFolder.add(blackholeParams, 'eventHorizon', 0.1, 0.9).name('事件视界');
    blackholeFolder.add(blackholeParams, 'glowIntensity', 0.1, 2.0).name('发光强度');
    blackholeFolder.add(blackholeParams, 'timeDilation', 0.1, 0.9).name('时间膨胀');
    blackholeFolder.add(blackholeParams, 'showParticles').name('显示粒子');
    
    // 黑洞类型控制
    const blackholeTypes = {
      "橙色黑洞": 0,
      "红色黑洞": 1,
      "紫色黑洞": 2
    };
    blackholeFolder.add(blackholeParams, 'blackholeType', blackholeTypes).name('黑洞类型');
    
    blackholeFolder.open();

    // 参数变化时更新材质和黑洞信息
    gui.onChange(() => {
      material.uniforms.uGravityStrength.value = blackholeParams.gravityStrength;
      material.uniforms.uAccretionDisk.value = blackholeParams.accretionDisk;
      material.uniforms.uEventHorizon.value = blackholeParams.eventHorizon;
      material.uniforms.uGlowIntensity.value = blackholeParams.glowIntensity;
      material.uniforms.uTimeDilation.value = blackholeParams.timeDilation;
      material.uniforms.uBlackholeType.value = blackholeParams.blackholeType;
      material.uniforms.uShowParticles.value = blackholeParams.showParticles;
      
      updateBlackholeInfo();
    });

    // 动画循环函数
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新时间
      material.uniforms.uTime.value += 0.016;
      
      // 旋转黑洞
      blackholeSphere.rotation.y += blackholeParams.gravityStrength * 0.01;
      blackholeSphere.rotation.x += blackholeParams.gravityStrength * 0.005;
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 初始化黑洞信息显示
    updateBlackholeInfo();

    // 启动动画循环
    animate();
  </script>
</body>

</html>
