<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>粒子流动城市 | Three.js 示例</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: linear-gradient(135deg, #0a0a16 0%, #1a1a2e 50%, #16213e 100%);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        #container {
            width: 100%;
            height: 100%;
        }
        
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            z-index: 100;
            max-width: 300px;
        }
        
        .info-panel h2 {
            margin: 0 0 10px 0;
            color: #00d4ff;
            font-size: 1.2rem;
        }
        
        .info-panel p {
            margin: 5px 0;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            z-index: 100;
        }
        
        .control-item {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .control-item label {
            font-size: 0.9rem;
            min-width: 80px;
        }
        
        .control-item input[type="range"] {
            width: 120px;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            font-size: 1.5rem;
            text-align: center;
            z-index: 1000;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>
    <div id="container"></div>
    
    <div class="info-panel">
        <h2>粒子流动城市</h2>
        <p>这是一个动态粒子系统，模拟城市中的交通流动和灯光效果。</p>
        <p>• 蓝色粒子：模拟车辆流动</p>
        <p>• 黄色粒子：模拟行人移动</p>
        <p>• 红色粒子：模拟紧急车辆</p>
        <p>• 白色粒子：模拟灯光闪烁</p>
    </div>
    
    <div class="controls">
        <div class="control-item">
            <label for="particleCount">粒子数量:</label>
            <input type="range" id="particleCount" min="100" max="5000" value="2000">
            <span id="particleCountValue">2000</span>
        </div>
        <div class="control-item">
            <label for="speed">流动速度:</label>
            <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1">
            <span id="speedValue">1.0</span>
        </div>
        <div class="control-item">
            <label for="size">粒子大小:</label>
            <input type="range" id="size" min="0.5" max="5" step="0.1" value="2">
            <span id="sizeValue">2.0</span>
        </div>
    </div>
    
    <div class="loading" id="loading">加载中...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        
        // 定义文件主机路径
        const FILE_HOST = window.location.origin + '/threeExamples/';
        
        // 全局变量
        let scene, camera, renderer, controls;
        let particleSystem, particles, particlePositions, particleVelocities;
        let clock = new THREE.Clock();
        let particleCount = 2000;
        let particleSpeed = 1.0;
        let particleSize = 2.0;
        
        // 初始化场景
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a16);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 50, 100);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);
            
            // 添加轨道控制
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            // 添加环境光
            const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
            scene.add(ambientLight);
            
            // 添加定向光
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 50, 50);
            scene.add(directionalLight);
            
            // 创建城市基础网格
            createCityGrid();
            
            // 创建粒子系统
            createParticleSystem();
            
            // 添加窗口大小调整监听
            window.addEventListener('resize', onWindowResize);
            
            // 添加控制监听
            setupControls();
            
            // 隐藏加载提示
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);
        }
        
        // 创建城市基础网格
        function createCityGrid() {
            // 创建地面
            const groundGeometry = new THREE.PlaneGeometry(200, 200);
            const groundMaterial = new THREE.MeshLambertMaterial({ 
                color: 0x2a2a4a,
                transparent: true,
                opacity: 0.8
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
            
            // 创建网格线
            const gridHelper = new THREE.GridHelper(200, 20, 0x444477, 0x222244);
            scene.add(gridHelper);
            
            // 创建建筑物（简单的立方体）
            for (let i = 0; i < 50; i++) {
                const buildingHeight = Math.random() * 30 + 10;
                const buildingGeometry = new THREE.BoxGeometry(4, buildingHeight, 4);
                const buildingMaterial = new THREE.MeshLambertMaterial({ 
                    color: new THREE.Color().setHSL(Math.random() * 0.1 + 0.1, 0.5, 0.3)
                });
                const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                
                building.position.x = Math.random() * 180 - 90;
                building.position.z = Math.random() * 180 - 90;
                building.position.y = buildingHeight / 2;
                
                scene.add(building);
            }
        }
        
        // 创建粒子系统
        function createParticleSystem() {
            particles = new Float32Array(particleCount * 3);
            particlePositions = new Float32Array(particleCount * 3);
            particleVelocities = new Float32Array(particleCount * 3);
            const particleColors = new Float32Array(particleCount * 3);
            
            // 初始化粒子位置、速度和颜色
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // 随机初始位置（在地面附近）
                particlePositions[i3] = Math.random() * 180 - 90;
                particlePositions[i3 + 1] = Math.random() * 20 + 5;
                particlePositions[i3 + 2] = Math.random() * 180 - 90;
                
                // 随机速度
                particleVelocities[i3] = (Math.random() - 0.5) * 2;
                particleVelocities[i3 + 1] = Math.random() * 0.5;
                particleVelocities[i3 + 2] = (Math.random() - 0.5) * 2;
                
                // 根据粒子类型设置颜色
                const particleType = Math.floor(Math.random() * 4);
                let color;
                switch (particleType) {
                    case 0: // 蓝色 - 车辆
                        color = new THREE.Color(0x0088ff);
                        break;
                    case 1: // 黄色 - 行人
                        color = new THREE.Color(0xffff00);
                        break;
                    case 2: // 红色 - 紧急车辆
                        color = new THREE.Color(0xff4444);
                        break;
                    case 3: // 白色 - 灯光
                        color = new THREE.Color(0xffffff);
                        break;
                }
                
                particleColors[i3] = color.r;
                particleColors[i3 + 1] = color.g;
                particleColors[i3 + 2] = color.b;
            }
            
            // 创建粒子几何体
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(particles, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
            
            // 创建粒子材质
            const material = new THREE.PointsMaterial({
                size: particleSize,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });
            
            // 创建粒子系统
            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
            
            // 复制初始位置到当前粒子位置
            particles.set(particlePositions);
            particleSystem.geometry.attributes.position.needsUpdate = true;
        }
        
        // 更新粒子系统
        function updateParticles() {
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // 更新位置
                particles[i3] += particleVelocities[i3] * delta * particleSpeed * 10;
                particles[i3 + 1] += particleVelocities[i3 + 1] * delta * particleSpeed * 10;
                particles[i3 + 2] += particleVelocities[i3 + 2] * delta * particleSpeed * 10;
                
                // 边界检测和反弹
                if (particles[i3] < -90 || particles[i3] > 90) {
                    particleVelocities[i3] *= -1;
                }
                if (particles[i3 + 1] < 5 || particles[i3 + 1] > 50) {
                    particleVelocities[i3 + 1] *= -1;
                }
                if (particles[i3 + 2] < -90 || particles[i3 + 2] > 90) {
                    particleVelocities[i3 + 2] *= -1;
                }
                
                // 添加一些随机扰动
                if (Math.random() < 0.01) {
                    particleVelocities[i3] += (Math.random() - 0.5) * 0.5;
                    particleVelocities[i3 + 2] += (Math.random() - 0.5) * 0.5;
                }
                
                // 灯光粒子的闪烁效果
                const particleType = Math.floor((i % 4));
                if (particleType === 3) { // 白色灯光粒子
                    const scale = 0.5 + 0.5 * Math.sin(time * 5 + i * 0.1);
                    particles[i3 + 1] = 10 + scale * 10;
                }
            }
            
            particleSystem.geometry.attributes.position.needsUpdate = true;
        }
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            updateParticles();
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // 窗口大小调整
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 设置控制监听
        function setupControls() {
            const particleCountSlider = document.getElementById('particleCount');
            const speedSlider = document.getElementById('speed');
            const sizeSlider = document.getElementById('size');
            
            particleCountSlider.addEventListener('input', (e) => {
                particleCount = parseInt(e.target.value);
                document.getElementById('particleCountValue').textContent = particleCount;
                
                // 重新创建粒子系统
                if (particleSystem) {
                    scene.remove(particleSystem);
                    createParticleSystem();
                }
            });
            
            speedSlider.addEventListener('input', (e) => {
                particleSpeed = parseFloat(e.target.value);
                document.getElementById('speedValue').textContent = particleSpeed.toFixed(1);
            });
            
            sizeSlider.addEventListener('input', (e) => {
                particleSize = parseFloat(e.target.value);
                document.getElementById('sizeValue').textContent = particleSize.toFixed(1);
                if (particleSystem) {
                    particleSystem.material.size = particleSize;
                    particleSystem.material.needsUpdate = true;
                }
            });
        }
        
        // 启动应用
        init();
        animate();
    </script>
</body>

</html>
