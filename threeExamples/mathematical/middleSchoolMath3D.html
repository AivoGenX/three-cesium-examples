<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js初中数学函数可视化 - 三维场景</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #ff6b6b;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px #ff6b6b;
      border: 1px solid #ff6b6b;
      box-shadow: 0 0 20px #ff6b6b;
    }
    .math-formula {
      position: absolute;
      top: 60px;
      left: 10px;
      color: #4ecdc4;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #4ecdc4;
      border: 1px solid #4ecdc4;
      font-family: 'Courier New', monospace;
    }
    .help {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #90e0ef;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #90e0ef;
      border: 1px solid #90e0ef;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="info">📚 初中数学函数可视化 - 三维场景展示 📚</div>
  <div class="math-formula" id="formulaDisplay">y = x²</div>
  <div class="help">
    🎯 使用说明：<br>
    • 鼠标拖动：旋转视角<br>
    • 鼠标滚轮：缩放场景<br>
    • 调整参数：观察函数图像变化<br>
    • 切换函数：体验不同数学概念
  </div>
  
  <!-- 导入模块映射，配置Three.js依赖路径 -->
  <script type="importmap">
    {
      "imports": {
        "three": "../../threejs/build/three.module.js",
        "three/addons/": "../../threejs/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // ============================================================================
    // 导入Three.js核心库和辅助工具
    // ============================================================================
    import * as THREE from 'three'
    import { OrbitControls } from "three/addons/controls/OrbitControls.js"; 
    import { GUI } from "three/addons/libs/lil-gui.module.min.js";

    // ============================================================================
    // 场景初始化
    // ============================================================================
    
    // 获取渲染容器，使用整个body元素
    const box = document.body;

    // 创建Three.js场景，作为所有3D对象的容器
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x1a1a2e);

    // 创建透视相机，参数依次为：视野角度、宽高比、近裁剪面、远裁剪面
    const camera = new THREE.PerspectiveCamera(60, box.clientWidth / box.clientHeight, 0.1, 1000)

    // 设置相机位置，从(0,5,10)的位置观察场景
    camera.position.set(0, 5, 10)

    // 创建WebGL渲染器，启用抗锯齿、透明背景和对数深度缓冲区
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true
    })

    // 设置渲染器尺寸为容器大小
    renderer.setSize(box.clientWidth, box.clientHeight)

    // 将渲染器的DOM元素添加到页面中
    box.appendChild(renderer.domElement)

    // 创建轨道控制器，允许用户通过鼠标交互旋转和缩放场景
    const controls = new OrbitControls(camera, renderer.domElement)

    // 启用阻尼效果，使相机移动更平滑
    controls.enableDamping = true

    // 添加环境光
    const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambientLight);

    // 添加平行光
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 10, 5);
    scene.add(directionalLight);

    // ============================================================================
    // 窗口大小变化时的响应函数
    // ============================================================================
    window.onresize = () => {
      // 更新渲染器尺寸
      renderer.setSize(box.clientWidth, box.clientHeight)
      // 更新相机的宽高比
      camera.aspect = box.clientWidth / box.clientHeight
      // 更新相机投影矩阵
      camera.updateProjectionMatrix()
    }

    // ============================================================================
    // 创建三维坐标系
    // ============================================================================
    function createCoordinateSystem() {
      // 创建坐标轴材质
      const axisMaterial = new THREE.LineBasicMaterial({ 
        color: 0xff6b6b,
        linewidth: 2
      });

      // X轴（红色）
      const xAxisGeometry = new THREE.BufferGeometry();
      const xAxisPoints = [
        new THREE.Vector3(-10, 0, 0),
        new THREE.Vector3(10, 0, 0)
      ];
      xAxisGeometry.setFromPoints(xAxisPoints);
      const xAxis = new THREE.Line(xAxisGeometry, axisMaterial);
      scene.add(xAxis);

      // Y轴（绿色）
      const yAxisGeometry = new THREE.BufferGeometry();
      const yAxisPoints = [
        new THREE.Vector3(0, -10, 0),
        new THREE.Vector3(0, 10, 0)
      ];
      yAxisGeometry.setFromPoints(yAxisPoints);
      const yAxis = new THREE.Line(yAxisGeometry, axisMaterial);
      scene.add(yAxis);

      // Z轴（蓝色）
      const zAxisGeometry = new THREE.BufferGeometry();
      const zAxisPoints = [
        new THREE.Vector3(0, 0, -10),
        new THREE.Vector3(0, 0, 10)
      ];
      zAxisGeometry.setFromPoints(zAxisPoints);
      const zAxis = new THREE.Line(zAxisGeometry, axisMaterial);
      scene.add(zAxis);

      // 创建网格平面
      const gridHelper = new THREE.GridHelper(20, 20, 0xffffff, 0x333333);
      scene.add(gridHelper);
    }

    // ============================================================================
    // 创建函数可视化对象
    // ============================================================================
    let currentFunctionObject = null;
    let functionParameters = {
      type: 1, // 0=一次函数, 1=二次函数, 2=三角函数, 3=反比例函数, 4=绝对值函数
      a: 1.0,
      b: 0.0,
      c: 1.0,
      k: 1.0,
      showPoints: true,
      showLine: true,
      pointSize: 0.2,
      lineWidth: 0.1
    };

    function createFunctionVisualization() {
      // 移除之前的函数对象
      if (currentFunctionObject) {
        scene.remove(currentFunctionObject);
      }

      // 创建组对象来包含所有函数相关物体
      const functionGroup = new THREE.Group();
      
      // 根据函数类型创建不同的可视化效果
      switch(functionParameters.type) {
        case 0: // 一次函数：y = ax + b
          createLinearFunction(functionGroup);
          break;
        case 1: // 二次函数：y = ax² + bx + c
          createQuadraticFunction(functionGroup);
          break;
        case 2: // 三角函数：y = sin(kx) 或 y = cos(kx)
          createTrigonometricFunction(functionGroup);
          break;
        case 3: // 反比例函数：y = k/x
          createInverseProportionFunction(functionGroup);
          break;
        case 4: // 绝对值函数：y = |x|
          createAbsoluteValueFunction(functionGroup);
          break;
      }

      scene.add(functionGroup);
      currentFunctionObject = functionGroup;
    }

    // ============================================================================
    // 一次函数可视化：直线
    // ============================================================================
    function createLinearFunction(group) {
      const points = [];
      
      // 生成直线上的点
      for (let x = -8; x <= 8; x += 0.5) {
        const y = functionParameters.a * x + functionParameters.b;
        points.push(new THREE.Vector3(x, y, 0));
      }

      // 创建连线
      if (functionParameters.showLine) {
        const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const lineMaterial = new THREE.LineBasicMaterial({ 
          color: 0xff6b6b,
          linewidth: functionParameters.lineWidth * 10
        });
        const line = new THREE.Line(lineGeometry, lineMaterial);
        group.add(line);
      }

      // 创建点
      if (functionParameters.showPoints) {
        points.forEach(point => {
          const sphereGeometry = new THREE.SphereGeometry(functionParameters.pointSize, 8, 8);
          const sphereMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x4ecdc4,
            transparent: true,
            opacity: 0.8
          });
          const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
          sphere.position.copy(point);
          group.add(sphere);
        });
      }

      // 标记零点（如果存在）
      if (functionParameters.a !== 0) {
        const zeroX = -functionParameters.b / functionParameters.a;
        if (Math.abs(zeroX) <= 8) {
          const zeroSphereGeometry = new THREE.SphereGeometry(functionParameters.pointSize * 1.5, 16, 16);
          const zeroSphereMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffff00,
            emissive: 0xffff00,
            emissiveIntensity: 0.5
          });
          const zeroSphere = new THREE.Mesh(zeroSphereGeometry, zeroSphereMaterial);
          zeroSphere.position.set(zeroX, 0, 0);
          group.add(zeroSphere);
        }
      }
    }

    // ============================================================================
    // 二次函数可视化：抛物线
    // ============================================================================
    function createQuadraticFunction(group) {
      const points = [];
      
      // 生成抛物线上的点
      for (let x = -8; x <= 8; x += 0.3) {
        const y = functionParameters.c * x * x + functionParameters.a * x + functionParameters.b;
        points.push(new THREE.Vector3(x, y, 0));
      }

      // 创建连线
      if (functionParameters.showLine) {
        const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const lineMaterial = new THREE.LineBasicMaterial({ 
          color: 0xff6b6b,
          linewidth: functionParameters.lineWidth * 10
        });
        const line = new THREE.Line(lineGeometry, lineMaterial);
        group.add(line);
      }

      // 创建点
      if (functionParameters.showPoints) {
        points.forEach(point => {
          const sphereGeometry = new THREE.SphereGeometry(functionParameters.pointSize, 8, 8);
          const sphereMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x4ecdc4,
            transparent: true,
            opacity: 0.8
          });
          const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
          sphere.position.copy(point);
          group.add(sphere);
        });
      }

      // 标记顶点
      const vertexX = -functionParameters.a / (2 * functionParameters.c);
      const vertexY = functionParameters.c * vertexX * vertexX + functionParameters.a * vertexX + functionParameters.b;
      
      const vertexGeometry = new THREE.SphereGeometry(functionParameters.pointSize * 2, 16, 16);
      const vertexMaterial = new THREE.MeshBasicMaterial({ 
        color: 0xffff00,
        emissive: 0xffff00,
        emissiveIntensity: 0.5
      });
      const vertexSphere = new THREE.Mesh(vertexGeometry, vertexMaterial);
      vertexSphere.position.set(vertexX, vertexY, 0);
      group.add(vertexSphere);
    }

    // ============================================================================
    // 三角函数可视化：正弦/余弦波
    // ============================================================================
    function createTrigonometricFunction(group) {
      const points = [];
      
      // 生成三角函数上的点
      for (let x = -8; x <= 8; x += 0.2) {
        let y;
        if (functionParameters.a > 0.5) {
          y = Math.sin(x * functionParameters.k); // 正弦函数
        } else {
          y = Math.cos(x * functionParameters.k); // 余弦函数
        }
        points.push(new THREE.Vector3(x, y * 3, 0)); // 放大振幅以便观察
      }

      // 创建连线
      if (functionParameters.showLine) {
        const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const lineMaterial = new THREE.LineBasicMaterial({ 
          color: 0xff6b6b,
          linewidth: functionParameters.lineWidth * 10
        });
        const line = new THREE.Line(lineGeometry, lineMaterial);
        group.add(line);
      }

      // 创建点
      if (functionParameters.showPoints) {
        points.forEach(point => {
          const sphereGeometry = new THREE.SphereGeometry(functionParameters.pointSize, 8, 8);
          const sphereMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x4ecdc4,
            transparent: true,
            opacity: 0.8
          });
          const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
          sphere.position.copy(point);
          group.add(sphere);
        });
      }

      // 标记周期点
      for (let i = -3; i <= 3; i++) {
        const periodX = i * (2 * Math.PI / functionParameters.k);
        if (Math.abs(periodX) <= 8) {
          const periodGeometry = new THREE.SphereGeometry(functionParameters.pointSize * 1.2, 12, 12);
          const periodMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x00ff00,
            emissive: 0x00ff00,
            emissiveIntensity: 0.3
          });
          const periodSphere = new THREE.Mesh(periodGeometry, periodMaterial);
          periodSphere.position.set(periodX, 0, 0);
          group.add(periodSphere);
        }
      }
    }

    // ============================================================================
    // 反比例函数可视化：双曲线
    // ============================================================================
    function createInverseProportionFunction(group) {
      const points = [];
      
      // 生成反比例函数上的点（避开x=0）
      for (let x = -8; x <= 8; x += 0.3) {
        if (Math.abs(x) > 0.1) { // 避开x=0附近
          const y = functionParameters.k / x;
          if (Math.abs(y) <= 10) { // 限制y值范围
            points.push(new THREE.Vector3(x, y, 0));
          }
        }
      }

      // 创建连线
      if (functionParameters.showLine) {
        const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const lineMaterial = new THREE.LineBasicMaterial({ 
          color: 0xff6b6b,
          linewidth: functionParameters.lineWidth * 10
        });
        const line = new THREE.Line(lineGeometry, lineMaterial);
        group.add(line);
      }

      // 创建点
      if (functionParameters.showPoints) {
        points.forEach(point => {
          const sphereGeometry = new THREE.SphereGeometry(functionParameters.pointSize, 8, 8);
          const sphereMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x4ecdc4,
            transparent: true,
            opacity: 0.8
          });
          const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
          sphere.position.copy(point);
          group.add(sphere);
        });
      }

      // 标记渐近线位置
      const asymptoteGeometry = new THREE.BufferGeometry();
      const asymptotePoints = [
        new THREE.Vector3(0, -10, 0),
        new THREE.Vector3(0, 10, 0)
      ];
      asymptoteGeometry.setFromPoints(asymptotePoints);
      const asymptoteMaterial = new THREE.LineDashedMaterial({ 
        color: 0xffff00,
        dashSize: 0.5,
        gapSize: 0.3
      });
      const asymptote = new THREE.Line(asymptoteGeometry, asymptoteMaterial);
      asymptote.computeLineDistances();
      group.add(asymptote);
    }

    // ============================================================================
    // 绝对值函数可视化：V形图像
    // ============================================================================
    function createAbsoluteValueFunction(group) {
      const points = [];
      
      // 生成绝对值函数上的点
      for (let x = -8; x <= 8; x += 0.3) {
        const y = Math.abs(x);
        points.push(new THREE.Vector3(x, y, 0));
      }

      // 创建连线
      if (functionParameters.showLine) {
        const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const lineMaterial = new THREE.LineBasicMaterial({ 
          color: 0xff6b6b,
          linewidth: functionParameters.lineWidth * 10
        });
        const line = new THREE.Line(lineGeometry, lineMaterial);
        group.add(line);
      }

      // 创建点
      if (functionParameters.showPoints) {
        points.forEach(point => {
          const sphereGeometry = new THREE.SphereGeometry(functionParameters.pointSize, 8, 8);
          const sphereMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x4ecdc4,
            transparent: true,
            opacity: 0.8
          });
          const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
          sphere.position.copy(point);
          group.add(sphere);
        });
      }

      // 标记顶点（原点）
      const vertexGeometry = new THREE.SphereGeometry(functionParameters.pointSize * 2, 16, 16);
      const vertexMaterial = new THREE.MeshBasicMaterial({ 
        color: 0xffff00,
        emissive: 0xffff00,
        emissiveIntensity: 0.5
      });
      const vertexSphere = new THREE.Mesh(vertexGeometry, vertexMaterial);
      vertexSphere.position.set(0, 0, 0);
      group.add(vertexSphere);
    }

    // ============================================================================
    // 公式显示更新函数
    // ============================================================================
    function updateFormulaDisplay() {
      const formulaElement = document.getElementById('formulaDisplay');
      const a = functionParameters.a.toFixed(1);
      const b = functionParameters.b.toFixed(1);
      const c = functionParameters.c.toFixed(1);
      const k = functionParameters.k.toFixed(1);
      
      let formula = '';
      switch(functionParameters.type) {
        case 0: // 一次函数
          formula = `y = ${a}x ${b >= 0 ? '+' : ''} ${b}`;
          break;
        case 1: // 二次函数
          formula = `y = ${c}x² ${a >= 0 ? '+' : ''} ${a}x ${b >= 0 ? '+' : ''} ${b}`;
          break;
        case 2: // 三角函数
          formula = functionParameters.a > 0.5 ? `y = sin(${k}x)` : `y = cos(${k}x)`;
          break;
        case 3: // 反比例函数
          formula = `y = ${k}/x`;
          break;
        case 4: // 绝对值函数
          formula = 'y = |x|';
          break;
      }
      
      formulaElement.textContent = formula;
    }

    // ============================================================================
    // 创建GUI控制面板
    // ============================================================================
    const gui = new GUI();
    
    // 数学函数类型控制
    const mathTypes = {
      "一次函数": 0,
      "二次函数": 1,
      "三角函数": 2,
      "反比例函数": 3,
      "绝对值函数": 4
    };
    
    const mathTypeController = gui.add(functionParameters, 'type', mathTypes).name('函数类型');
    mathTypeController.onChange(() => {
      updateFormulaDisplay();
      createFunctionVisualization();
    });
    
    // 函数参数控制
    const paramsFolder = gui.addFolder('函数参数');
    const aController = paramsFolder.add(functionParameters, 'a', -3.0, 3.0).name('a系数');
    const bController = paramsFolder.add(functionParameters, 'b', -3.0, 3.0).name('b系数');
    const cController = paramsFolder.add(functionParameters, 'c', -2.0, 2.0).name('c系数');
    const kController = paramsFolder.add(functionParameters, 'k', 0.1, 5.0).name('k系数');
    
    // 参数变化时更新函数可视化
    [aController, bController, cController, kController].forEach(controller => {
      controller.onChange(() => {
        updateFormulaDisplay();
        createFunctionVisualization();
      });
    });
    
    // 显示选项控制
    const displayFolder = gui.addFolder('显示选项');
    displayFolder.add(functionParameters, 'showPoints').name('显示点');
    displayFolder.add(functionParameters, 'showLine').name('显示连线');
    displayFolder.add(functionParameters, 'pointSize', 0.05, 0.5).name('点大小');
    displayFolder.add(functionParameters, 'lineWidth', 0.05, 0.3).name('线宽度');
    
    // 显示选项变化时更新函数可视化
    const displayControllers = displayFolder.__controllers || displayFolder.controllers || [];
    displayControllers.forEach(controller => {
      if (controller && controller.onChange) {
        controller.onChange(() => {
          createFunctionVisualization();
        });
      }
    });

    // ============================================================================
    // 初始化场景
    // ============================================================================
    createCoordinateSystem();
    createFunctionVisualization();
    updateFormulaDisplay();

    // ============================================================================
    // 动画循环
    // ============================================================================
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新控制器
      controls.update();
      
      // 渲染场景
      renderer.render(scene, camera);
    }

    // 启动动画循环
    animate();
  </script>
</body>

</html>
