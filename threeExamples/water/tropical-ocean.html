<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 热带海洋效果</title>
    <!-- 配置模块导入映射 -->
      <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"
      }
    }
  </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';;
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x004488);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 10);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float waveFrequency;
                uniform float clarity;
                uniform float sunGlow;
                uniform vec3 oceanColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 热带海浪函数
                float tropicalWaves(vec2 uv, float time) {
                    float waves = 0.0;
                    
                    // 创建多层海浪效果
                    for (int i = 0; i < 3; i++) {
                        float layer = float(i) * 0.3;
                        float frequency = waveFrequency * (1.0 + layer * 0.5);
                        float speed = 1.0 + layer * 0.8;
                        
                        // 海浪波动
                        float wave = sin(uv.x * frequency + time * speed) * 
                                   cos(uv.y * frequency * 0.7 + time * speed * 0.6);
                        
                        waves += wave * (1.0 - layer * 0.3);
                    }
                    
                    return waves * 0.5 + 0.5;
                }
                
                // 清澈度效果
                float clarityEffect(vec2 uv, float clarity) {
                    // 创建清澈海水效果
                    float clear = sin(uv.x * 25.0 + time * 0.5) * 
                                sin(uv.y * 25.0 + time * 0.5) * 0.1;
                    
                    return clear * clarity;
                }
                
                // 阳光透射效果
                float sunTransmission(vec2 uv, float glow) {
                    // 模拟阳光穿透海水
                    vec2 sunPos = vec2(0.5, 0.3);
                    float dist = distance(uv, sunPos);
                    float sunEffect = smoothstep(0.3, 0.0, dist) * glow;
                    
                    return sunEffect;
                }
                
                // 热带色彩渐变
                vec3 tropicalGradient(float depth) {
                    // 热带海水颜色渐变
                    vec3 shallowColor = vec3(0.0, 0.8, 0.9);   // 浅水蓝绿色
                    vec3 midColor = vec3(0.0, 0.5, 0.7);        // 中层蓝色
                    vec3 deepColor = vec3(0.0, 0.3, 0.5);       // 深蓝色
                    
                    if (depth < 0.4) {
                        return mix(shallowColor, midColor, depth / 0.4);
                    } else {
                        return mix(midColor, deepColor, (depth - 0.4) / 0.6);
                    }
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 生成海浪效果
                    float waves = tropicalWaves(uv, time);
                    
                    // 计算深度（基于位置）
                    float depth = length(uv - 0.5) * 1.5;
                    
                    // 获取热带色彩
                    vec3 tropicalColor = tropicalGradient(depth);
                    
                    // 基础海洋颜色
                    vec3 color = oceanColor * waves;
                    
                    // 应用热带色彩
                    color *= tropicalColor;
                    
                    // 添加清澈度效果
                    float clarityEffectValue = clarityEffect(uv, clarity);
                    color += clarityEffectValue * vec3(0.2, 0.3, 0.4);
                    
                    // 添加阳光透射效果
                    float sunEffect = sunTransmission(uv, sunGlow);
                    color += sunEffect * vec3(1.0, 0.9, 0.7);
                    
                    // 添加热带海洋的明亮感
                    color *= 1.2;
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    waveFrequency: { value: 8.0 },
                    clarity: { value: 0.6 },
                    sunGlow: { value: 0.4 },
                    oceanColor: { value: new THREE.Color(0x00aaff) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(8, 6, 128, 96);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new GUI();
            const params = {
                oceanColor: '#00aaff',
                waveFrequency: 8.0,
                clarity: 0.6,
                sunGlow: 0.4,
                reset: function() {
                    mat.uniforms.oceanColor.value.set('#00aaff');
                    mat.uniforms.waveFrequency.value = 8.0;
                    mat.uniforms.clarity.value = 0.6;
                    mat.uniforms.sunGlow.value = 0.4;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'oceanColor').onChange(value => {
                mat.uniforms.oceanColor.value.set(value);
            });
            gui.add(mat.uniforms.waveFrequency, 'value', 2.0, 15.0).name('波浪频率');
            gui.add(mat.uniforms.clarity, 'value', 0.1, 1.0).name('清澈度');
            gui.add(mat.uniforms.sunGlow, 'value', 0.1, 0.8).name('阳光强度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
