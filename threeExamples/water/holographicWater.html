<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 全息水幕效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000022);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 8);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float hologramIntensity;
                uniform float scanLineSpeed;
                uniform float dataFlow;
                uniform vec3 hologramColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 全息扫描线效果
                float hologramScanLines(vec2 uv, float time) {
                    float scanLines = 0.0;
                    
                    // 创建扫描线效果
                    for (int i = 0; i < 3; i++) {
                        float speed = scanLineSpeed * (1.0 + float(i) * 0.3);
                        scanLines += sin(uv.y * 100.0 + time * speed * 10.0) * 0.1;
                    }
                    
                    return scanLines;
                }
                
                // 数据流效果
                float dataFlowEffect(vec2 uv, float time) {
                    float flow = 0.0;
                    
                    // 创建数据流动效果
                    for (int i = 0; i < 4; i++) {
                        float offset = float(i) * 0.5;
                        flow += sin(uv.x * 20.0 + time * 3.0 + offset) * 
                               cos(uv.y * 15.0 + time * 2.0 + offset) * 0.08;
                    }
                    
                    return flow * dataFlow;
                }
                
                // 全息网格效果
                float hologramGrid(vec2 uv, float time) {
                    float grid = 0.0;
                    
                    // 创建网格图案
                    grid += sin(uv.x * 30.0 + time * 2.0) * 0.05;
                    grid += sin(uv.y * 30.0 + time * 1.5) * 0.05;
                    
                    return grid;
                }
                
                // 全息噪波效果
                float hologramNoise(vec2 uv, float time) {
                    float noise = 0.0;
                    
                    // 创建全息噪波
                    for (int i = 0; i < 2; i++) {
                        float frequency = 50.0 + float(i) * 20.0;
                        noise += sin(uv.x * frequency + time * 5.0) * 
                                sin(uv.y * frequency + time * 5.0) * 0.03;
                    }
                    
                    return noise;
                }
                
                // 全息水幕效果
                float holographicWater(vec2 uv, float time) {
                    float water = 0.0;
                    
                    // 创建水幕波动效果
                    for (int i = 0; i < 3; i++) {
                        float layer = float(i) * 0.2;
                        water += sin(uv.x * 8.0 + time * 2.0 + layer) * 
                                cos(uv.y * 6.0 + time * 1.5 + layer) * 0.15;
                    }
                    
                    return water;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 全息扫描线
                    float scanLines = hologramScanLines(uv, time);
                    
                    // 数据流效果
                    float dataFlowEffect = dataFlowEffect(uv, time);
                    
                    // 全息网格
                    float grid = hologramGrid(uv, time);
                    
                    // 全息噪波
                    float noise = hologramNoise(uv, time);
                    
                    // 全息水幕
                    float water = holographicWater(uv, time);
                    
                    // 组合效果
                    float finalEffect = (scanLines + dataFlowEffect + grid + noise + water) * hologramIntensity;
                    
                    // 基础全息色
                    vec3 color = hologramColor * (finalEffect * 0.5 + 0.5);
                    
                    // 添加全息发光效果
                    float glow = smoothstep(0.2, 0.0, abs(finalEffect)) * 0.5;
                    color += glow * vec3(0.3, 0.8, 1.0);
                    
                    // 添加扫描线高光
                    float highlight = sin(uv.y * 200.0 + time * 20.0) * 0.1;
                    color += highlight * vec3(1.0, 1.0, 1.0);
                    
                    gl_FragColor = vec4(color, 0.9);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    hologramIntensity: { value: 1.8 },
                    scanLineSpeed: { value: 1.0 },
                    dataFlow: { value: 0.7 },
                    hologramColor: { value: new THREE.Color(0x00ffff) }
                },
                transparent: true
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(6, 8, 96, 128);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                hologramColor: '#00ffff',
                hologramIntensity: 1.8,
                scanLineSpeed: 1.0,
                dataFlow: 0.7,
                reset: function() {
                    mat.uniforms.hologramColor.value.set('#00ffff');
                    mat.uniforms.hologramIntensity.value = 1.8;
                    mat.uniforms.scanLineSpeed.value = 1.0;
                    mat.uniforms.dataFlow.value = 0.7;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'hologramColor').onChange(value => {
                mat.uniforms.hologramColor.value.set(value);
            });
            gui.add(mat.uniforms.hologramIntensity, 'value', 0.5, 3.0).name('全息强度');
            gui.add(mat.uniforms.scanLineSpeed, 'value', 0.3, 2.0).name('扫描线速度');
            gui.add(mat.uniforms.dataFlow, 'value', 0.1, 1.5).name('数据流强度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
