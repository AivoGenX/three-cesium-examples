<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 量子水波效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000011);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 8);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float quantumIntensity;
                uniform float waveCollapse;
                uniform float probabilityField;
                uniform vec3 quantumColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 量子波函数
                float quantumWaveFunction(vec2 uv, float time) {
                    float wave = 0.0;
                    
                    // 创建量子干涉图案
                    for (int i = 0; i < 5; i++) {
                        float phase = float(i) * 0.4;
                        float frequency = 8.0 + float(i) * 2.0;
                        
                        // 波函数叠加
                        wave += sin(uv.x * frequency + time * 2.0 + phase) * 
                              cos(uv.y * frequency + time * 1.5 + phase) * 0.2;
                    }
                    
                    return wave;
                }
                
                // 概率密度函数
                float probabilityDensity(vec2 uv, float time) {
                    float density = 0.0;
                    
                    // 创建概率云效果
                    for (int i = 0; i < 3; i++) {
                        float offset = float(i) * 1.57;
                        density += sin(uv.x * 15.0 + time * 3.0 + offset) * 
                                  sin(uv.y * 15.0 + time * 2.5 + offset) * 0.1;
                    }
                    
                    return density * probabilityField;
                }
                
                // 波函数坍缩效果
                float waveCollapseEffect(vec2 uv, float time, float collapse) {
                    float collapseEffect = 0.0;
                    
                    // 模拟波函数坍缩
                    for (int i = 0; i < 4; i++) {
                        float seed = float(i) * 123.456;
                        vec2 collapsePoint = vec2(
                            fract(sin(seed * 78.233) * 43758.5453),
                            fract(sin(seed * 12.9898) * 43758.5453)
                        );
                        
                        float dist = distance(uv, collapsePoint);
                        collapseEffect += exp(-dist * 20.0) * sin(time * 5.0 + seed) * collapse;
                    }
                    
                    return collapseEffect;
                }
                
                // 量子纠缠效果
                float quantumEntanglement(vec2 uv, float time) {
                    float entanglement = 0.0;
                    
                    // 创建纠缠图案
                    for (int i = 0; i < 2; i++) {
                        float phase = float(i) * 3.14;
                        entanglement += sin(uv.x * 25.0 + time * 4.0 + phase) * 
                                       sin(uv.y * 25.0 + time * 4.0 + phase) * 0.08;
                    }
                    
                    return entanglement;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 量子波函数
                    float quantumWave = quantumWaveFunction(uv, time);
                    
                    // 概率密度
                    float probability = probabilityDensity(uv, time);
                    
                    // 波函数坍缩
                    float collapse = waveCollapseEffect(uv, time, waveCollapse);
                    
                    // 量子纠缠
                    float entanglement = quantumEntanglement(uv, time);
                    
                    // 组合效果
                    float finalEffect = (quantumWave + probability + collapse + entanglement) * quantumIntensity;
                    
                    // 基础量子色
                    vec3 color = quantumColor * (finalEffect * 0.5 + 0.5);
                    
                    // 添加量子发光效果
                    float glow = smoothstep(0.3, 0.0, abs(finalEffect)) * 0.4;
                    color += glow * vec3(0.2, 0.6, 1.0);
                    
                    // 添加高能粒子效果
                    float particles = sin(uv.x * 50.0 + time * 10.0) * sin(uv.y * 50.0 + time * 10.0) * 0.1;
                    color += particles * vec3(1.0, 1.0, 1.0);
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    quantumIntensity: { value: 1.5 },
                    waveCollapse: { value: 0.3 },
                    probabilityField: { value: 0.6 },
                    quantumColor: { value: new THREE.Color(0x00aaff) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(6, 6, 128, 128);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                quantumColor: '#00aaff',
                quantumIntensity: 1.5,
                waveCollapse: 0.3,
                probabilityField: 0.6,
                reset: function() {
                    mat.uniforms.quantumColor.value.set('#00aaff');
                    mat.uniforms.quantumIntensity.value = 1.5;
                    mat.uniforms.waveCollapse.value = 0.3;
                    mat.uniforms.probabilityField.value = 0.6;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'quantumColor').onChange(value => {
                mat.uniforms.quantumColor.value.set(value);
            });
            gui.add(mat.uniforms.quantumIntensity, 'value', 0.5, 3.0).name('量子强度');
            gui.add(mat.uniforms.waveCollapse, 'value', 0.1, 1.0).name('波函数坍缩');
            gui.add(mat.uniforms.probabilityField, 'value', 0.1, 1.0).name('概率场强度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
