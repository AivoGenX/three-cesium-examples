<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 数字水纹效果</title>
    <!-- 配置模块导入映射 -->
      <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"
      }
    }
  </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';;
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x001100);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 8);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float pixelSize;
                uniform float dataStream;
                uniform float glitchEffect;
                uniform vec3 digitalColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 像素化效果
                vec2 pixelate(vec2 uv, float pixelSize) {
                    vec2 pixelUV = floor(uv * pixelSize * 100.0) / (pixelSize * 100.0);
                    return pixelUV;
                }
                
                // 数字水波效果
                float digitalWave(vec2 uv, float time) {
                    float wave = 0.0;
                    
                    // 创建数字水波
                    for (int i = 0; i < 3; i++) {
                        float layer = float(i) * 0.2;
                        float frequency = 6.0 + float(i) * 2.0;
                        
                        wave += sin(uv.x * frequency + time * 2.0 + layer) * 
                              cos(uv.y * frequency + time * 1.5 + layer) * 0.15;
                    }
                    
                    return wave;
                }
                
                // 数据流效果
                float dataStreamEffect(vec2 uv, float time) {
                    float stream = 0.0;
                    
                    // 创建数据流动效果
                    for (int i = 0; i < 4; i++) {
                        float speed = 2.0 + float(i) * 0.5;
                        stream += sin(uv.y * 50.0 - time * speed * 5.0) * 0.05;
                    }
                    
                    return stream * dataStream;
                }
                
                // 数字噪波效果
                float digitalNoise(vec2 uv, float time) {
                    float noise = 0.0;
                    
                    // 创建数字噪波
                    for (int i = 0; i < 2; i++) {
                        float frequency = 80.0 + float(i) * 30.0;
                        noise += sin(uv.x * frequency + time * 8.0) * 
                                sin(uv.y * frequency + time * 8.0) * 0.02;
                    }
                    
                    return noise;
                }
                
                // 故障效果
                float glitchEffectFunc(vec2 uv, float time, float glitch) {
                    float glitchValue = 0.0;
                    
                    // 创建数字故障效果
                    for (int i = 0; i < 2; i++) {
                        float offset = float(i) * 0.5;
                        glitchValue += sin(uv.x * 25.0 + time * 4.0 + offset) * 
                                      cos(uv.y * 20.0 + time * 3.0 + offset) * 0.08;
                    }
                    
                    return glitchValue * glitch;
                }
                
                // 二进制码效果
                float binaryCode(vec2 uv, float time) {
                    float binary = 0.0;
                    
                    // 创建二进制码流动
                    for (int i = 0; i < 3; i++) {
                        float speed = 3.0 + float(i) * 1.0;
                        binary += sin(uv.x * 40.0 + time * speed * 2.0) * 0.03;
                    }
                    
                    return binary;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 应用像素化
                    vec2 pixelUV = pixelate(uv, pixelSize);
                    
                    // 数字水波
                    float wave = digitalWave(pixelUV, time);
                    
                    // 数据流效果
                    float stream = dataStreamEffect(pixelUV, time);
                    
                    // 数字噪波
                    float noise = digitalNoise(pixelUV, time);
                    
                    // 故障效果
                    float glitch = glitchEffectFunc(pixelUV, time, glitchEffect);
                    
                    // 二进制码
                    float binary = binaryCode(pixelUV, time);
                    
                    // 组合效果
                    float finalEffect = (wave + stream + noise + glitch + binary) * 1.5;
                    
                    // 数字基础色
                    vec3 color = digitalColor * (finalEffect * 0.5 + 0.5);
                    
                    // 添加数字发光效果
                    float glow = smoothstep(0.3, 0.0, abs(finalEffect)) * 0.6;
                    color += glow * vec3(0.0, 1.0, 0.3);
                    
                    // 添加像素边缘效果
                    float pixelEdge = fract(uv.x * pixelSize * 100.0) < 0.1 ? 0.1 : 0.0;
                    color += pixelEdge * vec3(1.0, 1.0, 1.0);
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    pixelSize: { value: 0.5 },
                    dataStream: { value: 0.8 },
                    glitchEffect: { value: 0.4 },
                    digitalColor: { value: new THREE.Color(0x00ff88) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(6, 6, 128, 128);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new GUI();
            const params = {
                digitalColor: '#00ff88',
                pixelSize: 0.5,
                dataStream: 0.8,
                glitchEffect: 0.4,
                reset: function() {
                    mat.uniforms.digitalColor.value.set('#00ff88');
                    mat.uniforms.pixelSize.value = 0.5;
                    mat.uniforms.dataStream.value = 0.8;
                    mat.uniforms.glitchEffect.value = 0.4;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'digitalColor').onChange(value => {
                mat.uniforms.digitalColor.value.set(value);
            });
            gui.add(mat.uniforms.pixelSize, 'value', 0.1, 1.5).name('像素大小');
            gui.add(mat.uniforms.dataStream, 'value', 0.1, 1.5).name('数据流强度');
            gui.add(mat.uniforms.glitchEffect, 'value', 0.1, 1.0).name('故障效果');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
