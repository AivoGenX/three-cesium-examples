<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 冰面反射效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x001122);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 8);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float reflectionIntensity;
                uniform float iceThickness;
                uniform float refractionIndex;
                uniform vec3 iceColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 冰面反射函数
                float iceReflection(vec2 uv, float time) {
                    float reflection = 0.0;
                    
                    // 创建冰面反射图案
                    for (int i = 0; i < 3; i++) {
                        float frequency = float(i + 1) * 8.0;
                        float speed = 0.5 + float(i) * 0.3;
                        
                        reflection += sin(uv.x * frequency + time * speed) * 
                                    cos(uv.y * frequency + time * speed) * 0.2;
                    }
                    
                    return reflection * 0.5 + 0.5;
                }
                
                // 折射效果
                vec3 refractionEffect(vec2 uv, float index) {
                    vec2 distortedUV = uv + sin(uv * 15.0 + time) * 0.02 * index;
                    
                    // 创建折射颜色变化
                    float r = sin(distortedUV.x * 10.0 + time) * 0.3 + 0.7;
                    float g = sin(distortedUV.y * 10.0 + time * 1.2) * 0.3 + 0.7;
                    float b = sin((distortedUV.x + distortedUV.y) * 5.0 + time * 0.8) * 0.3 + 0.7;
                    
                    return vec3(r, g, b) * 0.4;
                }
                
                // 冰晶效果
                float iceCrystalEffect(vec2 uv, float thickness) {
                    float crystal = 0.0;
                    
                    // 创建冰晶图案
                    for (int i = 0; i < 4; i++) {
                        float angle = float(i) * 1.57; // 90度间隔
                        float x = uv.x * cos(angle) - uv.y * sin(angle);
                        float y = uv.x * sin(angle) + uv.y * cos(angle);
                        
                        crystal += sin(x * 20.0 + time * 2.0) * 
                                 sin(y * 20.0 + time * 2.0) * 0.1;
                    }
                    
                    return crystal * thickness;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 生成冰面反射
                    float reflection = iceReflection(uv, time);
                    
                    // 基础冰色
                    vec3 color = iceColor * reflection;
                    
                    // 添加折射效果
                    vec3 refraction = refractionEffect(uv, refractionIndex);
                    color += refraction;
                    
                    // 添加冰晶效果
                    float crystal = iceCrystalEffect(uv, iceThickness);
                    color += crystal * vec3(0.8, 0.9, 1.0);
                    
                    // 添加反射强度
                    color *= reflectionIntensity;
                    
                    // 添加边缘发光
                    float edge = smoothstep(0.3, 0.0, length(uv - 0.5)) * 0.2;
                    color += edge * vec3(0.9, 0.95, 1.0);
                    
                    gl_FragColor = vec4(color, 0.9);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    reflectionIntensity: { value: 1.2 },
                    iceThickness: { value: 0.5 },
                    refractionIndex: { value: 1.3 },
                    iceColor: { value: new THREE.Color(0xaaccff) }
                },
                transparent: true
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(6, 6, 96, 96);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                iceColor: '#aaccff',
                reflectionIntensity: 1.2,
                iceThickness: 0.5,
                refractionIndex: 1.3,
                reset: function() {
                    mat.uniforms.iceColor.value.set('#aaccff');
                    mat.uniforms.reflectionIntensity.value = 1.2;
                    mat.uniforms.iceThickness.value = 0.5;
                    mat.uniforms.refractionIndex.value = 1.3;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'iceColor').onChange(value => {
                mat.uniforms.iceColor.value.set(value);
            });
            gui.add(mat.uniforms.reflectionIntensity, 'value', 0.5, 2.0).name('反射强度');
            gui.add(mat.uniforms.iceThickness, 'value', 0.1, 1.0).name('冰层厚度');
            gui.add(mat.uniforms.refractionIndex, 'value', 1.0, 2.0).name('折射率');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
