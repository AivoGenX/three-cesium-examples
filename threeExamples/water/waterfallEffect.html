<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 瀑布效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x003366);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 10);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float fallSpeed;
                uniform float turbulence;
                uniform float foamIntensity;
                uniform vec3 waterColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 瀑布流动函数
                float waterfallFlow(vec2 uv, float time) {
                    float flow = 0.0;
                    
                    // 创建多层瀑布效果
                    for (int i = 0; i < 3; i++) {
                        float layer = float(i) * 0.2;
                        float speed = fallSpeed * (1.0 + layer * 0.5);
                        
                        // 垂直流动效果
                        float verticalFlow = sin(uv.y * 20.0 - time * speed + layer * 3.14);
                        
                        // 水平波动
                        float horizontalWave = sin(uv.x * 10.0 + time * speed * 0.5) * 0.3 + 0.7;
                        
                        flow += verticalFlow * horizontalWave * (1.0 - layer * 0.3);
                    }
                    
                    return flow * 0.5 + 0.5;
                }
                
                // 湍流效果
                float turbulenceEffect(vec2 uv, float time) {
                    float turb = 0.0;
                    
                    for (int i = 0; i < 2; i++) {
                        float frequency = float(i + 1) * 5.0;
                        turb += sin(uv.x * frequency + time * 2.0) * 
                               sin(uv.y * frequency + time * 2.0) * 0.1;
                    }
                    
                    return turb * turbulence;
                }
                
                // 泡沫效果
                float foamEffect(vec2 uv, float time) {
                    float foam = 0.0;
                    
                    // 创建泡沫图案
                    for (int i = 0; i < 4; i++) {
                        float offset = float(i) * 0.5;
                        foam += sin(uv.x * 15.0 + time * 3.0 + offset) * 
                               sin(uv.y * 15.0 - time * 2.0 + offset) * 0.05;
                    }
                    
                    return max(0.0, foam) * foamIntensity;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 生成瀑布流动效果
                    float flow = waterfallFlow(uv, time);
                    
                    // 添加湍流效果
                    float turb = turbulenceEffect(uv, time);
                    flow += turb;
                    
                    // 基础水色
                    vec3 color = waterColor * flow;
                    
                    // 添加泡沫效果
                    float foam = foamEffect(uv, time);
                    color += foam * vec3(1.0, 1.0, 1.0);
                    
                    // 添加冲击效果（底部更亮）
                    float impact = smoothstep(0.7, 1.0, uv.y) * 0.3;
                    color += impact * vec3(0.8, 0.9, 1.0);
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    fallSpeed: { value: 2.0 },
                    turbulence: { value: 0.5 },
                    foamIntensity: { value: 0.3 },
                    waterColor: { value: new THREE.Color(0x4a90e2) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(6, 8, 64, 96);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                waterColor: '#4a90e2',
                fallSpeed: 2.0,
                turbulence: 0.5,
                foamIntensity: 0.3,
                reset: function() {
                    mat.uniforms.waterColor.value.set('#4a90e2');
                    mat.uniforms.fallSpeed.value = 2.0;
                    mat.uniforms.turbulence.value = 0.5;
                    mat.uniforms.foamIntensity.value = 0.3;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'waterColor').onChange(value => {
                mat.uniforms.waterColor.value.set(value);
            });
            gui.add(mat.uniforms.fallSpeed, 'value', 0.5, 5.0).name('下落速度');
            gui.add(mat.uniforms.turbulence, 'value', 0.1, 1.0).name('湍流强度');
            gui.add(mat.uniforms.foamIntensity, 'value', 0.1, 0.8).name('泡沫强度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
