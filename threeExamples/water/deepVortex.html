<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 深海漩涡效果</title>
    <!-- 配置模块导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/build/three.module.js",
                "three/addons/": "./threejs/examples/jsm/",
                "gsap": "./js/gsap/index.js",
                "dat.gui": "./js/dat/build/dat.gui.module.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import * as dat from "dat.gui";
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x001122);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 8);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float vortexStrength;
                uniform float depthIntensity;
                uniform float flowSpeed;
                uniform vec3 deepColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 涡旋场函数
                vec2 vortexField(vec2 uv, float time) {
                    vec2 center = vec2(0.5, 0.5);
                    vec2 dir = uv - center;
                    float dist = length(dir);
                    float angle = atan(dir.y, dir.x);
                    
                    // 创建涡旋效果
                    angle += sin(dist * 15.0 + time * flowSpeed) * vortexStrength;
                    dist *= 1.0 + sin(angle * 5.0 + time * 2.0) * 0.2;
                    
                    return center + vec2(cos(angle), sin(angle)) * dist;
                }
                
                // 深海颜色映射
                vec3 deepSeaColor(float depth) {
                    vec3 surfaceColor = vec3(0.0, 0.3, 0.6);   // 表面蓝色
                    vec3 midColor = vec3(0.0, 0.1, 0.3);        // 中层蓝色
                    vec3 deepColor = vec3(0.0, 0.05, 0.15);     // 深蓝色
                    
                    if (depth < 0.3) {
                        return mix(surfaceColor, midColor, depth / 0.3);
                    } else {
                        return mix(midColor, deepColor, (depth - 0.3) / 0.7);
                    }
                }
                
                // 泡沫效果
                float foamEffect(vec2 uv, float time) {
                    float foam = sin(uv.x * 30.0 + time * 3.0) * sin(uv.y * 30.0 + time * 3.0);
                    return max(0.0, foam) * 0.1;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 应用涡旋场
                    vec2 vortexUV = vortexField(uv, time);
                    
                    // 计算深度
                    float depth = length(vortexUV - 0.5) * depthIntensity;
                    
                    // 获取深海颜色
                    vec3 color = deepSeaColor(depth);
                    
                    // 应用自定义颜色
                    color *= deepColor;
                    
                    // 添加泡沫效果
                    float foam = foamEffect(vortexUV, time);
                    color += foam * vec3(1.0, 1.0, 1.0);
                    
                    // 添加深度发光
                    float glow = smoothstep(0.4, 0.0, depth) * 0.3;
                    color += glow * vec3(0.2, 0.4, 0.8);
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    vortexStrength: { value: 0.8 },
                    depthIntensity: { value: 1.5 },
                    flowSpeed: { value: 1.0 },
                    deepColor: { value: new THREE.Color(0x3366ff) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(8, 8, 128, 128);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new dat.GUI();
            const params = {
                deepColor: '#3366ff',
                vortexStrength: 0.8,
                depthIntensity: 1.5,
                flowSpeed: 1.0,
                reset: function() {
                    mat.uniforms.deepColor.value.set('#3366ff');
                    mat.uniforms.vortexStrength.value = 0.8;
                    mat.uniforms.depthIntensity.value = 1.5;
                    mat.uniforms.flowSpeed.value = 1.0;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'deepColor').onChange(value => {
                mat.uniforms.deepColor.value.set(value);
            });
            gui.add(mat.uniforms.vortexStrength, 'value', 0.1, 2.0).name('涡旋强度');
            gui.add(mat.uniforms.depthIntensity, 'value', 0.5, 3.0).name('深度强度');
            gui.add(mat.uniforms.flowSpeed, 'value', 0.1, 3.0).name('流动速度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
