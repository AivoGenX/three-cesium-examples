  <circle cx="150" cy="100" r="30" fill="none" stroke="#6699ff" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="150" cy="100" r="25" fill="none" stroke="#99ccff" stroke-width="1" stroke-dasharray="2,2"/>
