<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spacetimeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000011;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#002244;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3366ff;stop-opacity:1" />
