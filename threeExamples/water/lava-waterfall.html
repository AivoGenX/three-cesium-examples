<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 熔岩瀑布效果</title>
    <!-- 配置模块导入映射 -->
      <script type="importmap">
    {
      "imports": {
        "three": "/libs/threejs/build/three.module.js",
        "three/addons/": "/libs/threejs/examples/jsm/",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"
      }
    }
  </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #box {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="box"></div>

    <script type="module">
        // 导入所需模块
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';;
        import gsap from "gsap";

        // 全局变量声明
        let scene, camera, renderer;
        let _width, _height;
        let mat;  // 着色器材质
        let _primitive;  // 3D几何体对象
        let clock = new THREE.Clock();
        let gui;

        // 初始化函数
        function init() {
            // 获取容器尺寸
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x220000);

            // 创建相机
            camera = new THREE.PerspectiveCamera(60, _width / _height, 0.1, 1000);
            camera.position.set(0, 0, 10);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(_width, _height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 创建着色器材质
            createShaderMaterial();

            // 创建几何体
            createGeometry();

            // 创建GUI
            createGUI();

            // 开始动画循环
            animate();

            // 窗口大小变化处理
            window.addEventListener('resize', onWindowResize);
        }

        // 创建着色器材质
        function createShaderMaterial() {
            const vertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                uniform float lavaIntensity;
                uniform float waterMix;
                uniform float thermalFlow;
                uniform vec3 lavaColor;
                
                varying vec2 vUv;
                varying vec3 vPosition;
                
                // 熔岩流动效果
                float lavaFlow(vec2 uv, float time) {
                    float flow = 0.0;
                    
                    // 创建熔岩流动
                    for (int i = 0; i < 3; i++) {
                        float layer = float(i) * 0.3;
                        float speed = 1.0 + layer * 0.8;
                        
                        flow += sin(uv.y * 15.0 - time * speed + layer) * 0.2;
                    }
                    
                    return flow * 0.5 + 0.5;
                }
                
                // 热浪效果
                float thermalWave(vec2 uv, float time) {
                    float wave = 0.0;
                    
                    // 创建热浪波动
                    for (int i = 0; i < 2; i++) {
                        float frequency = 6.0 + float(i) * 3.0;
                        wave += sin(uv.x * frequency + time * 2.0) * 
                               cos(uv.y * frequency + time * 1.5) * 0.15;
                    }
                    
                    return wave * thermalFlow;
                }
                
                // 岩浆气泡效果
                float magmaBubbles(vec2 uv, float time) {
                    float bubbles = 0.0;
                    
                    // 创建岩浆气泡
                    for (int i = 0; i < 5; i++) {
                        float seed = float(i) * 45.678;
                        vec2 bubblePos = vec2(
                            fract(sin(seed * 78.233) * 43758.5453),
                            fract(sin(seed * 12.9898) * 43758.5453)
                        );
                        
                        float dist = distance(uv, bubblePos);
                        float size = 0.05 + fract(seed * 34.567) * 0.1;
                        
                        bubbles += smoothstep(size, 0.0, dist) * sin(time * 3.0 + seed) * 0.2;
                    }
                    
                    return bubbles;
                }
                
                // 水火混合效果
                float waterLavaMix(vec2 uv, float time, float mixRatio) {
                    float mixEffect = 0.0;
                    
                    // 创建水火混合区域
                    for (int i = 0; i < 2; i++) {
                        float phase = float(i) * 1.57;
                        mixEffect += sin(uv.x * 12.0 + time * 1.5 + phase) * 
                                    cos(uv.y * 12.0 + time * 1.2 + phase) * 0.1;
                    }
                    
                    return mixEffect * mixRatio;
                }
                
                // 蒸汽效果
                float steamEffect(vec2 uv, float time) {
                    float steam = 0.0;
                    
                    // 创建蒸汽上升效果
                    for (int i = 0; i < 3; i++) {
                        float layer = float(i) * 0.2;
                        steam += sin(uv.x * 8.0 + time * 1.0 + layer) * 
                                cos(uv.y * 20.0 - time * 2.0 + layer) * 0.08;
                    }
                    
                    return steam;
                }
                
                void main() {
                    vec2 uv = vUv;
                    
                    // 熔岩流动
                    float lava = lavaFlow(uv, time);
                    
                    // 热浪效果
                    float thermal = thermalWave(uv, time);
                    
                    // 岩浆气泡
                    float bubbles = magmaBubbles(uv, time);
                    
                    // 水火混合
                    float mix = waterLavaMix(uv, time, waterMix);
                    
                    // 蒸汽效果
                    float steam = steamEffect(uv, time);
                    
                    // 组合效果
                    float finalEffect = (lava + thermal + bubbles + mix + steam) * lavaIntensity;
                    
                    // 熔岩基础色
                    vec3 color = lavaColor * (finalEffect * 0.5 + 0.5);
                    
                    // 添加熔岩发光效果
                    float glow = smoothstep(0.4, 0.0, abs(finalEffect)) * 0.6;
                    color += glow * vec3(1.0, 0.5, 0.2);
                    
                    // 添加蒸汽白色
                    float steamWhite = smoothstep(0.2, 0.0, abs(steam)) * 0.3;
                    color += steamWhite * vec3(1.0, 1.0, 1.0);
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            mat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(_width, _height) },
                    lavaIntensity: { value: 2.0 },
                    waterMix: { value: 0.5 },
                    thermalFlow: { value: 0.8 },
                    lavaColor: { value: new THREE.Color(0xff5500) }
                }
            });
        }

        // 创建几何体
        function createGeometry() {
            const geometry = new THREE.PlaneGeometry(6, 8, 64, 96);
            _primitive = new THREE.Mesh(geometry, mat);
            scene.add(_primitive);
        }

        // 创建GUI
        function createGUI() {
            gui = new GUI();
            const params = {
                lavaColor: '#ff5500',
                lavaIntensity: 2.0,
                waterMix: 0.5,
                thermalFlow: 0.8,
                reset: function() {
                    mat.uniforms.lavaColor.value.set('#ff5500');
                    mat.uniforms.lavaIntensity.value = 2.0;
                    mat.uniforms.waterMix.value = 0.5;
                    mat.uniforms.thermalFlow.value = 0.8;
                    gui.updateDisplay();
                }
            };

            gui.addColor(params, 'lavaColor').onChange(value => {
                mat.uniforms.lavaColor.value.set(value);
            });
            gui.add(mat.uniforms.lavaIntensity, 'value', 0.5, 3.0).name('熔岩强度');
            gui.add(mat.uniforms.waterMix, 'value', 0.1, 1.0).name('水火混合');
            gui.add(mat.uniforms.thermalFlow, 'value', 0.1, 1.5).name('热流强度');
            gui.add(params, 'reset').name('重置');
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            mat.uniforms.time.value += delta;
            
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            const container = document.getElementById('box');
            _width = container.clientWidth;
            _height = container.clientHeight;
            
            camera.aspect = _width / _height;
            camera.updateProjectionMatrix();
            renderer.setSize(_width, _height);
            mat.uniforms.resolution.value.set(_width, _height);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
